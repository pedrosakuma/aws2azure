# aws2azure — local development stack.
#
# Default `docker compose up` starts the proxy plus Azurite, giving a fully
# working S3 → Azure Blob experience out of the box (Azurite creates containers
# and blobs dynamically — no pre-provisioning).
#
# Heavier emulators are opt-in via profiles so the default start stays fast:
#   docker compose --profile dynamodb up   # adds the Cosmos DB emulator
#   docker compose --profile messaging up  # adds SQL Edge + Service Bus emulator
#   docker compose --profile full up        # adds everything
#
# Kinesis → Event Hubs has no local emulator; point AWS2AZURE at a real
# Event Hubs namespace to exercise it.
#
# Emulators are NOT behavior-equivalent to real Azure — treat green here as
# necessary, not sufficient. See docs/getting-started.md.

services:
  # ───────────────────────────────────────────────────────────────────────────
  # aws2azure proxy (always on)
  # ───────────────────────────────────────────────────────────────────────────
  proxy:
    build: .
    image: aws2azure:local
    ports:
      - "8080:8080"
    environment:
      AWS2AZURE_CONFIG_FILE: /app/config.json
      ASPNETCORE_URLS: http://+:8080
    volumes:
      - ./docker/config.json:/app/config.json:ro
    depends_on:
      - azurite
    healthcheck:
      test: ["CMD", "/app/Aws2Azure.Proxy", "--health-check"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s

  # ───────────────────────────────────────────────────────────────────────────
  # Azurite — Blob/Queue/Table emulator (always on; backs S3 → Blob)
  # ───────────────────────────────────────────────────────────────────────────
  azurite:
    image: mcr.microsoft.com/azure-storage/azurite:latest
    command: ["azurite", "--loose", "--skipApiVersionCheck", "--blobHost", "0.0.0.0", "--queueHost", "0.0.0.0", "--tableHost", "0.0.0.0"]
    ports:
      - "10000:10000"  # Blob
      - "10001:10001"  # Queue
      - "10002:10002"  # Table

  # ───────────────────────────────────────────────────────────────────────────
  # Cosmos DB emulator — backs DynamoDB → Cosmos (profile: dynamodb / full)
  # Note: ~1-2 min to start, needs ~3 GB RAM, and serves a self-signed TLS cert.
  # The target database must be created before use (see docs/getting-started.md).
  # ───────────────────────────────────────────────────────────────────────────
  cosmos:
    image: mcr.microsoft.com/cosmosdb/linux/azure-cosmos-emulator:latest
    profiles: ["dynamodb", "full"]
    tty: true
    mem_limit: 3g
    environment:
      AZURE_COSMOS_EMULATOR_PARTITION_COUNT: "3"
      AZURE_COSMOS_EMULATOR_ENABLE_DATA_PERSISTENCE: "false"
    ports:
      - "8081:8081"
      - "10250-10255:10250-10255"

  # ───────────────────────────────────────────────────────────────────────────
  # SQL Edge — backing store for the Service Bus emulator (profile: messaging / full)
  # ───────────────────────────────────────────────────────────────────────────
  mssql:
    image: mcr.microsoft.com/azure-sql-edge:latest
    profiles: ["messaging", "full"]
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "Aws2AzureLocalDev!"
    ports:
      - "1433:1433"

  # ───────────────────────────────────────────────────────────────────────────
  # Service Bus emulator — backs SQS/SNS → Service Bus (profile: messaging / full)
  # Queues/topics must be declared up front in deploy/emulators/servicebus/Config.json;
  # the emulator does not create them dynamically.
  # ───────────────────────────────────────────────────────────────────────────
  servicebus-emulator:
    build:
      context: ./deploy/emulators/servicebus
    image: aws2azure/servicebus-emulator:local
    profiles: ["messaging", "full"]
    depends_on:
      - mssql
    environment:
      ACCEPT_EULA: "Y"
      SQL_SERVER: mssql
      MSSQL_SA_PASSWORD: "Aws2AzureLocalDev!"
    ports:
      - "5672:5672"
      - "5300:5300"
