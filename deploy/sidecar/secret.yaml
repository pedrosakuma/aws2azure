# aws2azure sidecar configuration.
#
# The config holds Azure account keys / SAS keys, so it lives in a Secret, NOT
# a ConfigMap. The Secret is mounted read-only into the sidecar and read via
# AWS2AZURE_CONFIG_FILE. Anyone who can read this Secret (or exec into the pod)
# can read the Azure credentials — scope RBAC accordingly and prefer Azure
# Workload Identity (see docs/azure-authentication.md) over stored account keys
# where the backend supports it.
#
# Replace the placeholder Azure values below with your real account.
apiVersion: v1
kind: Secret
metadata:
  name: aws2azure-config
  labels:
    app.kubernetes.io/name: aws2azure
    app.kubernetes.io/component: sidecar
type: Opaque
stringData:
  config.json: |
    {
      "services": {
        "s3": { "enabled": true }
      },
      "credentials": [
        {
          "awsAccessKeyId": "AKIADEVEXAMPLE",
          "awsSecretAccessKey": "change-me",
          "azure": {
            "blob": {
              "accountName": "REPLACE_WITH_STORAGE_ACCOUNT",
              "accountKey": "REPLACE_WITH_STORAGE_ACCOUNT_KEY"
            }
          }
        }
      ]
    }
