{{- if .Values.config.create }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "aws2azure.configSecretName" . }}
  labels:
    {{- include "aws2azure.labels" . | nindent 4 }}
type: Opaque
stringData:
  config.json: |-
    {{- .Values.config.content | toPrettyJson | nindent 4 }}
{{- end }}
