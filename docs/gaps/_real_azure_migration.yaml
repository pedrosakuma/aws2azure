services:
  - service: dynamodb
    tracking_issue: https://github.com/pedrosakuma/aws2azure/issues/532
    expires_on: "2026-10-31"
    operations:
      - ListTables
      - ListTagsOfResource
      - TagResource
      - UntagResource
  - service: s3
    tracking_issue: https://github.com/pedrosakuma/aws2azure/issues/532
    expires_on: "2026-10-31"
    operations:
      - AbortMultipartUpload
      - CompleteMultipartUpload
      - CopyObject
      - CreateMultipartUpload
      - DeleteBucketTagging
      - DeleteObjectTagging
      - GetObjectTagging
      - HeadBucket
      - HeadObject
      - ListBuckets
      - ListObjects
      - ListParts
      - PresignedUrl
      - PutObjectTagging
      - UploadPart
      - UploadPartCopy
  - service: sqs
    tracking_issue: https://github.com/pedrosakuma/aws2azure/issues/532
    expires_on: "2026-10-31"
    operations:
      - GetQueueUrl
      - ListDeadLetterSourceQueues
      - ReceiveMessage
      - SendMessage
