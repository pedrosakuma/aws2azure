service: sqs
operation: SetQueueAttributes
azure_equivalent: "Azure Service Bus management REST API — PUT /{queue}?api-version=2021-05 with If-Match: * (whole-entity replace)"
status: partial
sub_features:
  - {name: "VisibilityTimeout → LockDuration", status: implemented}
  - {name: "MessageRetentionPeriod → DefaultMessageTimeToLive", status: implemented}
  - {name: "MaximumMessageSize → MaxMessageSizeInKilobytes", status: implemented, notes: "Bounded by SQS 1 MiB cap (Aug-2025) and the SB tier ceiling (Standard 256 KiB, Premium up to 100 MiB)."}
  - {name: "DelaySeconds (queue default)", status: unsupported, notes: "Rejected with InvalidAttributeName on update — SB has no equivalent field and the proxy has no durable per-queue metadata store yet. Tracked for the NFR phase. Per-message DelaySeconds on SendMessage still works."}
  - {name: "ReceiveMessageWaitTimeSeconds (queue default for long-poll)", status: unsupported, notes: "Same rationale as DelaySeconds — rejected with InvalidAttributeName until a durable metadata store lands. Per-call WaitTimeSeconds on ReceiveMessage is fully supported."}
  - {name: "ContentBasedDeduplication / RequiresDuplicateDetection toggle", status: implemented, notes: "Only on FIFO queues; SB rejects flipping the flag on Standard queues."}
  - {name: "RedrivePolicy → ForwardDeadLetteredMessagesTo", status: implemented, notes: "Slice 5: JSON parsed and mapped to ForwardDeadLetteredMessagesTo + MaxDeliveryCount. SB read-merge-write replaces the whole queue entity so the patch is preserved across subsequent SetQueueAttributes calls."}
  - {name: "Policy / KmsMasterKeyId / KmsDataKeyReusePeriodSeconds / SqsManagedSseEnabled", status: unsupported, notes: "Returned as InvalidAttributeName for the unsupported attribute. SB has its own SAS/MSI/CMK story that does not translate 1:1."}
  - {name: "Read-merge-write semantics", status: implemented, notes: "SB management is whole-entity replace — the proxy first GETs the queue, overlays only the patched fields, then PUTs with If-Match: * to avoid clobbering immutable / unmanaged fields."}
behavior_differences:
  - "Updates are not atomic across multiple concurrent SetQueueAttributes calls on the same queue: last write wins. If-Match: * is used (not the ETag we read) because SB does not surface the ETag in management responses on every emulator/version we tested. NFR phase may tighten this with an If-Match: <etag>."
  - "Several SQS-only attributes have no SB equivalent (Policy, KmsMasterKeyId, KmsDataKeyReusePeriodSeconds, SqsManagedSseEnabled, RedriveAllowPolicy). The proxy rejects them with InvalidAttributeName until Slice 5 (RedrivePolicy) and the security-encryption pass land."
  - "FIFO-only attributes (FifoQueue, FifoThroughputLimit, DeduplicationScope) cannot be flipped on an existing queue (SB rejects the change); the proxy returns InvalidAttributeName."
  - "Verified against in-process fakes; emulator-backed end-to-end validation is blocked because the Service Bus emulator does not expose the management REST API. Real-Azure validation pending."
references:
  - https://docs.aws.amazon.com/AWSSimpleQueueService/latest/APIReference/API_SetQueueAttributes.html
  - https://learn.microsoft.com/rest/api/servicebus/update-queue
