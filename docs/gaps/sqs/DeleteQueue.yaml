sub_features: []
behavior_differences:
  - "Service Bus deletes the queue synchronously; AWS SQS may take up to 60 seconds of eventual consistency before the queue stops accepting messages. Callers that delete-then-recreate within seconds may need to retry on QueueDeletedRecently — not currently surfaced by the proxy."
  - "Unknown-queue 404 is mapped to AWS.SimpleQueueService.NonExistentQueue (HTTP 400) per SQS spec."
  - "Validated against real Azure Service Bus through the standard queue/message lifecycle scenario."
  - "Existence-probe eventual consistency after DeleteQueue (issue #626): two independent production-shaped real-Azure GA load runs (2026-07-21, runs 29843180286 and 29847167581) observed a GetQueueUrl existence probe continuing to find a queue for over both a one-minute and a three-minute budget after its DeleteQueue call had already returned success, on a namespace with many other queues churning concurrently from the same run's representative-load workers. Service Bus's DELETE call itself is synchronous for the data plane, but the management-plane read path a GetQueueUrl existence probe uses can lag behind that delete, mirroring the ListQueues creation-lag caveat documented in docs/gaps/sqs/ListQueues.yaml — except here no empirically observed upper bound held across two real attempts, so it cannot be turned into a reliable, bounded qualification gate the way the ListQueues caveat was. The rollback qualification therefore deletes the queue as best-effort cleanup (matching PurgeQueue's own best-effort framing) without asserting a bounded existence-probe absence; this is not a proxy defect and does not weaken the rollback scenario's actual proof, which completes before this cleanup step."
references:
  - https://docs.aws.amazon.com/AWSSimpleQueueService/latest/APIReference/API_DeleteQueue.html
  - https://learn.microsoft.com/rest/api/servicebus/delete-queue
