service: sqs
operation: ReceiveMessage
azure_equivalent: "Azure Service Bus queue runtime REST API — POST /{queue}/messages/head?timeout={waitSeconds}&api-version=2021-05 (peek-lock semantics)"
status: implemented
sub_features:
  - {name: "Short polling (WaitTimeSeconds = 0)", status: implemented}
  - {name: "Long polling (WaitTimeSeconds 1..20)", status: implemented, notes: "Uses SB's native server-side wait on the first peek-lock call (timeout query parameter); subsequent calls inside the same batch fall back to timeout=0 to drain quickly, matching the SQS 'return as soon as one message is available or WaitTimeSeconds elapses' contract."}
  - {name: "MaxNumberOfMessages 1..10", status: implemented, notes: "SB REST is single-message peek-lock; the proxy loops until count or queue empty. The first call blocks up to WaitTimeSeconds (long-poll); follow-up calls share a 5s aggregate budget added on top of WaitTimeSeconds."}
  - {name: "VisibilityTimeout parameter", status: partial, notes: "Accepted and validated (0..43200) but ignored at SB level — see behavior_differences."}
  - {name: "AttributeNames / MessageAttributeNames filters", status: implemented, notes: "Includes 'All' shorthand. Returned system attributes: SentTimestamp, ApproximateReceiveCount, SequenceNumber, MessageGroupId (FIFO, from BrokerProperties.SessionId), MessageDeduplicationId (FIFO, from BrokerProperties.MessageId), DeadLetterQueueSourceArn (AMQP path only, when the message came from a /$DeadLetterQueue subqueue), and the proxy-prefixed Aws2Azure-DeadLetterReason / Aws2Azure-DeadLetterErrorDescription (AMQP path only, read from the dead-lettered message's application-properties)."}
  - {name: "Receipt handle round-trip", status: implemented, notes: "Opaque length-prefixed base64 of (MessageId, LockToken, SequenceNumber, LockedUntilUtc) — self-contained for DeleteMessage / ChangeMessageVisibility, safe against caller-controlled metacharacters in MessageDeduplicationId."}
  - {name: "MessageAttributes (String/Number/Binary) round-trip", status: implemented, notes: "Reconstructed from Aws2Azure-AttrTypes side-channel header emitted by SendMessage."}
  - {name: "MD5OfBody / MD5OfMessageAttributes", status: implemented}
behavior_differences:
  - "VisibilityTimeout on ReceiveMessage cannot be set per-call — SB locks the message for the queue's configured LockDuration. The proxy validates the parameter but does not enforce it; clients needing custom per-message visibility must use ChangeMessageVisibility after receive."
  - "MaxNumberOfMessages > 1 is emulated by looping POST /messages/head, capped by ReceiveLoopBudget (5s) added on top of WaitTimeSeconds — the proxy may return fewer messages than requested even when the queue has more if the budget elapses."
  - "ApproximateFirstReceiveTimestamp and SenderId are not surfaced (SB does not provide them)."
  - "Long polling uses SB's native server-side wait; if the first call returns empty after the wait the receive returns immediately with an empty list (no second wait). This matches SQS semantics."
  - "FIFO ordering gap: SQS FIFO guarantees strict per-MessageGroupId order on receive (one in-flight message per group at a time, others stay invisible until the in-flight one is deleted). SB only enforces ordering when the receiver opens a session-aware receive link (AMQP) and pins one consumer per session — semantics SB REST cannot express. As a result, ReceiveMessage on a .fifo queue surfaces MessageGroupId on each message (so application-side de-grouping still works) but does not block other messages of the same group from being delivered concurrently to different consumers. Tracked for Phase 2.5 (hand-rolled AMQP 1.0 lib)."
  - "MessageGroupId is surfaced from BrokerProperties.SessionId; MessageDeduplicationId from BrokerProperties.MessageId. Both only appear in the response when the AttributeNames filter requests them (or 'All')."
  - "Verified against in-process fakes; emulator-backed end-to-end validation is blocked (SB emulator does not expose runtime REST). Real-Azure validation pending — see ADR-0001."
  - "AMQP transport (Phase 2.5 slice 8b.4c): when a queue is configured with `transport: Amqp` (see ServiceBusCredentials.Queues), ReceiveMessage uses the in-process Service Bus AMQP 1.0 client via a shared connection pool. The receipt handle minted on the AMQP path is a distinct opaque format (version `2`, base64 of `{queueName, lockToken-GUID, lockedUntilUtc}`) carrying the SB lock-token directly rather than the REST messageId/lockToken pair. Long polling (WaitTimeSeconds) is honoured on the first receive; the polling-loop emulation that the REST path uses to batch up to 10 messages is replaced by a single `ReceiveBatchAsync` call against the cached AMQP link, which is more efficient. MessageAttributes (DataType round-trip) and FIFO MessageGroupId are NOT surfaced on the AMQP path yet (the bare-message parser does not model application-properties round-trip or `group-id`); these land in subsequent slices."
  - "Dead-letter attribution (AMQP path, Phase 2.5): when SB delivers a message from a `<queue>/$DeadLetterQueue` subqueue, the proxy surfaces three system attributes — `DeadLetterQueueSourceArn` (synthesised as `arn:aws:sqs:us-east-1:000000000000:<sourceQueueName>` from the SB `x-opt-deadletter-source` annotation; us-east-1 is a placeholder since the proxy doesn't model AWS regions, and the account id is `QueueUrlBuilder.PlaceholderAccountId`), `Aws2Azure-DeadLetterReason`, and `Aws2Azure-DeadLetterErrorDescription` (the latter two read from the dead-lettered message's application-properties, prefixed `Aws2Azure-` because SQS has no AWS-standard counterpart). All three respect the AttributeNames filter, are omitted entirely for non-DLQ messages, and are only emitted on the AMQP path (the REST path does not subscribe to DLQ subqueues yet)."
  - "Emulator divergence (Phase 2.7 Slice 6): the Azure Service Bus emulator does NOT echo the broker-assigned session-id back in the receiver attach response's `com.microsoft:session-filter` when the client requests `sessionId=null` (broker-assigned). The proxy's FIFO receive path correctly fails fast in that case with `InvalidOperationException`, but it means FIFO end-to-end coverage against the emulator is impossible. Real Azure Service Bus honours the AMQP contract and echoes the id, so the production path works. FIFO IT coverage lives in the real-Azure nightly smoke instead; lifecycle ITs against the emulator skip the two FIFO scenarios."
  - "Emulator divergence (Phase 2.7 Slice 7): the SB emulator's TTL-expiry sweeper does not reliably dead-letter messages once their `DefaultMessageTimeToLive` elapses and/or does not honour `ForwardDeadLetteredMessagesTo` on the resulting DLQ message within an integration-test budget — observed: forwarded message never arrives on the target queue within 45s. Real Service Bus's expiry pipeline runs every ~5s and performs the forward synchronously. DLQ-forward IT coverage lives in the real-Azure nightly smoke; the slice-7 emulator-backed DLQ test is gated with `Skip.If` documenting the divergence."
references:
  - https://docs.aws.amazon.com/AWSSimpleQueueService/latest/APIReference/API_ReceiveMessage.html
  - https://learn.microsoft.com/rest/api/servicebus/peek-lock-message-non-destructive-read
