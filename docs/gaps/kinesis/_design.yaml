service: kinesis
design_gaps:
  - area: Synthetic sequence numbers and iterator positioning
    status: by_design
    summary: >-
      Kinesis sequence numbers are minted by the proxy as (unixMs << 20) |
      counter and mapped to an Event Hubs enqueue-time position.
      AT_SEQUENCE_NUMBER / AFTER_SEQUENCE_NUMBER are therefore best-effort at
      millisecond granularity, and MillisBehindLatest is derived from the last
      record's enqueue timestamp versus the proxy clock.
    impact: >-
      Records sharing a millisecond may be returned together at a sequence-based
      boundary; exact per-record sequence positioning is not reproducible.
      ExplicitHashKey and SequenceNumberForOrdering are accepted for wire
      compatibility but ignored.
    workaround: >-
      Prefer TRIM_HORIZON / LATEST / AT_TIMESTAMP iterators where exact sequence
      positioning is not required.
    references:
      - https://learn.microsoft.com/rest/api/eventhub/
  - area: Shared broker cursor per consumer group
    status: by_design
    summary: >-
      Concurrent GetRecords callers on the same (connection, partition,
      consumer-group) share a pooled AMQP link and a single broker cursor. The
      proxy serialises the ReceiveBatch calls for internal consistency, but two
      callers holding distinct AWS shard iterators cannot independently replay
      or split records — whichever call drains the link first advances the
      cursor for the other.
    impact: >-
      This deviates from Kinesis, where each shard iterator is independent and
      replayable.
    workaround: >-
      Use the AWS-recommended single-consumer-per-shard pattern, or assign
      distinct consumer groups to independent consumers.
  - area: No resharding / enhanced fan-out / KCL lease model
    status: unsupported
    summary: >-
      Kinesis shards map to Event Hubs partitions, which are fixed at the hub
      level. Dynamic resharding (SplitShard/MergeShards), enhanced fan-out
      (SubscribeToShard), and the KCL DynamoDB lease/checkpoint model have no
      in-scope translation.
    impact: >-
      Applications that resize streams at runtime or rely on enhanced-fan-out
      throughput isolation cannot drive those code paths through the proxy.
    workaround: >-
      Provision Event Hubs partition count for peak load up front; use consumer
      groups for isolation.
workload_patterns:
  - id: kinesis_record_ingestion
    name: Basic record ingestion
    compatibility: conditional
    summary: >-
      PutRecord and PutRecords publish to provisioned Event Hubs partitions, but
      ordering-related request fields and returned sequence numbers differ.
    operations:
      - PutRecord
      - PutRecords
    design_gaps:
      - Synthetic sequence numbers and iterator positioning
    guidance: >-
      Use partition keys for routing and do not depend on
      SequenceNumberForOrdering or exact AWS sequence-number semantics.
  - id: kinesis_single_consumer_per_shard
    name: Single consumer per shard
    compatibility: conditional
    summary: >-
      Shard discovery and polling work best with one consumer loop per partition
      and timestamp/latest iterator positioning.
    operations:
      - ListShards
      - GetShardIterator
      - GetRecords
    design_gaps:
      - Synthetic sequence numbers and iterator positioning
      - Shared broker cursor per consumer group
    guidance: >-
      Prefer TRIM_HORIZON, LATEST, or AT_TIMESTAMP and dedicate a consumer group
      to each independent consumer.
  - id: kinesis_shared_consumer_group_replay
    name: Independent replaying consumers on one consumer group
    compatibility: blocked
    summary: >-
      Distinct AWS shard iterators cannot maintain independent replay positions
      when they share the pooled broker cursor.
    operations:
      - GetShardIterator
      - GetRecords
    design_gaps:
      - Shared broker cursor per consumer group
    guidance: >-
      Assign distinct Event Hubs consumer groups or redesign around one consumer
      per shard.
  - id: kinesis_resharding_enhanced_fanout_kcl
    name: Resharding, enhanced fan-out, or KCL lease management
    compatibility: blocked
    summary: >-
      Dynamic shard topology and enhanced fan-out have no equivalent in the
      exposed proxy surface.
    design_gaps:
      - No resharding / enhanced fan-out / KCL lease model
    guidance: >-
      Provision partitions for peak demand and manage consumer isolation with
      Event Hubs consumer groups.
