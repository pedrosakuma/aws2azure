service: kinesis
operation: ListShards
azure_equivalent: "Azure Event Hubs Service Bus management REST API"
status: partial
verified_real_azure:
  date: "2026-07-16"
  evidence: https://github.com/pedrosakuma/aws2azure/actions/runs/29473539261
  workflow_run: https://github.com/pedrosakuma/aws2azure/actions/runs/29473539261
sub_features:
  - name: ExclusiveStartShardId + MaxResults pagination
    status: implemented
    notes: "Paginates the Event Hubs partition list and emits aws2azure NextToken cursors when more mapped shards remain."
  - name: HMAC-signed NextToken cursors
    status: implemented
    notes: "Uses the Event Hubs shard iterator signing key (or an ephemeral fallback) to sign 5-minute list-shards cursors."
  - name: AT_LATEST / FROM_TRIM_HORIZON shard filters
    status: implemented
    notes: "These filter types are accepted as no-ops because Event Hubs always exposes the full open-partition set."
behavior_differences:
  - "Kinesis shards map 1:1 to Event Hubs partitions; shard ids are synthesised as shardId-<partitionId.PadLeft(12,'0')>."
  - "HashKeyRange values are a uniform even split of the 128-bit Kinesis hash space; Event Hubs does not expose AWS-compatible hash-key assignments."
  - "NextToken is an aws2azure-specific cursor, not an AWS-issued token; it encodes stream name + last shard id and expires after 5 minutes."
  - "Shard filter types other than AT_LATEST and FROM_TRIM_HORIZON currently return ValidationException."
  - "Core shard listing and pagination are validated against a live Azure Event Hubs namespace."
  - "Stream lifecycle (CreateStream / DeleteStream / IncreaseStreamRetentionPeriod) is out of scope — Event Hubs entities are provisioned out-of-band via ARM."
references:
  - https://docs.aws.amazon.com/kinesis/latest/APIReference/API_ListShards.html
  - https://learn.microsoft.com/en-us/rest/api/eventhub/
