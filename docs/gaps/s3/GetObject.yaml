service: s3
operation: GetObject
azure_equivalent: "GET https://{account}.blob.core.windows.net/{container}/{blob}"
status: implemented
sub_features:
  - name: Range requests (bytes=X-Y)
    status: implemented
  - name: conditional headers (If-Match / If-None-Match / If-Modified-Since / If-Unmodified-Since)
    status: implemented
  - name: standard response headers (ETag, Last-Modified, Content-Type, Content-Length, Content-Encoding, Cache-Control, Accept-Ranges, Content-Range)
    status: implemented
  - name: user metadata (x-amz-meta-*)
    status: implemented
    gap: "Translated from Azure x-ms-meta-*."
  - name: response header overrides (response-content-type, response-content-disposition, …)
    status: unsupported
  - name: server-side encryption customer keys (SSE-C)
    status: unsupported
  - name: versioning (versionId query)
    status: unsupported
    gap: "Routed to Unsupported; blob versioning will be a later slice."
behavior_differences:
  - "Streaming end-to-end: response body is forwarded without buffering."
  - "x-amz-id-2 carries the Azure x-ms-request-id for cross-system tracing."
  - "Presigned URLs are accepted (see PresignedUrl.yaml); the client must sign against the proxy host, and response-content-* query overrides are not honoured."
  # --- Conformance (Tier-2 LocalStack differential) accepted divergences ---
  # AWS SDKs dispatch error handling on HTTP status + <Code>, which the proxy
  # reproduces faithfully; the following non-contractual extras that real S3
  # emits on the error path are not reproduced and are accepted here.
  - "Error responses omit the server-side x-amz-id-2 correlation header that real S3 emits. [conformance:missing-header:x-amz-id-2]"
  - "Error envelopes omit the <HostId> element that real S3 emits. [conformance:missing-field:HostId]"
  - "Error content-type is 'application/xml; charset=utf-8'; real S3 may omit the charset parameter. [conformance:header-value:content-type]"
  - "NoSuchBucket envelopes omit the informational <BucketName> element real S3 includes. [conformance:nosuchbucket-get-object::missing-field:BucketName]"
  - "NoSuchKey envelopes omit the informational <Key> element real S3 includes. [conformance:nosuchkey-get-object::missing-field:Key]"
references:
  - https://docs.aws.amazon.com/AmazonS3/latest/API/API_GetObject.html
  - https://learn.microsoft.com/rest/api/storageservices/get-blob
