service: s3
operation: GetBucketAcl
azure_equivalent: "(no Azure equivalent — synthetic ownership-only response)"
status: partial
sub_features:
  - name: "owner reporting"
    status: implemented
    note: "Owner ID = SHA-256(accountName) hex; DisplayName = accountName."
  - name: "non-owner grants"
    status: unsupported
