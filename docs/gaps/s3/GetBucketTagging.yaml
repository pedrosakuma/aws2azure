service: s3
operation: GetBucketTagging
azure_equivalent: "GET {container}?restype=container&comp=metadata (single opaque metadata blob)"
status: partial
sub_features:
  - name: "tag round-trip"
    status: implemented
    notes: "Tags are stored as a base64-encoded S3 <Tagging> XML in a single container metadata key (aws2azurebuckettags). Atomic, no key-name mangling."
  - name: "NoSuchTagSet when never set"
    status: implemented
    notes: "Returned 404 with code NoSuchTagSet matching AWS."
  - name: "server-side enforcement (cost allocation, IAM tag conditions)"
    status: unsupported
    notes: "Azure has no native bucket-tagging surface to enforce these; tags are pure metadata."
behavior_differences:
  - "Bucket tags survive process restarts because they live on the container metadata, but they are invisible to any Azure-native tooling that does not know about the aws2azurebuckettags key."
references:
  - https://docs.aws.amazon.com/AmazonS3/latest/API/API_GetBucketTagging.html
  - https://learn.microsoft.com/rest/api/storageservices/get-container-metadata
