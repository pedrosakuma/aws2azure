service: s3
operation: GetBucketVersioning
azure_equivalent: "Container metadata (per-bucket toggle); reflects stored PutBucketVersioning intent"
status: partial
sub_features:
  - name: "configuration storage"
    status: partial
    notes: "The bucket-level versioning intent (Enabled/Suspended) is stored in container metadata and echoed back. Returns the empty 'never configured' document when unset."
behavior_differences:
  - "GET returns the per-bucket toggle persisted by PutBucketVersioning. Azure Blob versioning itself is account-scoped: actual version retention requires account-level versioning enabled out-of-band by the operator."
  - "MFADelete is never reported (not supported)."
references:
  - https://docs.aws.amazon.com/AmazonS3/latest/API/API_GetBucketVersioning.html
