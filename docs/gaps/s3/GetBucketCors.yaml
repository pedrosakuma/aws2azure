service: s3
operation: GetBucketCors
azure_equivalent: "(no equivalent — proxy returns 404 NoSuchCORSConfiguration)"
status: unsupported
sub_features:
  - name: "configuration storage"
    status: unsupported
    notes: "Azure has container-level CORS only via the Blob service properties (account-wide). The proxy does not yet bridge these."
behavior_differences:
  - "GET returns HTTP 404 with code NoSuchCORSConfiguration so clients receive the same shape as a never-configured S3 bucket instead of InternalError."
references:
  - https://docs.aws.amazon.com/AmazonS3/latest/API/API_GetBucketCors.html
