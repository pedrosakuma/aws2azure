service: s3
operation: PutBucketTagging
azure_equivalent: "PUT {container}?restype=container&comp=metadata"
status: partial
sub_features:
  - name: "replace whole tag set"
    status: implemented
    notes: "Single atomic Azure metadata write."
  - name: "50-tag limit per bucket"
    status: implemented
    notes: "Enforced before the Azure call."
  - name: "128-char key / 256-char value limits"
    status: implemented
    notes: "Enforced before the Azure call."
behavior_differences:
  - "Azure replaces the full metadata bag; the proxy uses bounded ETag/If-Match retry and re-merges every attempt so unrelated Azure metadata and other proxy intents are preserved."
references:
  - https://docs.aws.amazon.com/AmazonS3/latest/API/API_PutBucketTagging.html
