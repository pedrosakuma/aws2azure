service: s3
operation: PutBucketVersioning
azure_equivalent: "Container metadata (per-bucket toggle); account-level Blob versioning assumed pre-enabled"
status: partial
sub_features:
  - name: "configuration storage"
    status: partial
    notes: "Persists the bucket-level Status (Enabled/Suspended) in container metadata. Malformed/unrecognised bodies rejected with MalformedXML."
  - name: "MFADelete"
    status: unsupported
    notes: "MFADelete is silently ignored / unsupported."
behavior_differences:
  - "Stores the S3 bucket-level intent only; does not toggle account-level Azure Blob versioning (no control-plane). Operators must enable account versioning out-of-band for versionId retention to function (opt-in, documented per topology)."
references:
