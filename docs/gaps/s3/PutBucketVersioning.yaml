  - name: "MFADelete"
    status: unsupported
    notes: "MFADelete is silently ignored / unsupported."
behavior_differences:
  - "Stores the S3 bucket-level intent only; does not toggle account-level Azure Blob versioning (no control-plane). Operators must enable account versioning out-of-band for versionId retention to function (opt-in, documented per topology)."
  - "Read-merge-write of container metadata is last-writer-wins (no If-Match), so concurrent PutBucketVersioning/PutBucketTagging may drop each other; rare control-plane op."
references:
