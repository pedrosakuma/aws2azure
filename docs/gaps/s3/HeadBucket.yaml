service: s3
operation: HeadBucket
azure_equivalent: "HEAD https://{account}.blob.core.windows.net/{container}?restype=container"
status: implemented
sub_features:
  - name: x-amz-bucket-region
    status: unsupported
    gap: "Region is implicit in the configured Azure storage account; the header is not emitted."
behavior_differences:
