service: s3
operation: ListBuckets
azure_equivalent: "GET https://{account}.blob.core.windows.net/?comp=list"
status: implemented
sub_features:
  - name: pagination
    status: unsupported
    gap: "Azure returns the full container list in a single response for typical bucket counts; the proxy does not synthesize pagination tokens."
  - name: owner-identity
    status: partial
    notes: "S3 Owner/ID + DisplayName are synthesized from the authenticated AWS access key id (no Azure-side equivalent)."
behavior_differences:
  - "CreationDate is populated from the container Last-Modified header — close enough for S3 SDKs but not strictly equivalent."
  - "Single fixed storage account per process (BlobCredentials); cross-account listing is out of scope."
references:
  - https://docs.aws.amazon.com/AmazonS3/latest/API/API_ListBuckets.html
  - https://learn.microsoft.com/rest/api/storageservices/list-containers2
