sub_features:
  - name: "version listing (Version entries)"
    status: implemented
    verified_real_azure: "run 28477441131 (2026-06-30)"
    notes: "Azure blob versions map to S3 <Version> entries (Key, VersionId, IsLatest, LastModified, ETag, Size). Requires account-level Blob versioning; otherwise each key lists once as IsLatest with VersionId 'null'."
  - name: "prefix / delimiter / max-keys / key-marker pagination"
    status: implemented
    verified_real_azure: "run 28477441131 (2026-06-30)"
  - name: "delete markers"
    status: unsupported
    notes: "Azure delete markers do not map 1:1 to S3 delete markers; <DeleteMarker> entries are not emitted."
  - name: "version-id-marker pagination"
    status: unsupported
    notes: "Pagination keys on key-marker only; Azure's marker is opaque and key-ordered."
behavior_differences:
