service: sns
operation: Subscribe
azure_equivalent: "Azure Service Bus topic subscriptions"
status: partial
sub_features:
  - name: Service Bus subscription provisioning
    status: implemented
    notes: "Creates an Azure Service Bus topic subscription with deterministic subscription IDs derived from TopicArn + Protocol + Endpoint so repeat Subscribe calls return the same ARN. Supported protocols in this slice: sqs, https, http."
  - name: Subscription metadata projection
    status: implemented
    notes: "Stores protocol, endpoint, compact filter policy JSON, and RawMessageDelivery in SubscriptionDescription.UserMetadata. Requests that would exceed the 1024-character Service Bus UserMetadata limit are rejected with InvalidParameter."
  - name: Subscriber delivery forwarder
    status: unsupported
    notes: "This slice only manages subscription metadata. Messages accumulate in the Service Bus subscription until a later slice wires forwarding to HTTPS endpoints or SQS-backed queues."
behavior_differences:
  - "HTTPS / HTTP subscriptions are auto-confirmed immediately. SNS token-based confirmation is not implemented in this slice."
  - "When a deterministic subscription already exists but its stored metadata differs from the new Subscribe request, aws2azure returns the existing ARN and logs a warning instead of replacing the subscription."
  - "Only sqs, https, and http protocols are accepted. email, email-json, sms, lambda, application, and firehose are rejected with InvalidParameter."
references:
  - https://docs.aws.amazon.com/sns/latest/api/API_Subscribe.html
  - https://docs.aws.amazon.com/sns/latest/dg/sns-send-message-to-sqs-cross-account.html
  - https://learn.microsoft.com/azure/service-bus-messaging/service-bus-resource-manager-rest
