service: sns
operation: ListSubscriptions
azure_equivalent: "Azure Service Bus topic subscriptions"
status: partial
sub_features:
  - name: Cross-topic subscription enumeration
    status: implemented
    notes: "Enumerates Service Bus topics first, then pages each topic's subscriptions and flattens the results into SNS member entries."
behavior_differences:
  - "NextToken is an opaque base64-encoded JSON cursor containing the current topic offset and subscription offset within that topic."
  - "Listing all subscriptions requires cross-topic enumeration over the Service Bus management plane and can be more expensive than native SNS ListSubscriptions."
references:
