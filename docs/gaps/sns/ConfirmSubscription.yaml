service: sns
operation: ConfirmSubscription
azure_equivalent: "Azure Service Bus topic subscriptions"
status: partial
sub_features:
  - name: Auto-confirmed no-op
    status: implemented
    notes: "Subscriptions are treated as immediately confirmed when created. ConfirmSubscription accepts either the deterministic 20-hex subscription id or the matching synthetic SubscriptionArn and returns success without mutating Azure resources."
behavior_differences:
  - "SNS confirmation tokens are not validated against an out-of-band challenge flow."
  - "Arbitrary tokens and a SubscriptionArn token bound to a different TopicArn are rejected with InvalidParameter; the operation does not synthesize a fallback identifier."
  - "ConfirmSubscription applies to the Service Bus subscription-management profile only and does not confirm Azure Event Grid event subscriptions."
references:
  - https://docs.aws.amazon.com/sns/latest/api/API_ConfirmSubscription.html
  - https://learn.microsoft.com/azure/service-bus-messaging/service-bus-resource-manager-rest
