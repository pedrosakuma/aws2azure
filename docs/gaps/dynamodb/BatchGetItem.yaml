service: dynamodb
operation: BatchGetItem
azure_equivalent: "Azure Cosmos DB (Core SQL API)"
status: partial
sub_features:
  - name: Multi-table fan-out
    status: implemented
    notes: "Each table's keys are grouped by Cosmos partition key. Keys that share a partition are served by a single `SELECT * FROM c WHERE c.id IN (...)` query (one round-trip per partition); a lone key keeps the cheap `GET /docs/{id}` point read. Bounded parallelism (16 concurrent calls) keeps a single multi-partition request from saturating the proxy."
  - name: Single-partition batching
    status: implemented
    notes: "issue #185 — a BatchGetItem whose keys all share a partition (e.g. 25 sort keys under one HASH) issues one IN-list Cosmos query instead of N point reads, draining `x-ms-continuation` as needed. Roughly an order of magnitude fewer round-trips for the common single-partition shape."
  - name: Per-item miss semantics
    status: implemented
    notes: "Missing items are omitted from `Responses` (matching DynamoDB), not surfaced as errors. In the batched-query path a requested key whose document is absent from the partition is simply left out of the result set."
  - name: Throttling → UnprocessedKeys
    status: implemented
    notes: "A Cosmos 429 on a point read drops that key into `UnprocessedKeys`; a 429 on a batched single-partition query drops the whole partition's keys into `UnprocessedKeys`. Either way SDK retry loops re-issue only the throttled subset and the rest of the batch still returns 200."
  - name: ProjectionExpression (per table)
    status: partial
    notes: "Top-level attribute names + `#alias` honoured. Nested paths (`a.b`, `a[0]`) rejected."
  - name: ExpressionAttributeNames (per table)
    status: implemented
  - name: ConsistentRead (per table)
    status: implemented
    notes: "Sets `x-ms-consistency-level: Strong` on every Cosmos read (point read or batched query) for that table; account-level consistency cap still applies."
  - name: 100-item-per-call cap
    status: implemented
    notes: "Requests over 100 keys (across all tables) rejected with ValidationException, matching the DynamoDB hard limit."
  - name: Duplicate-key rejection
    status: implemented
    notes: "Same (table, pk, id) repeated in a single call → ValidationException, matching DynamoDB."
  - name: Legacy AttributesToGet
    status: unsupported
    notes: "Rejected with ValidationException — use ProjectionExpression."
  - name: ReturnConsumedCapacity
    status: unsupported
    notes: "Silently ignored; response omits ConsumedCapacity."
behavior_differences:
  - "Key attribute values (S/B) are hex-encoded into the internal Cosmos `id`/partition-key (S → hex(UTF-8 bytes), B → hex(raw bytes), N → order-preserving numeric digit string), accepting Cosmos-forbidden characters (`/`, `\\`, `?`, `#`) and fixing B byte-ordering. Effective raw key limit ~127 bytes; over-limit keys are rejected with ValidationException. **On-disk-format breaking change** vs earlier builds. See PutItem for the full rationale."
  - "16 MB total response size cap (DynamoDB) not enforced — bounded only by the underlying Cosmos response sizes."
  - "Hard error on any single item (non-429, non-404) fails the whole batch with a single error response — DynamoDB has the same all-or-nothing semantics for non-throttle failures."
  - "Cosmos 429 maps to `UnprocessedKeys` rather than `ProvisionedThroughputExceededException`; matches DDB SDK retry behaviour. For single-partition batched queries the throttle granularity is the whole partition group rather than the individual key."
  - "Only validated against scripted Cosmos REST fakes; not yet exercised against real Azure Cosmos."
references:
  - https://docs.aws.amazon.com/amazondynamodb/latest/APIReference/API_BatchGetItem.html
