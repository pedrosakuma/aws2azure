service: dynamodb
operation: DescribeTimeToLive
azure_equivalent: "Azure Cosmos DB container `defaultTtl` / per-item `ttl`"
status: stub
sub_features:
  - name: Returns DISABLED
    status: implemented
    notes: "Returns `{TimeToLiveDescription: {TimeToLiveStatus: \"DISABLED\"}}` for every table without consulting Cosmos. SDK callers that probe TTL on every connection get a clean shape instead of a 501."
behavior_differences:
  - "Always reports DISABLED — even if a Cosmos container has `defaultTtl` configured out-of-band, this proxy will not surface that state."
  - "Pairs with `UpdateTimeToLive` which is currently `unsupported`; once item-level TTL translation lands, this op will be promoted to `partial`."
references:
  - https://docs.aws.amazon.com/amazondynamodb/latest/APIReference/API_DescribeTimeToLive.html
