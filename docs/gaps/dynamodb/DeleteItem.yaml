service: dynamodb
operation: DeleteItem
azure_equivalent: "Azure Cosmos DB (Core SQL API)"
status: partial
sub_features:
  - name: HASH-only key tables
    status: implemented
  - name: HASH+RANGE composite key tables
    status: implemented
  - name: Idempotent delete (missing item returns success)
    status: implemented
    notes: "Cosmos 404 → DynamoDB 200 empty, matching DynamoDB semantics."
  - name: ConditionExpression / Expected / ConditionalOperator
    status: implemented
    notes: "Conditional path performs GET → evaluate → DELETE(If-Match) with retry on 412/Conflict/404. If the condition evaluates true against a missing item, the operation returns success as a no-op. Failure returns HTTP 400 ConditionalCheckFailedException with optional Item when ReturnValuesOnConditionCheckFailure=ALL_OLD."
  - name: ExpressionAttributeNames / ExpressionAttributeValues
    status: unsupported
  - name: ReturnValues
    status: partial
    notes: "Only NONE accepted; ALL_OLD rejected with ValidationException."
  - name: ReturnConsumedCapacity / ReturnItemCollectionMetrics
    status: unsupported
behavior_differences:
  - "Missing container (table deleted mid-op) is distinguished from missing item via Cosmos `x-ms-substatus: 1003` and surfaces as ResourceNotFoundException; missing items remain idempotent successes."
  - "Key values containing `/`, `\\`, `?`, `#`, empty strings, or values longer than 255 chars are rejected with ValidationException."
  - "Cosmos 429 surfaced as DynamoDB ProvisionedThroughputExceededException — including 429 on metadata read."
  - "Only validated against scripted Cosmos REST + emulator; not yet exercised against real Azure Cosmos."
references:
  - https://docs.aws.amazon.com/amazondynamodb/latest/APIReference/API_DeleteItem.html
