service: dynamodb
operation: GetItem
azure_equivalent: "Azure Cosmos DB (Core SQL API)"
status: partial
sub_features:
  - name: HASH-only key tables
    status: implemented
  - name: HASH+RANGE composite key tables
    status: implemented
  - name: Full wire-form round-trip on response Item
    status: implemented
  - name: ConsistentRead
    status: partial
    notes: "Mapped to Cosmos `x-ms-consistency-level: Strong` request header. Honoured only when the account's max consistency permits Strong; Session/weaker accounts silently downgrade."
  - name: ProjectionExpression / AttributesToGet
    status: unsupported
    notes: "Rejected with ValidationException pending expression parser slice (#12)."
  - name: ExpressionAttributeNames
    status: unsupported
  - name: ReturnConsumedCapacity
    status: unsupported
behavior_differences:
  - "Missing item yields 200 with no `Item` field (matches DynamoDB)."
  - "Missing container (table deleted mid-op) is distinguished from missing item via Cosmos `x-ms-substatus: 1003` and surfaces as ResourceNotFoundException."
  - "Key values containing `/`, `\\`, `?`, `#`, empty strings, or values longer than 255 chars are rejected with ValidationException."
  - "ConsistentRead effectiveness is account-dependent; document divergence per deployment."
  - "Cosmos 429 on metadata read surfaces as ProvisionedThroughputExceededException (not a fake ResourceNotFoundException)."
  - "Only validated against scripted Cosmos REST + emulator; not yet exercised against real Azure Cosmos."
references:
  - https://docs.aws.amazon.com/amazondynamodb/latest/APIReference/API_GetItem.html
