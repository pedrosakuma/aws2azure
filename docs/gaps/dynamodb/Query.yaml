service: dynamodb
operation: Query
azure_equivalent: "Azure Cosmos DB (Core SQL API)"
status: partial
sub_features:
  - name: KeyConditionExpression on HASH-only tables
    status: implemented
  - name: KeyConditionExpression on HASH+RANGE tables (= / < / <= / > / >= / BETWEEN / begins_with)
    status: implemented
    notes: "Translated to a partition-scoped Cosmos SQL query against `c.pk = <hash>` with a predicate on `c.id` (which holds the formatted RANGE value). RANGE (and HASH) key values share one order-preserving, digits-only codec with storage (S → hex(UTF-8 bytes); B → hex(raw bytes); N → fixed-width sign+exponent+mantissa digit string), so ordered comparisons, BETWEEN, and begins_with on S/B sort keys compare in correct DynamoDB byte order — `begins_with` maps to an exact prefix match because hex is prefix-preserving on byte boundaries — and ordered comparisons / BETWEEN on N sort keys compare in true numeric order. `begins_with` on an N sort key is rejected (ValidationException), matching real DDB. Query operands and stored ids share the codec, so they always agree."
  - name: FilterExpression
    status: implemented
    notes: "Pushed into the Cosmos SQL WHERE clause where safe; the remainder is evaluated in-process after the Cosmos page returns. Count always reflects post-filter rows. ScannedCount reflects pre-filter rows: when nothing is pushed it is the streamed count; when a fragment is pushed (Cosmos pre-filters) a complete unbounded query recovers it with a partition-scoped server-side `SELECT VALUE COUNT(1)` over the same key scope minus the pushed filter, so it stays faithful to DynamoDB. The pushed-filter + Limit combination is a documented divergence (see behavior_differences). Predicates supported: comparison (=, <, <=, >, >=), BETWEEN, IN, attribute_exists/not_exists/type, begins_with, contains, AND/OR/NOT. Pushdown carve-outs (these stay residual): `<>` on any path (DDB cross-type semantics), ordered comparisons / BETWEEN on B (base64 lexical order ≠ underlying byte order), begins_with on B, size(), nested paths whose first segment matches the reserved `_a2a:` envelope prefix. Numeric equality (=) and IN push a hybrid IS_NUMBER / `StringToNumber(_a2a:N)` branch as a *prefilter only* — false negatives are impossible by construction (envelope values cannot exactly equal a round-trippable parameter) and the client-side evaluator re-checks the exact canonical string anyway. Numeric ordered comparisons (<, <=, >, >=) and BETWEEN widen the envelope branch to `IS_DEFINED(_a2a:N)` so every envelope-stored row reaches the residual evaluator — otherwise `StringToNumber` rounding could false-negative boundary values."
  - name: ProjectionExpression
    status: partial
    notes: "Top-level attributes and `#alias` references are honoured. Nested paths (`a.b`, `a[0]`) are not yet supported and are rejected with ValidationException."
  - name: ExpressionAttributeNames / ExpressionAttributeValues
    status: implemented
  - name: Limit
    status: implemented
  - name: ExclusiveStartKey / LastEvaluatedKey
    status: implemented
    notes: "Pagination round-trips the Cosmos `x-ms-continuation` token inside a sentinel attribute `__a2a_continuation` (typed-string `S`). Most AWS SDKs treat LastEvaluatedKey as opaque and pass it back verbatim, which is what the proxy requires."
  - name: ScanIndexForward
    status: implemented
    notes: "Maps to `ORDER BY c.id ASC|DESC`; only emitted for composite-key tables (hash-only Query returns at most one item)."
  - name: ConsistentRead
    status: implemented
    notes: "Forwards `x-ms-consistency-level: Strong` for the Cosmos query when true; account-level consistency cap still applies. Opt-in startup probe (`DynamoDb.ConsistencyCheck` = Warn/Required, #204) flags accounts that cannot honor Strong at boot."
  - name: Select
    status: partial
    notes: "ALL_ATTRIBUTES (default), SPECIFIC_ATTRIBUTES, and COUNT supported. ALL_PROJECTED_ATTRIBUTES requires IndexName and is rejected."
  - name: IndexName (GSI / LSI)
    status: unsupported
    notes: "Querying secondary indexes is not yet supported; requests carrying IndexName are rejected with ValidationException."
  - name: Legacy KeyConditions / QueryFilter / ConditionalOperator
    status: unsupported
    notes: "Legacy v1 parameters are rejected loudly with ValidationException — use KeyConditionExpression / FilterExpression."
  - name: ReturnConsumedCapacity
    status: unsupported
    notes: "Silently ignored; response omits ConsumedCapacity."
behavior_differences:
  - "Cosmos storage-metadata system fields (`_rid`/`_self`/`_etag`/`_ts`/`_attachments`/`_lsn`/`_metadata`) are stripped from response items and never surface as DynamoDB attributes (#203). Caveat: a user attribute literally named identically is also stripped on read; the durable fix is attribute namespacing."
  - "Sort-key ordering follows the order-preserving key codec: S/B sort keys compare in true byte order and N sort keys compare in true numeric order (numerically-equal forms like `42`/`42.0` collapse to one id). `begins_with` is only valid on S/B sort keys; on an N sort key it is rejected with ValidationException, matching real DDB."
  - "Every Query is partition-scoped — there is no cross-partition fan-out — matching DynamoDB's single-partition guarantee."
  - "Multi-region Cosmos accounts honor configured `cosmos.preferredRegions` for read locality and client-side failover: Query routes to the first available readable preferred region, then remaining readable regions, then the configured account endpoint. Failover is implemented for regional 503/408 and transport failures; emulator coverage is unavailable because the Cosmos emulator is single-region."
  - "Cosmos binary JSON response bodies are supported only when explicitly enabled with `DynamoDb.CosmosBinaryResponses=true`; the proxy sends `x-ms-cosmos-supported-serialization-formats: CosmosBinary`, decodes `0x80` CosmosBinary query pages back to JSON before the normal DynamoDB response transform, and falls back to the unchanged text path whenever Cosmos returns text. Emulator-unverified: the Cosmos DB Linux emulator used by CI does not emit CosmosBinary bodies."
  - "When a FilterExpression is pushed into the Cosmos SQL, ScannedCount for a single complete unbounded query (no Limit, no incoming ExclusiveStartKey, no outgoing continuation) is recovered faithfully via a partition-scoped server-side `SELECT VALUE COUNT(1)` over the same key scope minus the pushed filter. The recovery is deliberately skipped on a paginated pushed-filter query — both for a Limit and for any page reached via ExclusiveStartKey — because the whole-scope aggregate cannot reproduce a single page's pre-filter boundary; on those pages ScannedCount falls back to the streamed (post-prefilter) count and may be lower than DynamoDB's. The proxy preserves the Cosmos page boundary in that case: it returns after the first non-empty page and surfaces the Cosmos continuation as LastEvaluatedKey, rather than topping up matches across pages with a drifted page boundary. If the count aggregate cannot be read it falls back to the streamed count. Because the recovery aggregate is a second round-trip, a concurrent write between the data pass and the count means the recovered ScannedCount is from a marginally different snapshot than Count — real DynamoDB scans-then-filters in one pass and cannot exhibit this; it is accepted as best-effort."
  - "Cosmos 429 (throttled) is surfaced as DynamoDB ProvisionedThroughputExceededException."
  - "Smoke-verified against the Cosmos DB Linux emulator (vNext preview) via Testcontainers; not yet exercised against real Azure Cosmos DB."
references:
  - https://docs.aws.amazon.com/amazondynamodb/latest/APIReference/API_Query.html
