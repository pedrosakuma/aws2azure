service: dynamodb
operation: Scan
azure_equivalent: "Azure Cosmos DB (Core SQL API)"
status: partial
sub_features:
  - name: Full-table scan
    status: implemented
    notes: "Translated to a cross-partition Cosmos SQL query (`x-ms-documentdb-query-enablecrosspartition: true`). Every Scan is an O(N) walk of the container — expensive in RU."
  - name: FilterExpression
    status: implemented
    notes: "Evaluated in-process after each Cosmos page returns, so ScannedCount reflects pre-filter rows and Count reflects post-filter rows — matching DynamoDB."
  - name: ProjectionExpression
    status: partial
    notes: "Top-level attributes and `#alias` references are honoured. Nested paths (`a.b`, `a[0]`) are not yet supported and are rejected with ValidationException."
  - name: ExpressionAttributeNames / ExpressionAttributeValues
    status: implemented
  - name: Limit
    status: implemented
    notes: "Caps the *scanned* (pre-filter) row count, matching DynamoDB. pageSize is sized to the remaining evaluation budget so the per-page continuation never skips rows."
  - name: ExclusiveStartKey / LastEvaluatedKey
    status: implemented
    notes: "Pagination round-trips the Cosmos `x-ms-continuation` token inside a sentinel attribute `__a2a_continuation` (typed-string `S`). Most AWS SDKs treat LastEvaluatedKey as opaque and pass it back verbatim."
  - name: ConsistentRead
    status: implemented
    notes: "Forwards `x-ms-consistency-level: Strong` for the Cosmos query when true; account-level consistency cap still applies."
  - name: Select
    status: partial
    notes: "ALL_ATTRIBUTES (default), SPECIFIC_ATTRIBUTES, and COUNT supported. ALL_PROJECTED_ATTRIBUTES requires IndexName and is rejected."
  - name: IndexName (GSI / LSI)
    status: unsupported
    notes: "Scanning secondary indexes is not yet supported; requests carrying IndexName are rejected with ValidationException."
  - name: Parallel scan (Segment / TotalSegments)
    status: unsupported
    notes: "Rejected with ValidationException. Cosmos cross-partition queries fan out internally; explicit per-segment parallelism is deferred to a later slice."
  - name: Legacy ScanFilter / ConditionalOperator / AttributesToGet
    status: unsupported
    notes: "Legacy v1 parameters are rejected loudly with ValidationException — use FilterExpression / ProjectionExpression."
  - name: ReturnConsumedCapacity
    status: unsupported
    notes: "Silently ignored; response omits ConsumedCapacity."
behavior_differences:
  - "Scan order is **not** stable. Cosmos cross-partition query does not guarantee a deterministic walk across partitions; DynamoDB Scan is also unordered, but specific item ordering across pages may differ."
  - "Cosmos 429 (throttled) is surfaced as DynamoDB ProvisionedThroughputExceededException — expect this often on large scans."
  - "RU cost is significant for cross-partition scans; the proxy does no rate-limiting beyond what Cosmos imposes."
  - "Only validated against scripted Cosmos REST fakes; not yet exercised against real Azure Cosmos."
references:
  - https://docs.aws.amazon.com/amazondynamodb/latest/APIReference/API_Scan.html

