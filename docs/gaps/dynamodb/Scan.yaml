service: dynamodb
operation: Scan
azure_equivalent: "Azure Cosmos DB (Core SQL API)"
status: partial
sub_features:
  - name: Full-table scan
    status: implemented
    notes: "Translated to a cross-partition Cosmos SQL query (`x-ms-documentdb-query-enablecrosspartition: true`). Every Scan is an O(N) walk of the container â€” expensive in RU."
  - name: FilterExpression
    status: implemented
    notes: "Pushed into the Cosmos SQL WHERE clause where safe; the remainder is evaluated in-process after each Cosmos page returns. Count always reflects post-filter rows. ScannedCount reflects pre-filter rows: when nothing is pushed it is the streamed count; when a fragment is pushed (Cosmos pre-filters at the storage layer) a complete unbounded pass recovers it with a server-side `SELECT VALUE COUNT(1)` over the same scope minus the pushed filter, so it stays faithful to DynamoDB. The pushed-filter + Limit combination is a documented divergence (see behavior_differences). Same pushdown carve-outs as Query: `<>`, ordered comparisons / BETWEEN / begins_with on B, size(), and paths whose first segment matches the reserved `_a2a:` envelope prefix stay residual. Numeric equality (=) and IN push a hybrid IS_NUMBER / `StringToNumber(_a2a:N)` branch as a *prefilter only* (false negatives impossible by construction; client-side evaluator re-checks the exact canonical string anyway). Numeric ordered comparisons (<, <=, >, >=) and BETWEEN widen the envelope branch to `IS_DEFINED(_a2a:N)` so every envelope-stored row reaches the residual evaluator â€” otherwise `StringToNumber` rounding could false-negative boundary values."
  - name: ProjectionExpression
    status: partial
    notes: "Top-level attributes and `#alias` references are honoured. Nested paths (`a.b`, `a[0]`) are not yet supported and are rejected with ValidationException."
  - name: ExpressionAttributeNames / ExpressionAttributeValues
    status: implemented
  - name: Limit
    status: implemented
    notes: "Caps the *scanned* (pre-filter) row count when the filter is residual-only; pageSize is sized to the remaining evaluation budget so the per-page continuation never skips rows. When a FilterExpression is pushed (fully or partially) into the Cosmos SQL, Cosmos pre-filters at the storage layer; an unbounded scan recovers the faithful ScannedCount via a server-side count, but a Limit cannot be reconciled with server-side pre-filtering â€” see behavior_differences for the page-boundary trade-off."
  - name: ExclusiveStartKey / LastEvaluatedKey
    status: implemented
    notes: "Pagination round-trips the Cosmos `x-ms-continuation` token inside a sentinel attribute `__a2a_continuation` (typed-string `S`). Most AWS SDKs treat LastEvaluatedKey as opaque and pass it back verbatim."
  - name: ConsistentRead
    status: implemented
    notes: "Forwards `x-ms-consistency-level: Strong` for the Cosmos query when true; account-level consistency cap still applies. Opt-in startup probe (`DynamoDb.ConsistencyCheck` = Warn/Required, #204) flags accounts that cannot honor Strong at boot."
  - name: Select
    status: partial
    notes: "ALL_ATTRIBUTES (default), SPECIFIC_ATTRIBUTES, and COUNT supported. ALL_PROJECTED_ATTRIBUTES requires IndexName and is rejected."
  - name: IndexName (GSI / LSI)
    status: unsupported
    notes: "Scanning secondary indexes is not yet supported; requests carrying IndexName are rejected with ValidationException."
  - name: Parallel scan (Segment / TotalSegments)
    status: unsupported
    notes: "Rejected with ValidationException. Cosmos cross-partition queries fan out internally; explicit per-segment parallelism is deferred to a later slice."
  - name: Legacy ScanFilter / ConditionalOperator / AttributesToGet
    status: unsupported
    notes: "Legacy v1 parameters are rejected loudly with ValidationException â€” use FilterExpression / ProjectionExpression."
  - name: ReturnConsumedCapacity
    status: unsupported
    notes: "Silently ignored; response omits ConsumedCapacity."
behavior_differences:
  - "Cosmos storage-metadata system fields (`_rid`/`_self`/`_etag`/`_ts`/`_attachments`/`_lsn`/`_metadata`) are stripped from response items and never surface as DynamoDB attributes (#203). Caveat: a user attribute literally named identically is also stripped on read; the durable fix is attribute namespacing."
  - "Scan order is **not** stable. Cosmos cross-partition query does not guarantee a deterministic walk across partitions; DynamoDB Scan is also unordered, but specific item ordering across pages may differ."
  - "Multi-region Cosmos accounts honor configured `cosmos.preferredRegions` for read locality and client-side failover: Scan routes to the first available readable preferred region, then remaining readable regions, then the configured account endpoint. Failover is implemented for regional 503/408 and transport failures; emulator coverage is unavailable because the Cosmos emulator is single-region."
  - "When a FilterExpression is pushed into the Cosmos SQL, ScannedCount for a single complete unbounded scan (no Limit, no incoming ExclusiveStartKey, no outgoing continuation) is recovered faithfully via a server-side `SELECT VALUE COUNT(1)` over the same scope minus the pushed filter. The recovery is deliberately skipped on a paginated pushed-filter scan â€” both for a Limit and for any page reached via ExclusiveStartKey â€” because the whole-scope aggregate cannot reproduce a single page's pre-filter boundary; on those pages ScannedCount falls back to the streamed (post-prefilter) count and may be lower than DynamoDB's. The proxy preserves the Cosmos page boundary in that case: it returns after the first non-empty page and surfaces the Cosmos continuation as LastEvaluatedKey, rather than topping up matches across pages with a drifted page boundary. If the count aggregate cannot be read it falls back to the streamed count. Because the recovery aggregate is a second round-trip, a concurrent write between the data pass and the count means the recovered ScannedCount is from a marginally different snapshot than Count â€” real DynamoDB scans-then-filters in one pass and cannot exhibit this; it is accepted as best-effort."
  - "Cosmos 429 (throttled) is surfaced as DynamoDB ProvisionedThroughputExceededException â€” expect this often on large scans."
  - "RU cost is significant for cross-partition scans; the proxy does no rate-limiting beyond what Cosmos imposes."
  - "Smoke-verified against the Cosmos DB Linux emulator (vNext preview) via Testcontainers; not yet exercised against real Azure Cosmos DB."
references:
  - https://docs.aws.amazon.com/amazondynamodb/latest/APIReference/API_Scan.html
