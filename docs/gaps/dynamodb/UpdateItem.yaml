service: dynamodb
operation: UpdateItem
azure_equivalent: "Azure Cosmos DB (Core SQL API)"
status: partial
sub_features:
  - name: UpdateExpression grammar (SET / REMOVE / ADD / DELETE)
    status: implemented
    notes: "Hand-rolled lexer + parser shared with the future Condition/Filter slice."
  - name: SET arithmetic (`a = a + :i`, `a = :x - :y`)
    status: implemented
    notes: "Decimal arithmetic preserves up to 28-29 significant digits; DynamoDB allows 38. Overflow surfaces as ValidationException."
  - name: SET functions `if_not_exists(path, fallback)` and `list_append(l1, l2)`
    status: implemented
  - name: SET on nested paths (`addr.zip`, `items[0].name`)
    status: implemented
    notes: "Parent path must already exist as a map/list, matching DynamoDB. Creating a deeply-nested fresh structure requires top-level SET."
  - name: REMOVE on nested paths and missing attributes
    status: implemented
    notes: "REMOVE on a missing path is a no-op."
  - name: ADD on numeric attribute (create-if-missing + addition)
    status: implemented
  - name: ADD / DELETE on string/number/binary sets (union / subtract)
    status: implemented
    notes: "Empty result set causes the attribute to be removed entirely, matching DynamoDB."
  - name: AttributeUpdates (legacy) PUT / DELETE / ADD
    status: implemented
    notes: "Normalised internally into the same UpdateExpression AST."
  - name: ExpressionAttributeNames / ExpressionAttributeValues (`#name`, `:value`)
    status: implemented
  - name: Path overlap detection
    status: implemented
    notes: "Two paths in the same expression where one is a prefix of the other are rejected with ValidationException."
  - name: ReturnValues (NONE / ALL_OLD / UPDATED_OLD / ALL_NEW / UPDATED_NEW)
    status: implemented
    notes: "UPDATED_OLD/UPDATED_NEW project only the top-level attributes touched by the expression, matching AWS."
  - name: Create-if-missing (upsert) semantics
    status: implemented
    notes: "Atomic create with `If-None-Match: *` when the target item does not exist; concurrent create races surface as Cosmos 409 and are replayed by the optimistic-retry loop against the winner's state."
  - name: ConditionExpression / Expected / ConditionalOperator
    status: implemented
    notes: "Modern ConditionExpression and legacy Expected + ConditionalOperator both supported; mutual exclusion enforced with ValidationException. Evaluator covers comparisons, AND/OR/NOT, BETWEEN, IN, attribute_exists/not_exists/type, begins_with, contains, size(). Failure returns HTTP 400 ConditionalCheckFailedException; ReturnValuesOnConditionCheckFailure=ALL_OLD includes the prior item."
  - name: ReturnConsumedCapacity / ReturnItemCollectionMetrics
    status: unsupported
    notes: "Silently ignored; response omits ConsumedCapacity / ItemCollectionMetrics."
behavior_differences:
  - "Key attribute values (S/B) are hex-encoded into the internal Cosmos `id`/partition-key (S → hex(UTF-8 bytes), B → hex(raw bytes), N → order-preserving numeric digit string), accepting Cosmos-forbidden characters (`/`, `\\`, `?`, `#`) and fixing B byte-ordering. Effective raw key limit ~127 bytes; over-limit keys are rejected with ValidationException. **On-disk-format breaking change** vs earlier builds. See PutItem for the full rationale."
  - "Atomicity is implemented as a GET → modify → PUT(If-Match) (or atomic-create with If-None-Match) loop with up to 4 retries on Cosmos 412/409. Sustained contention surfaces as InternalServerError after the retry budget is exhausted."
  - "Numeric arithmetic is performed with System.Decimal (28-29 significant digits) rather than DynamoDB's 38-digit precision. Operands exceeding the proxy's precision are rejected up front with ValidationException to avoid silent rounding; overflow also throws ValidationException."
  - "Key attributes referenced by the request are always reinforced into the resulting item — a REMOVE targeting the partition or sort key never deletes them in the stored doc."
  - "Cosmos 429 (throttled) is surfaced to clients as DynamoDB ProvisionedThroughputExceededException."
  - "Smoke-verified against the Cosmos DB Linux emulator (vNext preview) via Testcontainers; not yet exercised against real Azure Cosmos DB."
references:
  - https://docs.aws.amazon.com/amazondynamodb/latest/APIReference/API_UpdateItem.html
  - https://docs.aws.amazon.com/amazondynamodb/latest/developerguide/Expressions.UpdateExpressions.html
