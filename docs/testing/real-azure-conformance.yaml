schema_version: 1
services:
  - service: s3
    scenarios:
      - id: object-lifecycle
        priority: p0
        category: core
        evidence_source: real_azure
        establishes_verification: true
        description: Object and bucket create, write, read, delete lifecycle.
        operations: [CreateBucket, PutObject, GetObject, DeleteObject, DeleteBucket]
        tests:
          - Aws2Azure.IntegrationTests.S3.S3RealAzureSmokeTests.Object_lifecycle_round_trips_against_real_blob_storage
      - id: object-read-shape
        priority: p0
        category: read
        evidence_source: real_azure
        establishes_verification: true
        description: PutObject metadata and content type, HeadObject response shape, ranged GetObject, ETag conditionals, and idempotent object cleanup against real Blob Storage.
        operations: [PutObject, GetObject, HeadObject]
        tests:
          - Aws2Azure.IntegrationTests.S3.S3RealAzureConformanceTests.HeadObject_and_read_shape_conform_against_real_blob_storage
      - id: object-list-pagination
        priority: p0
        category: pagination
        evidence_source: real_azure
        establishes_verification: true
        description: ListObjectsV2 continuation across multiple real Blob pages.
        operations: [ListObjectsV2]
        tests:
          - Aws2Azure.IntegrationTests.S3.S3RealAzureConformanceTests.ListObjectsV2_paginates_against_real_blob_storage
      - id: object-lock-retention-legal-hold
        priority: p1
        category: core
        evidence_source: real_azure
        establishes_verification: true
        description: Object retention and legal-hold state round-trip against real Blob Storage.
        operations: [PutObjectRetention, GetObjectRetention, PutObjectLegalHold, GetObjectLegalHold]
        tests:
          - Aws2Azure.IntegrationTests.S3.S3RealAzureSmokeTests.ObjectLock_retention_and_legal_hold_round_trip
      - id: object-versioning
        priority: p1
        category: core
        evidence_source: real_azure
        establishes_verification: true
        description: Bucket versioning, version listing, and reads by version id against real Blob Storage.
        operations: [PutBucketVersioning, GetBucketVersioning, ListObjectVersions, GetObject]
        tests:
          - Aws2Azure.IntegrationTests.S3.S3RealAzureSmokeTests.Versioning_lists_object_versions_and_reads_by_version_id
      - id: multi-object-delete
        priority: p1
        category: batch
        evidence_source: real_azure
        establishes_verification: true
        description: Mixed-result multi-object delete against real Blob Storage.
        operations: [DeleteObjects]
        tests:
          - Aws2Azure.IntegrationTests.S3.S3RealAzureConformanceTests.DeleteObjects_reports_real_blob_batch_results
      - id: write-throttled
        priority: p1
        category: throttling
        evidence_source: deterministic
        establishes_verification: false
        description: A test-only backend deterministically injects Azure HTTP 429 and verifies the native retryable S3 envelope; this is not a naturally observed Azure throttle.
        operations: [ListBuckets]
        tests:
          - Aws2Azure.IntegrationTests.FailureConformance.DeterministicHttpFailureConformanceTests.S3_injected_backend_failures_return_native_retryable_errors
      - id: read-timeout
        priority: p1
        category: timeout
        evidence_source: deterministic
        establishes_verification: false
        description: A test-only backend deterministically injects Azure HTTP 408 and verifies the native retryable S3 timeout envelope; this is not a naturally observed Azure timeout.
        operations: [ListBuckets]
        tests:
          - Aws2Azure.IntegrationTests.FailureConformance.DeterministicHttpFailureConformanceTests.S3_injected_backend_failures_return_native_retryable_errors
      - id: read-service-unavailable
        priority: p1
        category: service_unavailable
        evidence_source: deterministic
        establishes_verification: false
        description: A test-only backend deterministically injects Azure HTTP 503 and verifies the native retryable S3 envelope; this is not a naturally observed Azure outage.
        operations: [ListBuckets]
        tests:
          - Aws2Azure.IntegrationTests.FailureConformance.DeterministicHttpFailureConformanceTests.S3_injected_backend_failures_return_native_retryable_errors
      - id: invalid-credentials
        priority: p0
        category: invalid_credentials
        evidence_source: real_azure
        establishes_verification: false
        description: An isolated binding sends a deterministic invalid shared key to real Azure Blob Storage and verifies the native non-retryable S3 error without revoking shared credentials.
        operations: [ListBuckets]
        tests:
          - Aws2Azure.IntegrationTests.FailureConformance.RealAzureInvalidCredentialConformanceTests.S3_invalid_shared_key_returns_native_non_retryable_error
      - id: client-cancellation
        priority: p1
        category: cancellation
        evidence_source: deterministic
        establishes_verification: false
        description: The test-only HTTP backend blocks until RequestAborted is cancelled, proving prompt propagation and that no successful response body is committed.
        operations: [ListBuckets]
        tests:
          - Aws2Azure.IntegrationTests.FailureConformance.DeterministicHttpFailureConformanceTests.Http_client_cancellation_propagates_without_committed_success
      - id: retry-exhaustion
        priority: p1
        category: retry_exhaustion
        evidence_source: deterministic
        establishes_verification: false
        description: The official AWS SDK exhausts its bounded retry budget against a persistent retryable backend failure and returns the native terminal error.
        operations: [PutObject]
        tests:
          - Aws2Azure.IntegrationTests.FailureConformance.DeterministicHttpFailureConformanceTests.Aws_sdk_retry_exhaustion_is_bounded_for_candidate_profile_operations
      - id: restart
        priority: p0
        category: restart
        evidence_source: real_azure
        establishes_verification: false
        description: Object state written through the candidate remains readable after the out-of-process proxy is terminated and restarted with the same immutable configuration.
        operations: [PutObject, GetObject]
        tests:
          - Aws2Azure.IntegrationTests.OperationalQualification.RealAzureRestartQualificationTests.S3_state_remains_readable_after_proxy_restart

  - service: dynamodb
    scenarios:
      - id: item-lifecycle
        priority: p0
        category: core
        evidence_source: real_azure
        establishes_verification: true
        description: Table and item create, write, consistent read, delete lifecycle.
        operations: [CreateTable, DescribeTable, PutItem, GetItem, DeleteItem, DeleteTable]
        tests:
          - Aws2Azure.IntegrationTests.DynamoDb.DynamoDbRealAzureSmokeTests.Item_lifecycle_round_trips_against_real_cosmos_db
      - id: query-pagination
        priority: p0
        category: pagination
        evidence_source: real_azure
        establishes_verification: true
        description: Indexed Query preserves ordering and continuation across real Cosmos pages.
        operations: [Query]
        tests:
          - Aws2Azure.IntegrationTests.DynamoDb.DynamoDbRealAzureSecondaryIndexTests.Gsi_composite_query_orders_by_sort_key_across_real_pages
      - id: secondary-index-query-scan
        priority: p0
        category: core
        evidence_source: real_azure
        establishes_verification: true
        description: GSI and LSI query and scan semantics cover hash-only, numeric ordering, membership, and projection against real Cosmos.
        operations: [Query, Scan]
        tests:
          - Aws2Azure.IntegrationTests.DynamoDb.DynamoDbRealAzureSecondaryIndexTests.Gsi_composite_query_orders_by_numeric_sort_key_across_real_pages
          - Aws2Azure.IntegrationTests.DynamoDb.DynamoDbRealAzureSecondaryIndexTests.Gsi_hash_only_query_returns_members_across_partitions
          - Aws2Azure.IntegrationTests.DynamoDb.DynamoDbRealAzureSecondaryIndexTests.Gsi_scan_returns_only_index_members_with_projection
          - Aws2Azure.IntegrationTests.DynamoDb.DynamoDbRealAzureSecondaryIndexTests.Lsi_query_orders_by_index_sort_key_within_partition
          - Aws2Azure.IntegrationTests.DynamoDb.DynamoDbRealAzureSecondaryIndexTests.Lsi_query_orders_by_numeric_sort_key
          - Aws2Azure.IntegrationTests.DynamoDb.DynamoDbRealAzureSecondaryIndexTests.Lsi_scan_returns_only_index_members
      - id: nested-projection
        priority: p1
        category: read
        evidence_source: real_azure
        establishes_verification: true
        description: Nested map and list ProjectionExpression paths prune a real Cosmos item correctly.
        operations: [GetItem]
        tests:
          - Aws2Azure.IntegrationTests.DynamoDb.DynamoDbRealAzureSmokeTests.Nested_projection_expression_prunes_map_and_list_against_real_cosmos_db
      - id: ttl-control-and-item-translation
        priority: p1
        category: core
        evidence_source: real_azure
        establishes_verification: true
        description: TTL control-plane state and per-item expiry translation round-trip against real Cosmos.
        operations: [DescribeTimeToLive, UpdateTimeToLive, PutItem, GetItem]
        tests:
          - Aws2Azure.IntegrationTests.DynamoDb.DynamoDbRealAzureTimeToLiveTests.Ttl_control_plane_and_item_translation_against_real_cosmos_db
      - id: cosmos-binary-response
        priority: p1
        category: read
        evidence_source: real_azure
        establishes_verification: false
        optional_coverage: true
        description: Opt-in CosmosBinary response negotiation and fused GetItem decoding are exercised against real Cosmos.
        operations: [GetItem]
        tests:
          - Aws2Azure.IntegrationTests.DynamoDb.DynamoDbRealAzureCosmosBinaryTests.Fused_GetItem_round_trips_against_real_cosmos_with_binary_enabled
          - Aws2Azure.IntegrationTests.DynamoDb.DynamoDbRealAzureCosmosBinaryTests.RealAzure_point_read_emits_CosmosBinary_body
      - id: cosmos-binary-request
        priority: p1
        category: write
        evidence_source: real_azure
        establishes_verification: false
        optional_coverage: true
        description: Opt-in CosmosBinary request bodies are accepted, parsed, and indexed by real Cosmos.
        operations: [PutItem]
        tests:
          - Aws2Azure.IntegrationTests.DynamoDb.DynamoDbRealAzureCosmosBinaryRequestTests.RealAzure_production_binary_body_is_accepted_parsed_and_indexed
          - Aws2Azure.IntegrationTests.DynamoDb.DynamoDbRealAzureCosmosBinaryRequestTests.RealAzure_proxy_PutItem_binary_body_is_parsed_and_indexed
      - id: workload-identity-item-data-path
        priority: p0
        category: core
        evidence_source: real_azure
        establishes_verification: false
        optional_coverage: true
        description: DynamoDB item CRUD uses an Entra workload identity against the real Cosmos data plane.
        operations: [DescribeTable, PutItem, GetItem, DeleteItem]
        tests:
          - Aws2Azure.IntegrationTests.DynamoDb.DynamoDbRealAzureWorkloadIdentityTests.Item_data_path_round_trips_via_workload_identity
      - id: batch-read-write
        priority: p0
        category: batch
        evidence_source: real_azure
        establishes_verification: true
        description: BatchGetItem and BatchWriteItem preserve per-item results on real Cosmos.
        operations: [BatchGetItem, BatchWriteItem]
        tests:
          - Aws2Azure.IntegrationTests.DynamoDb.DynamoDbRealAzureConformanceTests.Batch_operations_round_trip_against_real_cosmos
      - id: write-throttled
        priority: p1
        category: throttling
        evidence_source: deterministic
        establishes_verification: false
        description: A test-only backend deterministically injects Cosmos HTTP 429 and verifies ProvisionedThroughputExceededException plus an AWS SDK retry; this is not a naturally observed Cosmos throttle.
        operations: [ListTables]
        tests:
          - Aws2Azure.IntegrationTests.FailureConformance.DeterministicHttpFailureConformanceTests.DynamoDb_injected_backend_failures_return_native_retryable_errors
      - id: read-timeout
        priority: p1
        category: timeout
        evidence_source: deterministic
        establishes_verification: false
        description: A test-only backend deterministically injects Cosmos HTTP 408 and verifies the native retryable DynamoDB error; this is not a naturally observed Cosmos timeout.
        operations: [ListTables]
        tests:
          - Aws2Azure.IntegrationTests.FailureConformance.DeterministicHttpFailureConformanceTests.DynamoDb_injected_backend_failures_return_native_retryable_errors
      - id: read-service-unavailable
        priority: p1
        category: service_unavailable
        evidence_source: deterministic
        establishes_verification: false
        description: A test-only backend deterministically injects Cosmos HTTP 503 and verifies the native retryable DynamoDB error; this is not a naturally observed Cosmos outage.
        operations: [ListTables]
        tests:
          - Aws2Azure.IntegrationTests.FailureConformance.DeterministicHttpFailureConformanceTests.DynamoDb_injected_backend_failures_return_native_retryable_errors
      - id: invalid-credentials
        priority: p0
        category: invalid_credentials
        evidence_source: real_azure
        establishes_verification: false
        description: An isolated binding sends a deterministic invalid primary key to real Cosmos DB and verifies the native non-retryable DynamoDB error without revoking shared credentials.
        operations: [ListTables]
        tests:
          - Aws2Azure.IntegrationTests.FailureConformance.RealAzureInvalidCredentialConformanceTests.DynamoDb_invalid_primary_key_returns_native_non_retryable_error
      - id: conditional-write-concurrency
        priority: p0
        category: concurrency
        evidence_source: real_azure
        establishes_verification: true
        description: Concurrent conditional updates admit exactly one winner.
        operations: [UpdateItem]
        tests:
          - Aws2Azure.IntegrationTests.DynamoDb.DynamoDbRealAzureConformanceTests.Concurrent_conditional_updates_admit_one_winner
      - id: retry-exhaustion
        priority: p1
        category: retry_exhaustion
        evidence_source: deterministic
        establishes_verification: false
        description: The official AWS SDK exhausts its bounded retry budget against a persistent retryable backend failure and returns the native terminal error.
        operations: [PutItem]
        tests:
          - Aws2Azure.IntegrationTests.FailureConformance.DeterministicHttpFailureConformanceTests.Aws_sdk_retry_exhaustion_is_bounded_for_candidate_profile_operations
      - id: restart
        priority: p0
        category: restart
        evidence_source: real_azure
        establishes_verification: false
        description: Item state written through the candidate remains readable after the out-of-process proxy is terminated and restarted with the same immutable configuration.
        operations: [PutItem, GetItem]
        tests:
          - Aws2Azure.IntegrationTests.OperationalQualification.RealAzureRestartQualificationTests.DynamoDb_state_remains_readable_after_proxy_restart

  - service: sqs
    scenarios:
      - id: message-lifecycle
        priority: p0
        category: core
        evidence_source: real_azure
        establishes_verification: true
        description: Standard queue create, discovery, send, receive, acknowledge, and delete lifecycle.
        operations: [CreateQueue, GetQueueUrl, SendMessage, ReceiveMessage, DeleteMessage, DeleteQueue]
        tests:
          - Aws2Azure.IntegrationTests.Sqs.SqsRealAzureSmokeTests.Message_lifecycle_round_trips_against_real_service_bus
      - id: queue-list-pagination
        priority: p1
        category: pagination
        evidence_source: real_azure
        establishes_verification: true
        description: ListQueues continuation spans real Service Bus pages.
        operations: [ListQueues]
        tests:
          - Aws2Azure.IntegrationTests.Sqs.SqsRealAzureConformanceTests.ListQueues_paginates_against_real_service_bus
      - id: message-batches
        priority: p0
        category: batch
        evidence_source: real_azure
        establishes_verification: true
        description: Send and delete batches preserve entry-level success and failure.
        operations: [SendMessageBatch, DeleteMessageBatch]
        tests:
          - Aws2Azure.IntegrationTests.Sqs.SqsRealAzureConformanceTests.Message_batches_report_real_service_bus_results
      - id: send-throttled
        priority: p1
        category: throttling
        evidence_source: deterministic
        establishes_verification: false
        description: Test-only REST injection and the existing AMQP mapping seam deterministically verify retryable native SQS throttling errors; this is not a naturally observed Service Bus throttle.
        operations: [ListQueues, SendMessage]
        tests:
          - Aws2Azure.IntegrationTests.FailureConformance.DeterministicHttpFailureConformanceTests.Sqs_injected_rest_failures_cover_query_xml_and_sdk_json_retryability
          - Aws2Azure.UnitTests.Sqs.AmqpSendMessageHandlersTests.SendMessage_maps_server_busy_to_503_so_aws_sdk_retries
      - id: receive-timeout
        priority: p1
        category: timeout
        evidence_source: deterministic
        establishes_verification: false
        description: A test-only Service Bus REST backend deterministically injects HTTP 408 and verifies the native retryable SQS error; this is not a naturally observed Service Bus timeout.
        operations: [ListQueues]
        tests:
          - Aws2Azure.IntegrationTests.FailureConformance.DeterministicHttpFailureConformanceTests.Sqs_injected_rest_failures_cover_query_xml_and_sdk_json_retryability
      - id: receive-service-unavailable
        priority: p1
        category: service_unavailable
        evidence_source: deterministic
        establishes_verification: false
        description: Test-only REST injection and the existing AMQP mapping seam deterministically verify retryable native SQS transient errors; this is not a naturally observed Service Bus outage.
        operations: [ListQueues, SendMessage]
        tests:
          - Aws2Azure.IntegrationTests.FailureConformance.DeterministicHttpFailureConformanceTests.Sqs_injected_rest_failures_cover_query_xml_and_sdk_json_retryability
          - Aws2Azure.UnitTests.Sqs.AmqpSendMessageHandlersTests.SendMessage_propagates_broker_reject_as_error
      - id: invalid-credentials
        priority: p0
        category: invalid_credentials
        evidence_source: real_azure
        establishes_verification: false
        description: An isolated binding sends a deterministic invalid SAS key to the real Service Bus management API and verifies the native non-retryable SQS error without revoking shared credentials.
        operations: [ListQueues]
        tests:
          - Aws2Azure.IntegrationTests.FailureConformance.RealAzureInvalidCredentialConformanceTests.Sqs_invalid_sas_key_returns_native_non_retryable_error
      - id: fifo-session-receive
        priority: p0
        category: core
        evidence_source: real_azure
        establishes_verification: false
        optional_coverage: true
        description: FIFO receive through broker-assigned Service Bus sessions remains explicitly skipped after AcceptNextSession timed out for both one ready group and concurrent groups; FIFO is outside the standard messaging profile and does not block its operation seals.
        operations: [SendMessage, ReceiveMessage]
        tests:
          - Aws2Azure.IntegrationTests.Sqs.SqsRealAzureConformanceTests.Fifo_session_receive_is_not_yet_conformant_on_real_azure
      - id: retry-exhaustion
        priority: p1
        category: retry_exhaustion
        evidence_source: deterministic
        establishes_verification: false
        description: The official AWS SDK exhausts its bounded retry budget against a persistent retryable backend failure and returns the native terminal error.
        operations: [SendMessage]
        tests:
          - Aws2Azure.IntegrationTests.FailureConformance.DeterministicHttpFailureConformanceTests.Aws_sdk_retry_exhaustion_is_bounded_for_candidate_profile_operations
      - id: restart
        priority: p0
        category: restart
        evidence_source: real_azure
        establishes_verification: false
        description: A message enqueued through the candidate remains deliverable, and the queue stays addressable, after the out-of-process proxy is terminated and restarted with the same immutable configuration.
        operations: [CreateQueue, GetQueueUrl, SendMessage, ReceiveMessage, DeleteMessage, DeleteQueue]
        tests:
          - Aws2Azure.IntegrationTests.OperationalQualification.RealAzureRestartQualificationTests.Sqs_queued_message_remains_deliverable_after_proxy_restart

  - service: kinesis
    scenarios:
      - id: record-write
        priority: p0
        category: core
        evidence_source: real_azure
        establishes_verification: true
        description: PutRecord writes through the proxy to a real Event Hub.
        operations: [PutRecord]
        tests:
          - Aws2Azure.IntegrationTests.Kinesis.KinesisRealAzureSmokeTests.PutRecord_writes_to_real_event_hubs
      - id: record-read
        priority: p0
        category: read
        evidence_source: real_azure
        establishes_verification: true
        description: Shard iterator and record reads round-trip against a real Event Hub.
        operations: [GetShardIterator, GetRecords]
        tests:
          - Aws2Azure.IntegrationTests.Kinesis.KinesisRealAzureConformanceTests.GetRecords_reads_from_real_event_hubs
      - id: workload-identity-record-write
        priority: p0
        category: write
        evidence_source: real_azure
        establishes_verification: false
        optional_coverage: true
        description: PutRecord authenticates with an Entra workload identity against a real Event Hub.
        operations: [PutRecord]
        tests:
          - Aws2Azure.IntegrationTests.Kinesis.KinesisRealAzureWorkloadIdentityTests.PutRecord_writes_to_real_event_hubs_via_workload_identity
      - id: shard-list-pagination
        priority: p1
        category: pagination
        evidence_source: real_azure
        establishes_verification: true
        description: ListShards continuation spans real Event Hubs pages.
        operations: [ListShards]
        tests:
          - Aws2Azure.IntegrationTests.Kinesis.KinesisRealAzureConformanceTests.ListShards_paginates_against_real_event_hubs
      - id: record-batch
        priority: p0
        category: batch
        evidence_source: real_azure
        establishes_verification: true
        description: PutRecords preserves per-record success and failure.
        operations: [PutRecords]
        tests:
          - Aws2Azure.IntegrationTests.Kinesis.KinesisRealAzureConformanceTests.PutRecords_reports_real_event_hubs_results
      - id: write-throttled
        priority: p1
        category: throttling
        evidence_source: deterministic
        establishes_verification: false
        description: The existing AMQP fake seam deterministically injects an Event Hubs throttle and verifies the native retryable Kinesis error; this is not a naturally observed Event Hubs throttle.
        operations: [PutRecord]
        tests:
          - Aws2Azure.UnitTests.Kinesis.PutRecordHandlerTests.HandleAsync_maps_amqp_throttling_to_provisioned_throughput_exceeded
      - id: read-timeout
        priority: p1
        category: timeout
        evidence_source: deterministic
        establishes_verification: false
        description: The existing AMQP fake seam deterministically injects a timeout condition and verifies the native retryable Kinesis error; this is not a naturally observed Event Hubs timeout.
        operations: [PutRecord]
        tests:
          - Aws2Azure.UnitTests.Kinesis.PutRecordHandlerTests.HandleAsync_maps_amqp_transient_failures_to_retryable_kinesis_error
      - id: write-service-unavailable
        priority: p1
        category: service_unavailable
        evidence_source: deterministic
        establishes_verification: false
        description: The existing AMQP fake seam deterministically injects transient and server-fatal failures and verifies the native retryable Kinesis error; this is not a naturally observed Event Hubs outage.
        operations: [PutRecord]
        tests:
          - Aws2Azure.UnitTests.Kinesis.PutRecordHandlerTests.HandleAsync_maps_amqp_transient_failures_to_retryable_kinesis_error
      - id: invalid-credentials
        priority: p0
        category: invalid_credentials
        evidence_source: real_azure
        establishes_verification: false
        description: An isolated binding sends a deterministic invalid SAS key to the real Event Hubs management API and verifies the native non-retryable Kinesis error without revoking shared credentials.
        operations: [PutRecord]
        tests:
          - Aws2Azure.IntegrationTests.FailureConformance.RealAzureInvalidCredentialConformanceTests.Kinesis_invalid_sas_key_returns_native_non_retryable_error
      - id: client-cancellation
        priority: p1
        category: cancellation
        evidence_source: deterministic
        establishes_verification: false
        description: The test-only AMQP sender blocks until cancellation, proving prompt propagation and that no Kinesis success body is committed.
        operations: [PutRecord]
        tests:
          - Aws2Azure.UnitTests.Kinesis.PutRecordHandlerTests.HandleAsync_propagates_amqp_cancellation_without_success_body
      - id: consumer-concurrency
        priority: p0
        category: concurrency
        evidence_source: real_azure
        establishes_verification: true
        description: Concurrent consumers maintain independent iterator progress.
        operations: [GetShardIterator, GetRecords]
        tests:
          - Aws2Azure.IntegrationTests.Kinesis.KinesisRealAzureConformanceTests.Concurrent_consumers_maintain_iterator_progress

  - service: sns
    scenarios:
      - id: topic-subscription-lifecycle
        priority: p0
        category: core
        evidence_source: real_azure
        establishes_verification: true
        description: Topic creation, subscription, publish, unsubscribe, and delete lifecycle.
        operations: [CreateTopic, Subscribe, Publish, Unsubscribe, DeleteTopic]
        tests:
          - Aws2Azure.IntegrationTests.Sns.SnsRealAzureConformanceTests.Topic_subscription_lifecycle_round_trips_against_real_service_bus
      - id: topic-list-pagination
        priority: p1
        category: pagination
        evidence_source: real_azure
        establishes_verification: true
        description: Topic and subscription listing continues across real Service Bus pages.
        operations: [ListTopics, ListSubscriptions]
        tests:
          - Aws2Azure.IntegrationTests.Sns.SnsRealAzureConformanceTests.Topic_and_subscription_lists_paginate
      - id: publish-batch
        priority: p0
        category: batch
        evidence_source: real_azure
        establishes_verification: true
        description: PublishBatch preserves entry-level success and failure.
        operations: [PublishBatch]
        tests:
          - Aws2Azure.IntegrationTests.Sns.SnsRealAzureConformanceTests.PublishBatch_reports_real_service_bus_results
      - id: publish-event-grid
        priority: p0
        category: core
        evidence_source: real_azure
        establishes_verification: true
        description: Publish routes to a live Event Grid custom topic (backend=EventGrid per-topic override); subject and message attributes are asserted end to end via the topic's Storage Queue event subscription, not only HTTP-level publish acceptance.
        operations: [Publish]
        tests:
          - Aws2Azure.IntegrationTests.Sns.SnsPublishEventGridRealAzureTests.Publish_delivers_subject_and_message_attributes_via_event_grid
      - id: publish-batch-event-grid
        priority: p0
        category: batch
        evidence_source: real_azure
        establishes_verification: true
        description: PublishBatch delivers every entry to a live Event Grid custom topic, verified via the Storage Queue event subscription.
        operations: [PublishBatch]
        tests:
          - Aws2Azure.IntegrationTests.Sns.SnsPublishEventGridRealAzureTests.PublishBatch_delivers_all_entries_via_event_grid
      - id: publish-batch-event-grid-partial-failure
        priority: p0
        category: batch
        evidence_source: real_azure
        establishes_verification: true
        description: A batch mixing a normal entry with a genuinely oversized entry (over the 1 MB classic Event Grid schema limit) against a live Event Grid custom topic reports one success and one per-entry failure; the successful entry's delivered content is confirmed via the Storage Queue event subscription.
        operations: [PublishBatch]
        tests:
          - Aws2Azure.IntegrationTests.Sns.SnsPublishEventGridRealAzureTests.PublishBatch_reports_per_entry_failure_for_oversized_entry_via_event_grid
