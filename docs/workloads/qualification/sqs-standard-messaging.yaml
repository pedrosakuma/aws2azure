# Reviewed policy for the production-shaped Service Bus (SQS standard
# messaging) workload (issue #626).
#
# The representative-load capacity floor is resolved from three comparable
# AMQP-transport main-branch real-Azure runs against the exact sealed
# candidate (git_sha 0135a0ab5ea80d6eaaa8b40626337fe7a42517d4, sealed by
# run 29859441342): runs 29861232053, 29862345558, and 29863436605 measured
# 5.1912, 5.9066, and 5.1151 ReceiveMessage completions/s with zero
# failures across all 7 profile operations and every required scenario.
# Each value divides the representative-load scenario's ReceiveMessage
# completions by its window duration for the fixed eight-worker closed-loop
# CRUD-style topology (CreateQueue, SendMessage, ReceiveMessage,
# GetQueueUrl, ListQueues, DeleteMessage, DeleteQueue); it is not standalone
# Service Bus or ReceiveMessage capacity. REST-transport evidence
# (representative-load-rest, rollback-rest) is intentionally kept out of
# this policy's scenario set — it is supplementary, non-required evidence
# recorded on every run, never blended into the AMQP-default numbers graded
# here, and never required for promotion. All three runs also recorded the
# supplementary rollback-rest REST counterpart failing to redeem after the
# candidate->prior restart (see docs/gaps/sqs/DeleteMessage.yaml) — expected
# per the documented lock-expiry behavior, not a regression, and not part of
# the graded AMQP rollback proof (which passed all three runs).
schema_version: 1
profile_id: sqs-standard-messaging
profile_version: 1
rules:
  max_artifact_age_hours: 72
  min_samples_per_scenario: 300
  min_duration_seconds: 300
  max_failure_rate: 0
  zero_completions_disqualify: true
  only_skipped_real_azure_disqualifies: true
  min_distinct_runs: 3
load_shape:
  concurrency: 8
  requested_duration_seconds: 300
scenarios:
  - id: representative-load
    service: sqs
    operation: ReceiveMessage
    evidence_source: real_azure
    signals:
      - id: representative-load-throughput
        source: backend_capacity
        disposition: blocking
        metric: throughput_per_sec
        threshold_status: resolved
        min_value: 4
        threshold_reason: >-
          Reviewed main-branch runs 29861232053, 29862345558, and 29863436605
          (candidate git_sha 0135a0ab5ea80d6eaaa8b40626337fe7a42517d4)
          measured 5.1912, 5.9066, and 5.1151 ReceiveMessage completions/s
          with zero failures for the fixed eight-worker closed-loop topology
          (CreateQueue, SendMessage, ReceiveMessage, GetQueueUrl, ListQueues,
          DeleteMessage, DeleteQueue). The 4/s floor is conservatively below
          the worst reviewed healthy run (5.1151), leaving headroom for the
          ~15% run-to-run variance already observed across only three real
          runs; no emulator, REST-transport, or A/B measurements were used.
      - id: representative-load-p95
        source: backend_capacity
        disposition: report_only
        metric: p95_ms
      - id: representative-load-p99
        source: backend_capacity
        disposition: report_only
        metric: p99_ms
      - id: crud-iterations-per-sec
        source: backend_capacity
        disposition: report_only
        metric: throughput_per_sec
      - id: aws-operations-per-sec
        source: backend_capacity
        disposition: report_only
        metric: throughput_per_sec
      - id: representative-load-create-queue-throughput
        source: backend_capacity
        disposition: report_only
        metric: throughput_per_sec
      - id: representative-load-create-queue-p95
        source: backend_capacity
        disposition: report_only
        metric: p95_ms
      - id: representative-load-create-queue-p99
        source: backend_capacity
        disposition: report_only
        metric: p99_ms
      - id: representative-load-get-queue-url-throughput
        source: backend_capacity
        disposition: report_only
        metric: throughput_per_sec
      - id: representative-load-get-queue-url-p95
        source: backend_capacity
        disposition: report_only
        metric: p95_ms
      - id: representative-load-get-queue-url-p99
        source: backend_capacity
        disposition: report_only
        metric: p99_ms
      - id: representative-load-list-queues-throughput
        source: backend_capacity
        disposition: report_only
        metric: throughput_per_sec
      - id: representative-load-list-queues-p95
        source: backend_capacity
        disposition: report_only
        metric: p95_ms
      - id: representative-load-list-queues-p99
        source: backend_capacity
        disposition: report_only
        metric: p99_ms
      - id: representative-load-send-message-throughput
        source: backend_capacity
        disposition: report_only
        metric: throughput_per_sec
      - id: representative-load-send-message-p95
        source: backend_capacity
        disposition: report_only
        metric: p95_ms
      - id: representative-load-send-message-p99
        source: backend_capacity
        disposition: report_only
        metric: p99_ms
      - id: representative-load-delete-message-throughput
        source: backend_capacity
        disposition: report_only
        metric: throughput_per_sec
      - id: representative-load-delete-message-p95
        source: backend_capacity
        disposition: report_only
        metric: p95_ms
      - id: representative-load-delete-message-p99
        source: backend_capacity
        disposition: report_only
        metric: p99_ms
      - id: representative-load-delete-queue-throughput
        source: backend_capacity
        disposition: report_only
        metric: throughput_per_sec
      - id: representative-load-delete-queue-p95
        source: backend_capacity
        disposition: report_only
        metric: p95_ms
      - id: representative-load-delete-queue-p99
        source: backend_capacity
        disposition: report_only
        metric: p99_ms
      - id: representative-load-throttle-rate
        source: backend_capacity
        disposition: report_only
        metric: throttle_rate
  - id: redelivery
    service: sqs
    operation: ReceiveMessage
    evidence_source: real_azure
    signals: []
  - id: throttling
    service: sqs
    operation: SendMessage
    evidence_source: deterministic
    signals: []
  - id: timeout
    service: sqs
    operation: SendMessage
    evidence_source: deterministic
    signals: []
  - id: service-unavailable
    service: sqs
    operation: SendMessage
    evidence_source: deterministic
    signals: []
  - id: concurrency
    service: sqs
    operation: ReceiveMessage
    evidence_source: real_azure
    signals: []
  - id: restart
    service: sqs
    operation: SendMessage
    evidence_source: real_azure
    signals: []
  - id: retry-exhaustion
    service: sqs
