# Reviewed policy for the production-shaped Cosmos DB workload.
# The capacity floor is based only on three comparable main-branch real-Azure
# runs; operational and sealed rollback evidence remain independently
# blocking.
schema_version: 1
profile_id: dynamodb-basic-crud
profile_version: 1
rules:
  max_artifact_age_hours: 72
  min_samples_per_scenario: 300
  min_duration_seconds: 300
  max_failure_rate: 0
  zero_completions_disqualify: true
  only_skipped_real_azure_disqualifies: true
  min_distinct_runs: 3
load_shape:
  concurrency: 8
  requested_duration_seconds: 300
scenarios:
  - id: representative-load
    service: dynamodb
    operation: GetItem
    evidence_source: real_azure
    signals:
      - id: representative-load-throughput
        source: backend_capacity
        disposition: blocking
        metric: throughput_per_sec
        threshold_status: resolved
        min_value: 17
        threshold_reason: >-
          Reviewed main-branch runs 29803900578, 29804505233, and 29805515910
          (exact sealed candidate sha 80714e99a443a77350c7e95459adb3d05ee49250,
          rollback baseline sha 72b093b97c22aaf591f52cbd7190ba289b301d46)
          measured 44.55, 105.36, and 19.50 GetItem completions/s with zero
          failures. Each value divides GetItem completions by the total window
          for the fixed eight-worker closed-loop CRUD topology (CreateTable,
          DescribeTable, PutItem, two GetItem reads, UpdateItem, DeleteItem,
          and DeleteTable); it is not standalone Cosmos or GetItem capacity.
          The 17/s floor is conservatively below the worst reviewed healthy
          run; no emulator or A/B measurements were used.
      - id: representative-load-p95
        source: backend_capacity
        disposition: report_only
        metric: p95_ms
      - id: representative-load-p99
        source: backend_capacity
        disposition: report_only
        metric: p99_ms
      - id: crud-iterations-per-sec
        source: backend_capacity
        disposition: report_only
        metric: throughput_per_sec
      - id: aws-operations-per-sec
        source: backend_capacity
        disposition: report_only
        metric: throughput_per_sec
      - id: representative-load-create-table-throughput
        source: backend_capacity
        disposition: report_only
        metric: throughput_per_sec
      - id: representative-load-create-table-p95
