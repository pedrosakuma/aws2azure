# Reviewed policy for the production-shaped Blob Storage workload.
# The capacity floor is based only on three comparable main-branch real-Azure
# runs; operational and rollback evidence remain independently blocking.
schema_version: 1
profile_id: s3-basic-object-crud
profile_version: 1
rules:
  max_artifact_age_hours: 72
  min_samples_per_scenario: 300
  min_duration_seconds: 300
  max_failure_rate: 0
  zero_completions_disqualify: true
  only_skipped_real_azure_disqualifies: true
  min_distinct_runs: 3
load_shape:
  concurrency: 8
  requested_duration_seconds: 300
scenarios:
  - id: representative-load
    service: s3
    operation: GetObject
    evidence_source: real_azure
    signals:
      - id: representative-load-throughput
        source: backend_capacity
        disposition: blocking
        metric: throughput_per_sec
        threshold_status: resolved
        min_value: 40
        threshold_reason: >-
          Reviewed main-branch runs 29580202166, 29580827819, and 29581332440
          measured 259.68, 43.69, and 89.01 GetObject completions/s with zero
          failures. Each value divides GetObject completions by the total window
          for the fixed eight-worker closed-loop CRUD topology (PutObject, two
          HeadObject, three GetObject variants, ListObjectsV2, and two
          DeleteObject calls); it is not standalone Blob or GetObject capacity.
          The 40/s floor is conservatively below the worst reviewed healthy run;
          no emulator or A/B measurements were used.
      - id: crud-iterations-per-sec
        source: backend_capacity
        disposition: report_only
        metric: throughput_per_sec
      - id: aws-operations-per-sec
        source: backend_capacity
        disposition: report_only
        metric: throughput_per_sec
      - id: representative-load-p95
        source: backend_capacity
        disposition: report_only
        metric: p95_ms
      - id: representative-load-p99
        source: backend_capacity
        disposition: report_only
        metric: p99_ms
      - id: representative-load-create-bucket-throughput
        source: backend_capacity
        disposition: report_only
        metric: throughput_per_sec
      - id: representative-load-create-bucket-p95
        source: backend_capacity
        disposition: report_only
        metric: p95_ms
      - id: representative-load-create-bucket-p99
        source: backend_capacity
        disposition: report_only
        metric: p99_ms
      - id: representative-load-put-object-throughput
        source: backend_capacity
        disposition: report_only
        metric: throughput_per_sec
      - id: representative-load-put-object-p95
        source: backend_capacity
        disposition: report_only
        metric: p95_ms
      - id: representative-load-put-object-p99
        source: backend_capacity
        disposition: report_only
        metric: p99_ms
      - id: representative-load-head-object-throughput
        source: backend_capacity
        disposition: report_only
        metric: throughput_per_sec
      - id: representative-load-head-object-p95
        source: backend_capacity
        disposition: report_only
        metric: p95_ms
      - id: representative-load-head-object-p99
        source: backend_capacity
        disposition: report_only
        metric: p99_ms
      - id: representative-load-list-objects-v2-throughput
        source: backend_capacity
        disposition: report_only
        metric: throughput_per_sec
      - id: representative-load-list-objects-v2-p95
        source: backend_capacity
        disposition: report_only
        metric: p95_ms
      - id: representative-load-list-objects-v2-p99
        source: backend_capacity
        disposition: report_only
        metric: p99_ms
      - id: representative-load-delete-object-throughput
        source: backend_capacity
        disposition: report_only
        metric: throughput_per_sec
      - id: representative-load-delete-object-p95
        source: backend_capacity
        disposition: report_only
        metric: p95_ms
      - id: representative-load-delete-object-p99
        source: backend_capacity
        disposition: report_only
        metric: p99_ms
      - id: representative-load-delete-bucket-throughput
        source: backend_capacity
        disposition: report_only
        metric: throughput_per_sec
      - id: representative-load-delete-bucket-p95
        source: backend_capacity
        disposition: report_only
        metric: p95_ms
      - id: representative-load-delete-bucket-p99
        source: backend_capacity
        disposition: report_only
