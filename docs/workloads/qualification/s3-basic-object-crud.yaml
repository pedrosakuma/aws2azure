# Reviewed policy for the production-shaped Blob Storage workload.
# The capacity floor is based only on three comparable main-branch real-Azure
# runs; operational and rollback evidence remain independently blocking.
schema_version: 1
profile_id: s3-basic-object-crud
profile_version: 1
rules:
  max_artifact_age_hours: 72
  min_samples_per_scenario: 300
  min_duration_seconds: 300
  max_failure_rate: 0
  zero_completions_disqualify: true
  only_skipped_real_azure_disqualifies: true
  min_distinct_runs: 3
load_shape:
  concurrency: 8
  requested_duration_seconds: 300
scenarios:
  - id: representative-load
    service: s3
    operation: GetObject
    evidence_source: real_azure
    signals:
      - id: representative-load-throughput
        source: backend_capacity
        disposition: blocking
        metric: throughput_per_sec
        threshold_status: resolved
        min_value: 40
        threshold_reason: >-
          Reviewed main-branch runs 29580202166, 29580827819, and 29581332440
          measured 259.68, 43.69, and 89.01 GetObject/s with zero failures.
          The 40/s floor is conservatively below the worst healthy run; no
          emulator or A/B measurements were used.
      - id: representative-load-p95
        source: backend_capacity
        disposition: report_only
        metric: p95_ms
      - id: representative-load-p99
        source: backend_capacity
        disposition: report_only
        metric: p99_ms
      - id: representative-load-network-p95
        source: network_noise
        disposition: report_only
        metric: p95_ms
      - id: representative-load-throttle-rate
        source: backend_capacity
        disposition: report_only
        metric: throttle_rate
  - id: throttling
    service: s3
    operation: GetObject
    evidence_source: deterministic
    signals: []
  - id: timeout
    service: s3
    operation: GetObject
    evidence_source: deterministic
    signals: []
  - id: service-unavailable
    service: s3
    operation: GetObject
    evidence_source: deterministic
    signals: []
  - id: cancellation
    service: s3
    operation: GetObject
    evidence_source: deterministic
    signals: []
  - id: restart
    service: s3
    operation: PutObject
    evidence_source: real_azure
    signals: []
  - id: retry-exhaustion
    service: s3
    operation: PutObject
    evidence_source: deterministic
    signals: []
  - id: rollback
    service: s3
    operation: GetObject
    evidence_source: real_azure
    signals: []
