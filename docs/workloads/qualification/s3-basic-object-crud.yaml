# Initial reviewed policy for the production-shaped Blob Storage workload.
# The capacity floor is deliberately unresolved: it must be selected from at
# least three comparable artifacts produced by workload-load-real-azure.yml.
# Until that review occurs, the blocking unresolved signal keeps the mechanical
# verdict at candidate; it is not a GA claim.
schema_version: 1
profile_id: s3-basic-object-crud
profile_version: 1
rules:
  max_artifact_age_hours: 72
  min_samples_per_scenario: 300
  min_duration_seconds: 300
  max_failure_rate: 0
  zero_completions_disqualify: true
  only_skipped_real_azure_disqualifies: true
  min_distinct_runs: 3
load_shape:
  concurrency: 8
  requested_duration_seconds: 300
scenarios:
  - id: representative-load
    service: s3
    operation: GetObject
    evidence_source: real_azure
    signals:
      - id: representative-load-throughput
        source: backend_capacity
        disposition: blocking
        metric: throughput_per_sec
        threshold_status: unresolved
        threshold_reason: >-
          No comparable repeated live-Blob-Storage runs have been reviewed.
          Select a floor from the worst healthy run without using emulator or
          A/B data.
      - id: representative-load-p95
        source: backend_capacity
        disposition: report_only
        metric: p95_ms
      - id: representative-load-p99
        source: backend_capacity
        disposition: report_only
        metric: p99_ms
      - id: representative-load-network-p95
        source: network_noise
        disposition: report_only
        metric: p95_ms
      - id: representative-load-throttle-rate
        source: backend_capacity
        disposition: report_only
        metric: throttle_rate
  - id: throttling
    service: s3
    operation: GetObject
    evidence_source: deterministic
    signals: []
  - id: timeout
    service: s3
    operation: GetObject
    evidence_source: deterministic
    signals: []
  - id: service-unavailable
    service: s3
    operation: GetObject
    evidence_source: deterministic
    signals: []
  - id: cancellation
    service: s3
    operation: GetObject
    evidence_source: deterministic
    signals: []
  - id: restart
    service: s3
    operation: PutObject
    evidence_source: real_azure
    signals: []
  - id: retry-exhaustion
    service: s3
    operation: PutObject
    evidence_source: deterministic
    signals: []
  - id: rollback
    service: s3
    operation: GetObject
    evidence_source: real_azure
    signals: []
