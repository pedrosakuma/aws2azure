      - id: representative-load-unauthenticated-connectivity-header-p95
        source: network_noise
        disposition: report_only
        metric: p95_ms
      - id: representative-load-throttle-rate
        source: backend_capacity
        disposition: report_only
        metric: throttle_rate
  - id: throttling
    service: s3
    operation: GetObject
    evidence_source: deterministic
    signals: []
  - id: timeout
    service: s3
    operation: GetObject
    evidence_source: deterministic
    signals: []
  - id: service-unavailable
    service: s3
    operation: GetObject
    evidence_source: deterministic
    signals: []
  - id: cancellation
    service: s3
    operation: GetObject
    evidence_source: deterministic
    signals: []
  - id: restart
    service: s3
