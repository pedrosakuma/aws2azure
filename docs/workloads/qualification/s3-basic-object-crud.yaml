# Reviewed policy for the production-shaped Blob Storage workload.
# The capacity floor is based only on three comparable main-branch real-Azure
# runs; operational and sealed rollback evidence remain independently blocking.
schema_version: 1
profile_id: s3-basic-object-crud
profile_version: 1
rules:
  max_artifact_age_hours: 72
  min_samples_per_scenario: 300
  min_duration_seconds: 300
  max_failure_rate: 0
  zero_completions_disqualify: true
  only_skipped_real_azure_disqualifies: true
  min_distinct_runs: 3
load_shape:
  concurrency: 8
  requested_duration_seconds: 300
scenarios:
  - id: representative-load
    service: s3
    operation: GetObject
    evidence_source: real_azure
    signals:
      - id: representative-load-throughput
        source: backend_capacity
        disposition: blocking
        metric: throughput_per_sec
        threshold_status: resolved
        min_value: 30
        threshold_reason: >-
          Reviewed sealed-runtime main-branch runs 29884898476, 29885879248,
          and 29886808593 (candidate sha
          f83a6b95cdd1fc3e64a3aa28ed152aebf3be679d, rollback baseline sha
          c885a4b7bfbc35390a32b98139495c19dfb7da0b) measured 36.5014,
          35.1502, and 52.5414 GetObject completions/s with zero failures and
          zero throttling. Each value divides GetObject completions by the total
          window for the fixed eastus2 ephemeral Blob StorageV2 Standard_LRS
          eight-worker closed-loop CRUD topology (PutObject, two HeadObject,
          three GetObject variants, ListObjectsV2, and two DeleteObject calls);
          it is not standalone Blob or GetObject capacity. The 30/s floor is
          conservatively about 15% below the worst reviewed healthy sealed run
          to accommodate observed real-Azure variance. Earlier source-validation
          runs were not used to set this sealed-runtime floor; no emulator or
          A/B measurements were used.
      - id: crud-iterations-per-sec
        source: backend_capacity
        disposition: report_only
        metric: throughput_per_sec
      - id: aws-operations-per-sec
        source: backend_capacity
        disposition: report_only
        metric: throughput_per_sec
      - id: representative-load-p95
        source: backend_capacity
        disposition: report_only
        metric: p95_ms
      - id: representative-load-p99
        source: backend_capacity
        disposition: report_only
        metric: p99_ms
      - id: representative-load-create-bucket-throughput
        source: backend_capacity
        disposition: report_only
        metric: throughput_per_sec
      - id: representative-load-create-bucket-p95
        source: backend_capacity
        disposition: report_only
        metric: p95_ms
      - id: representative-load-create-bucket-p99
        source: backend_capacity
        disposition: report_only
        metric: p99_ms
      - id: representative-load-put-object-throughput
        source: backend_capacity
        disposition: report_only
        metric: throughput_per_sec
      - id: representative-load-put-object-p95
        source: backend_capacity
        disposition: report_only
        metric: p95_ms
      - id: representative-load-put-object-p99
        source: backend_capacity
        disposition: report_only
        metric: p99_ms
      - id: representative-load-head-object-throughput
        source: backend_capacity
        disposition: report_only
        metric: throughput_per_sec
      - id: representative-load-head-object-p95
        source: backend_capacity
