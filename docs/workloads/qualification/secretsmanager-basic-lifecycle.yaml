# Reviewed policy for the production-shaped Key Vault workload.
# The capacity floor is based only on three comparable main-branch real-Azure
# runs; operational and rollback evidence remain independently blocking.
schema_version: 1
profile_id: secretsmanager-basic-lifecycle
profile_version: 1
rules:
  max_artifact_age_hours: 72
  min_samples_per_scenario: 300
  min_duration_seconds: 300
  max_failure_rate: 0
  zero_completions_disqualify: true
  only_skipped_real_azure_disqualifies: true
  min_distinct_runs: 3
load_shape:
  concurrency: 8
  requested_duration_seconds: 300
scenarios:
  - id: representative-load
    service: secretsmanager
    operation: GetSecretValue
    evidence_source: real_azure
    signals:
      - id: representative-load-throughput
        source: backend_capacity
        disposition: blocking
        metric: throughput_per_sec
        threshold_status: resolved
        min_value: 9
        threshold_reason: >-
          Reviewed main-branch runs 29576423115, 29576429449, and 29577315223
          measured 11.48, 10.74, and 9.59 GetSecretValue/s with zero failures.
          The 9/s floor is conservatively below the worst healthy run; no
          emulator or A/B measurements were used.
      - id: representative-load-p95
        source: backend_capacity
        disposition: report_only
        metric: p95_ms
      - id: representative-load-p99
        source: backend_capacity
        disposition: report_only
        metric: p99_ms
      - id: representative-load-network-p95
        source: network_noise
        disposition: report_only
        metric: p95_ms
      - id: representative-load-throttle-rate
        source: backend_capacity
        disposition: report_only
        metric: throttle_rate
  - id: throttling
    service: secretsmanager
    operation: GetSecretValue
    evidence_source: deterministic
    signals: []
  - id: timeout
    service: secretsmanager
    operation: GetSecretValue
    evidence_source: deterministic
    signals: []
  - id: service-unavailable
    service: secretsmanager
    operation: GetSecretValue
    evidence_source: deterministic
    signals: []
  - id: cancellation
    service: secretsmanager
    operation: GetSecretValue
    evidence_source: deterministic
    signals: []
  - id: restart
    service: secretsmanager
    operation: CreateSecret
    evidence_source: real_azure
    signals: []
  - id: credential-rotation
    service: secretsmanager
    operation: GetSecretValue
    evidence_source: real_azure
    signals: []
  - id: rollback
    service: secretsmanager
    operation: GetSecretValue
    evidence_source: real_azure
    signals: []
