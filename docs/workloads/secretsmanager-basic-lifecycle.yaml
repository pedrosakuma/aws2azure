schema_version: 1
id: secretsmanager-basic-lifecycle
version: 1
name: Secrets Manager basic lifecycle
minimum_proxy_version: 0.1.0
real_azure_seal_max_age_days: 90
operations:
  - secretsmanager:CreateSecret
  - secretsmanager:DescribeSecret
  - secretsmanager:GetSecretValue
  - secretsmanager:PutSecretValue
  - secretsmanager:UpdateSecret
  - secretsmanager:ListSecrets
  - secretsmanager:DeleteSecret
requirements:
  - secretsmanager_basic_lifecycle
  - secretsmanager_version_stages
accepted_partial_operations:
  - secretsmanager:PutSecretValue
accepted_design_gaps:
  - "secretsmanager:Deletion recovery semantics differ"
  - "secretsmanager:Versioning and staging modelled on Key Vault version tags"
evidence:
  qualification_artifact: ""
  required_scenarios:
    - representative-load
    - throttling
    - timeout
    - service-unavailable
    - cancellation
    - restart
    - credential-rotation
    - rollback
  required_real_azure_scenarios:
    - representative-load
    - restart
    - credential-rotation
    - rollback
