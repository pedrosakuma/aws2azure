name: conformance

on:
  schedule:
    # Nightly at 04:30 UTC (~01:30 BRT), 30 min after the integration suite so
    # the two emulator jobs don't contend for the runner's Docker resources.
    - cron: '30 4 * * *'
  workflow_dispatch:
  pull_request:
    types: [labeled, synchronize, reopened]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  changes:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    outputs:
      relevant: ${{ steps.filter.outputs.relevant }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - id: filter
        uses: dorny/paths-filter@d1c1ffe0248fe513906c8e24db8ea791d46f8590 # v3
        with:
          filters: |
            relevant:
              - 'src/**'
              - 'tests/Aws2Azure.Conformance/**'
              - 'tests/Aws2Azure.TestSupport/**'
              - 'docs/gaps/**'
              - '.github/workflows/conformance.yml'

  conformance-tier2:
    needs: changes
    # Tier-2 LocalStack differential is non-blocking: runs on nightly schedule,
    # manual dispatch, relevant PR changes, or the `run-integration` label as an
    # explicit override. Tier-1 remains blocking on every PR in ci.yml.
    if: >-
      always() &&
      (github.event_name == 'schedule' ||
       github.event_name == 'workflow_dispatch' ||
       (github.event_name == 'pull_request' &&
        (needs.changes.outputs.relevant == 'true' ||
         contains(github.event.pull_request.labels.*.name, 'run-integration'))))
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: ./.github/actions/dotnet-setup
      - name: Verify Docker available
        run: docker info
      - name: Restore + build
        run: dotnet build -c Release --nologo
      - name: Run Tier-2 conformance (proxy-over-Azurite vs LocalStack S3)
        env:
          AWS2AZURE_CONFORMANCE_TIER2: '1'
        run: dotnet test tests/Aws2Azure.Conformance -c Release --no-build --nologo
