name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - name: Restore + build
        run: dotnet build -c Release --nologo
      - name: Unit tests
        run: dotnet test tests/Aws2Azure.UnitTests -c Release --no-build --nologo
      - name: AOT publish (linux-x64)
        run: dotnet publish src/Aws2Azure.Proxy -c Release -r linux-x64 --nologo
