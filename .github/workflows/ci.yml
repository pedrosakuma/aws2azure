name: ci

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded PR runs (grouped by PR number); non-PR runs (main pushes,
# schedules, dispatches) get a unique run_id group so they never cancel each other.
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  build-test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/dotnet-setup
      - name: Restore + build
        run: dotnet build -c Release --nologo
      - name: Unit tests
        run: dotnet test tests/Aws2Azure.UnitTests -c Release --no-build --nologo
      - name: Conformance tests (Tier 1, offline)
        run: dotnet test tests/Aws2Azure.Conformance -c Release --no-build --nologo
      - name: AOT/trim warning gate (linux-x64)
        run: >-
          dotnet publish src/Aws2Azure.Proxy -c Release -r linux-x64 --nologo
          -p:ILLinkTreatWarningsAsErrors=true
          -p:IlcTreatWarningsAsErrors=true
