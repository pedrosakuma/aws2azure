name: ci

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded PR runs (grouped by PR number); non-PR runs (main pushes,
# schedules, dispatches) get a unique run_id group so they never cancel each other.
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  build-test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: ./.github/actions/dotnet-setup
      - name: PR validation
        shell: pwsh
        run: ./eng/validate.ps1 pr -RuntimeIdentifier linux-x64 -RequireAot
      - name: Validate sealed runtime manifest tooling
        shell: bash
        run: |
          ./eng/test-sealed-runtime-manifest.sh
          ./eng/test-sealed-runtime-consumer.sh
          python3 ./eng/test-release-candidate-manifest.py
          ./eng/test-release-candidate-producer.sh
          python3 ./eng/test-release-candidate-image.py
      - name: Validate Entra federation response classification
        shell: bash
        run: ./.github/scripts/test-entra-federation-response-classifier.sh
      - name: Verify reproducible proxy runtime
        shell: bash
        run: ./eng/verify-deterministic-runtime.sh
