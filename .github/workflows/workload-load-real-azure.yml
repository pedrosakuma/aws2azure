name: workload-load-real-azure

# Produces immutable production-shaped load evidence for the Secrets Manager
# basic lifecycle profile. This is live Key Vault evidence only: emulator
# baselines and specialized A/B artifacts are never read or uploaded here.
on:
  schedule:
    - cron: '15 6 * * *'
  workflow_dispatch:
  pull_request:
    types: [labeled, synchronize, reopened]

permissions:
  id-token: write
  contents: read

jobs:
  secretsmanager-basic-lifecycle:
    if: >-
      github.event_name == 'schedule' ||
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'pull_request' &&
       contains(github.event.pull_request.labels.*.name, 'run-real-azure') &&
       contains(github.event.pull_request.labels.*.name, 'run-perf'))
    runs-on: ubuntu-latest
    timeout-minutes: 60
    concurrency:
      group: workload-load-real-azure-secretsmanager-basic-lifecycle
      cancel-in-progress: false
    env:
      AZURE_LOCATION: eastus2
      RG_NAME: aws2azure-load-sm-${{ github.run_id }}-${{ github.run_attempt }}
      DEPLOYMENT_NAME: aws2azure-load-secretsmanager
      CONFORMANCE_PLAN: artifacts/secretsmanager-load/provenance/conformance-plan.json
      QUALIFICATION_DIR: artifacts/secretsmanager-load/provenance
      LOAD_EVIDENCE_PATH: artifacts/secretsmanager-load/load-evidence.json
      PRIVATE_DIR: artifacts/secretsmanager-load-private
      LOAD_DURATION_SECONDS: '300'
      LOAD_CONCURRENCY: '8'
      RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: ./.github/actions/dotnet-setup

      - name: Require Workload Identity provisioning
        env:
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_OBJECT_ID: ${{ secrets.AZURE_CLIENT_OBJECT_ID }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
        run: |
          set -euo pipefail
          if [ -z "$AZURE_CLIENT_ID" ] ||
             [ -z "$AZURE_CLIENT_OBJECT_ID" ] ||
             [ -z "$AZURE_TENANT_ID" ] ||
             [ -z "$AZURE_SUBSCRIPTION_ID" ]; then
            echo "::error::Azure Workload Identity secrets and object id are required; load evidence cannot fall back to emulator or anonymous data."
            exit 1
          fi

      - name: Restore and build sealed candidate
        run: dotnet build -c Release --nologo

      - name: Validate manifests and plan canonical candidate configuration
        run: |
          set -euo pipefail
          dotnet run --project tools/Aws2Azure.GapDocs --no-build -c Release -- --validate
          mkdir -p "$QUALIFICATION_DIR"
          dotnet run --project tools/Aws2Azure.GapDocs --no-build -c Release -- \
            plan-conformance --output "$CONFORMANCE_PLAN"

      # Reproduce the integration-real-azure candidate identity separately from
      # the load producer identity. Qualification rejects a load run unless the
      # candidate runtime/config exactly matches the selected correctness
      # artifact, while producer_config_digest below seals the files actually
      # used to provision and drive this load run.
      - name: Seal runtime and non-secret candidate configuration
        id: provenance
        shell: bash
        run: |
          set -euo pipefail
          runtime_manifest="$QUALIFICATION_DIR/runtime-sha256.txt"
          (
            cd src/Aws2Azure.Proxy/bin/Release/net10.0
            find . -maxdepth 1 -type f \
              \( -name '*.dll' -o -name '*.json' -o -name 'Aws2Azure.Proxy' \) \
              -print0 |
              sort -z |
              xargs -0 sha256sum
          ) > "$GITHUB_WORKSPACE/$runtime_manifest"

          candidate_config_manifest="$QUALIFICATION_DIR/config-manifest.json"
          jq -n \
            --arg schema_version "1" \
            --arg git_sha "$(git rev-parse HEAD)" \
            --arg region "$AZURE_LOCATION" \
            --arg plan_sha256 "$(sha256sum "$CONFORMANCE_PLAN" | cut -d' ' -f1)" \
            --arg matrix_sha256 "$(sha256sum docs/testing/real-azure-conformance.yaml | cut -d' ' -f1)" \
            --arg bicep_sha256 "$(sha256sum deploy/realazure/main.bicep | cut -d' ' -f1)" \
            --arg workflow_sha256 "$(sha256sum .github/workflows/integration-real-azure.yml | cut -d' ' -f1)" \
            '{
              schema_version: ($schema_version | tonumber),
              git_sha: $git_sha,
              region: $region,
              topology: "ephemeral-per-run",
              inputs: {
                cosmos_database: "dynamodb",
                event_hub: "kinesis-smoke"
              },
              source_digests: {
                conformance_plan: ("sha256:" + $plan_sha256),
                conformance_matrix: ("sha256:" + $matrix_sha256),
                bicep: ("sha256:" + $bicep_sha256),
                workflow: ("sha256:" + $workflow_sha256)
              }
            }' > "$candidate_config_manifest"

          producer_config_manifest="$QUALIFICATION_DIR/load-producer-config-manifest.json"
          jq -n \
            --arg schema_version "1" \
            --arg git_sha "$(git rev-parse HEAD)" \
            --arg region "$AZURE_LOCATION" \
            --arg concurrency "$LOAD_CONCURRENCY" \
            --arg duration_seconds "$LOAD_DURATION_SECONDS" \
            --arg bicep_sha256 "$(sha256sum deploy/realazure/secretsmanager-load.bicep | cut -d' ' -f1)" \
            --arg workflow_sha256 "$(sha256sum .github/workflows/workload-load-real-azure.yml | cut -d' ' -f1)" \
            --arg runner_sha256 "$(sha256sum tests/Aws2Azure.IntegrationTests/SecretsManager/SecretsManagerRealAzureLoadQualificationTests.cs | cut -d' ' -f1)" \
            '{
              schema_version: ($schema_version | tonumber),
              git_sha: $git_sha,
              region: $region,
              topology: {
                backend: "Key Vault Standard",
                rbac: true,
                soft_delete_retention_days: 7,
                purge_protection: false
              },
              load_shape: {
                concurrency: ($concurrency | tonumber),
                requested_duration_seconds: ($duration_seconds | tonumber)
              },
              source_digests: {
                bicep: ("sha256:" + $bicep_sha256),
                workflow: ("sha256:" + $workflow_sha256),
                runner: ("sha256:" + $runner_sha256)
              }
            }' > "$producer_config_manifest"

          {
            echo "git_sha=$(git rev-parse HEAD)"
            echo "runtime_digest=sha256:$(sha256sum "$runtime_manifest" | cut -d' ' -f1)"
            echo "config_digest=sha256:$(sha256sum "$candidate_config_manifest" | cut -d' ' -f1)"
            echo "producer_config_digest=sha256:$(sha256sum "$producer_config_manifest" | cut -d' ' -f1)"
          } >> "$GITHUB_OUTPUT"

      - name: Azure login (OIDC)
        uses: azure/login@a457da9ea143d694b1b9c7c869ebb04ebe844ef5 # v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Provision ephemeral production Key Vault topology
        env:
          AZURE_CLIENT_OBJECT_ID: ${{ secrets.AZURE_CLIENT_OBJECT_ID }}
        run: |
          set -euo pipefail
          az group create -n "$RG_NAME" -l "$AZURE_LOCATION" \
            --tags purpose=aws2azure-nightly \
                   run-id="${{ github.run_id }}" \
                   created="$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            -o none
          az deployment group create -g "$RG_NAME" -n "$DEPLOYMENT_NAME" \
            -f deploy/realazure/secretsmanager-load.bicep \
            -p principalId="$AZURE_CLIENT_OBJECT_ID" \
            -o none

      - name: Export Key Vault endpoint
        run: |
          set -euo pipefail
          KV_URI="$(az deployment group show -g "$RG_NAME" -n "$DEPLOYMENT_NAME" \
            --query properties.outputs.keyVaultUri.value -o tsv)"
          KV_NAME="$(az deployment group show -g "$RG_NAME" -n "$DEPLOYMENT_NAME" \
            --query properties.outputs.keyVaultName.value -o tsv)"
          if [ -z "$KV_URI" ] || [ -z "$KV_NAME" ]; then
            echo "::error::The deployment did not produce a Key Vault endpoint."
            exit 1
          fi
          ready=false
          for attempt in $(seq 1 30); do
            if az keyvault secret list --vault-name "$KV_NAME" --maxresults 1 -o none 2>/dev/null; then
              ready=true
              break
            fi
            sleep 10
          done
          if [ "$ready" != true ]; then
            echo "::error::Key Vault RBAC did not become ready within five minutes."
            exit 1
          fi
          echo "AZURE_KEYVAULT_URL=$KV_URI" >> "$GITHUB_ENV"

      - name: Mint projected Workload Identity token
        env:
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
        run: |
          set -euo pipefail
          mkdir -p "$PRIVATE_DIR"
          TOKEN_FILE="$GITHUB_WORKSPACE/$PRIVATE_DIR/azure-federated-token.jwt"
          RESPONSE="$(curl -fsS \
            -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "$ACTIONS_ID_TOKEN_REQUEST_URL&audience=api://AzureADTokenExchange")"
          ASSERTION="$(printf '%s' "$RESPONSE" | python3 -c 'import sys, json; print(json.load(sys.stdin)["value"])')"
          if [ -z "$ASSERTION" ]; then
            echo "::error::Failed to obtain a projected Workload Identity token."
            exit 1
          fi
          echo "::add-mask::$ASSERTION"
          ( umask 077; printf '%s' "$ASSERTION" > "$TOKEN_FILE" )
          {
            echo "AZURE_FEDERATED_TOKEN_FILE=$TOKEN_FILE"
            echo "AZURE_TENANT_ID=$AZURE_TENANT_ID"
            echo "AZURE_CLIENT_ID=$AZURE_CLIENT_ID"
          } >> "$GITHUB_ENV"

      - name: Run production-shaped Secrets Manager lifecycle
        id: load
        env:
          AWS2AZURE_LOAD_EVIDENCE_PATH: ${{ env.LOAD_EVIDENCE_PATH }}
          AWS2AZURE_LOAD_DURATION_SECONDS: ${{ env.LOAD_DURATION_SECONDS }}
          AWS2AZURE_LOAD_CONCURRENCY: ${{ env.LOAD_CONCURRENCY }}
          AWS2AZURE_LOAD_GIT_SHA: ${{ steps.provenance.outputs.git_sha }}
          AWS2AZURE_LOAD_ARTIFACT_DIGEST: ${{ steps.provenance.outputs.runtime_digest }}
          AWS2AZURE_LOAD_CONFIG_DIGEST: ${{ steps.provenance.outputs.config_digest }}
          AWS2AZURE_LOAD_PRODUCER_CONFIG_DIGEST: ${{ steps.provenance.outputs.producer_config_digest }}
          AWS2AZURE_LOAD_RUN_URL: ${{ env.RUN_URL }}
          AWS2AZURE_LOAD_BACKEND_DESCRIPTION: Ephemeral Key Vault Standard with RBAC and seven-day soft delete
        run: |
          dotnet test tests/Aws2Azure.IntegrationTests \
            -c Release --no-build --nologo \
            --filter "Category=SecretsManagerLoadQualification" \
            --logger "console;verbosity=normal"

      - name: Summarize immutable load evidence
        if: always()
        run: |
          if [ ! -f "$LOAD_EVIDENCE_PATH" ]; then
            echo "::error::load-evidence.json was not produced."
            exit 1
          fi
          {
            echo "## Secrets Manager production-shaped load"
            echo
            echo "- Profile: \`secretsmanager-basic-lifecycle\`"
            echo "- Backend: real Azure Key Vault"
            echo "- Authentication: Workload Identity"
            echo "- Emulator evidence consumed: no"
            echo "- Duration: \`$(jq -r '.load_shape.requested_duration_seconds' "$LOAD_EVIDENCE_PATH")s\`"
            echo "- Concurrency: \`$(jq -r '.load_shape.concurrency' "$LOAD_EVIDENCE_PATH")\`"
            echo "- Completions: \`$(jq '[.operation_mix[].completions] | add' "$LOAD_EVIDENCE_PATH")\`"
            echo "- Failures: \`$(jq '[.operation_mix[].failures] | add' "$LOAD_EVIDENCE_PATH")\`"
            echo "- Policy blocker: capacity threshold and non-load operational scenarios remain unresolved"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload immutable load evidence
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: real-azure-workload-load-secretsmanager-basic-lifecycle
          path: artifacts/secretsmanager-load/load-evidence.json
          if-no-files-found: error
          retention-days: 90

      - name: Remove projected token
        if: always()
        run: rm -rf "$PRIVATE_DIR"

      - name: Deallocate ephemeral Azure resources
        if: always()
        run: bash .github/scripts/cleanup-real-azure-resource-groups.sh "$RG_NAME"
