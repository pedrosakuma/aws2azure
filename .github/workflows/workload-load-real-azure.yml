name: workload-load-real-azure

# Produces immutable production-shaped workload evidence against ephemeral real
# Azure resources. Only manual runs with an exact sealed producer are qualifying;
# scheduled/PR runs remain explicit source validation. Manual runs can select S3,
# Secrets Manager, or both. Emulator and A/B artifacts are never consumed.
on:
  schedule:
    - cron: '15 6 * * *'
  workflow_dispatch:
    inputs:
      profile:
        description: Production-shaped workload profile
        required: true
        default: secretsmanager-basic-lifecycle
        type: choice
        options:
          - secretsmanager-basic-lifecycle
          - s3-basic-object-crud
          - all
      candidate_run_id:
        description: Exact successful sealed-runtime producer run id
        required: true
        type: string
      candidate_run_attempt:
        description: Exact sealed-runtime producer attempt
        required: true
        default: '1'
        type: string
      candidate_artifact_id:
        description: Optional exact sealed artifact id (normally inferred unambiguously)
        required: false
        type: string
  pull_request:
    types: [labeled, synchronize, reopened]

permissions:
  actions: read
  attestations: read
  id-token: write
  contents: read

jobs:
  select:
    if: >-
      github.event_name == 'schedule' ||
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'pull_request' &&
       contains(github.event.pull_request.labels.*.name, 'run-real-azure') &&
       contains(github.event.pull_request.labels.*.name, 'run-perf'))
    runs-on: ubuntu-latest
    outputs:
      profiles: ${{ steps.profiles.outputs.profiles }}
    steps:
      - name: Select workload profiles
        id: profiles
        env:
          EVENT_NAME: ${{ github.event_name }}
          REQUESTED_PROFILE: ${{ inputs.profile }}
        run: |
          set -euo pipefail
          case "$EVENT_NAME" in
            schedule)
              profiles='["secretsmanager-basic-lifecycle"]'
              ;;
            workflow_dispatch)
              case "$REQUESTED_PROFILE" in
                secretsmanager-basic-lifecycle|s3-basic-object-crud)
                  profiles="[\"$REQUESTED_PROFILE\"]"
                  ;;
                all)
                  profiles='["secretsmanager-basic-lifecycle","s3-basic-object-crud"]'
                  ;;
                *)
                  echo "::error::Unsupported workload profile: $REQUESTED_PROFILE"
                  exit 1
                  ;;
              esac
              ;;
            pull_request)
              profiles='["secretsmanager-basic-lifecycle","s3-basic-object-crud"]'
              ;;
            *)
              echo "::error::Unsupported event: $EVENT_NAME"
              exit 1
              ;;
          esac
          echo "profiles=$profiles" >> "$GITHUB_OUTPUT"

  load:
    needs: select
    strategy:
      fail-fast: false
      matrix:
        profile: ${{ fromJSON(needs.select.outputs.profiles) }}
    runs-on: ubuntu-latest
    timeout-minutes: 60
    concurrency:
      group: workload-load-real-azure-${{ matrix.profile }}
      cancel-in-progress: false
    env:
      PROFILE: ${{ matrix.profile }}
      AZURE_LOCATION: eastus2
      RG_NAME: aws2azure-load-${{ matrix.profile }}-${{ github.run_id }}-${{ github.run_attempt }}
      QUALIFICATION_DIR: artifacts/workload-load/${{ matrix.profile }}/provenance
      LOAD_EVIDENCE_PATH: artifacts/workload-load/${{ matrix.profile }}/load-evidence.json
      PRIVATE_DIR: artifacts/workload-load-private/${{ matrix.profile }}
      RUNTIME_IDENTITY_A_NAME: a2a-kv-a-${{ github.run_id }}-${{ github.run_attempt }}
      RUNTIME_IDENTITY_B_NAME: a2a-kv-b-${{ github.run_id }}-${{ github.run_attempt }}
      LOAD_DURATION_SECONDS: '300'
      LOAD_CONCURRENCY: '8'
      RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: ./.github/actions/dotnet-setup

      - name: Select qualifying or source-validation mode
        id: mode
        env:
          EVENT_NAME: ${{ github.event_name }}
          REF: ${{ github.ref }}
          REF_PROTECTED: ${{ github.ref_protected }}
          CANDIDATE_RUN_ID: ${{ inputs.candidate_run_id }}
          CANDIDATE_RUN_ATTEMPT: ${{ inputs.candidate_run_attempt }}
        run: |
          set -euo pipefail
          qualification_sha="$(git rev-parse HEAD)"
          if [ "$EVENT_NAME" = workflow_dispatch ]; then
            if [[ ! "$CANDIDATE_RUN_ID" =~ ^[1-9][0-9]*$ ]] ||
               [[ ! "$CANDIDATE_RUN_ATTEMPT" =~ ^[1-9][0-9]*$ ]]; then
              echo "::error::Manual qualification requires numeric candidate run id and attempt."
              exit 1
            fi
            if [ "$REF_PROTECTED" != true ] ||
               { [ "$REF" != refs/heads/main ] &&
                 [[ ! "$REF" =~ ^refs/tags/v[0-9]+\.[0-9]+\.[0-9]+-rc([.-]?[0-9A-Za-z]+)*$ ]]; }; then
              echo "::error::Sealed qualification must run from protected main or an allowed protected RC tag."
              exit 1
            fi
            qualifying=true
            runtime_mode=rollback
          else
            qualifying=false
            runtime_mode=source_validation
          fi
          {
            echo "qualifying=$qualifying"
            echo "qualification_sha=$qualification_sha"
          } >> "$GITHUB_OUTPUT"
          {
            echo "AWS2AZURE_SEALED_RUNTIME_MODE=$runtime_mode"
            echo "AWS2AZURE_QUALIFICATION_SHA=$qualification_sha"
          } >> "$GITHUB_ENV"

      - name: Configure selected producer
        run: |
          set -euo pipefail
          case "$PROFILE" in
            secretsmanager-basic-lifecycle)
              {
                echo "DEPLOYMENT_NAME=aws2azure-load-secretsmanager"
                echo "BICEP_PATH=deploy/realazure/secretsmanager-load.bicep"
                echo "RUNNER_PATH=tests/Aws2Azure.IntegrationTests/SecretsManager/SecretsManagerRealAzureLoadQualificationTests.cs"
                echo "TEST_FILTER=Category=SecretsManagerLoadQualification"
                echo "BACKEND_DESCRIPTION=Ephemeral Key Vault Standard with RBAC and seven-day soft delete"
              } >> "$GITHUB_ENV"
              ;;
            s3-basic-object-crud)
              {
                echo "DEPLOYMENT_NAME=aws2azure-load-s3"
                echo "BICEP_PATH=deploy/realazure/s3-load.bicep"
                echo "RUNNER_PATH=tests/Aws2Azure.IntegrationTests/S3/S3RealAzureLoadQualificationTests.cs"
                echo "TEST_FILTER=Category=S3LoadQualification"
                echo "BACKEND_DESCRIPTION=Ephemeral Azure Blob StorageV2 Standard_LRS"
              } >> "$GITHUB_ENV"
              ;;
            *)
              echo "::error::Unsupported workload profile: $PROFILE"
              exit 1
              ;;
          esac

      - name: Require Azure OIDC provisioning
        env:
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_OBJECT_ID: ${{ secrets.AZURE_CLIENT_OBJECT_ID }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
        run: |
          set -euo pipefail
          if [ -z "$AZURE_CLIENT_ID" ] ||
             [ -z "$AZURE_TENANT_ID" ] ||
             [ -z "$AZURE_SUBSCRIPTION_ID" ]; then
            echo "::error::Azure OIDC secrets are required; load evidence cannot fall back to emulator or anonymous data."
            exit 1
          fi
          if [ "$PROFILE" = secretsmanager-basic-lifecycle ] &&
             [ -z "$AZURE_CLIENT_OBJECT_ID" ]; then
            echo "::error::AZURE_CLIENT_OBJECT_ID is required for Key Vault data-plane RBAC."
            exit 1
          fi

      - name: Build test harness and validation tools
        run: dotnet build -c Release --nologo

      - name: Validate manifests and plan canonical candidate configuration
        env:
          CONFORMANCE_PLAN: artifacts/workload-load/${{ matrix.profile }}/provenance/conformance-plan.json
        run: |
          set -euo pipefail
          gap_docs="tools/Aws2Azure.GapDocs/bin/Release/net10.0/Aws2Azure.GapDocs.dll"
          dotnet exec "$gap_docs" --validate
          mkdir -p "$QUALIFICATION_DIR"
          dotnet exec "$gap_docs" \
            plan-conformance --output "$CONFORMANCE_PLAN"

      - name: Resolve exact sealed candidate and profile rollback baseline
        if: steps.mode.outputs.qualifying == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          CANDIDATE_RUN_ID: ${{ inputs.candidate_run_id }}
          CANDIDATE_RUN_ATTEMPT: ${{ inputs.candidate_run_attempt }}
          CANDIDATE_ARTIFACT_ID: ${{ inputs.candidate_artifact_id }}
        run: |
          set -euo pipefail
          install -d -m 0700 "$PRIVATE_DIR"
          identity_dir="$QUALIFICATION_DIR/sealed-runtimes"
          install -d -m 0700 "$identity_dir"
          gap_docs="tools/Aws2Azure.GapDocs/bin/Release/net10.0/Aws2Azure.GapDocs.dll"
          prior_ledger="$identity_dir/prior-ledger.json"
          dotnet exec "$gap_docs" export-approved-runtime \
            --profile "$PROFILE" \
            --output "$prior_ledger"
          chmod 0600 "$prior_ledger"

          candidate_args=(
            --repository "$GITHUB_REPOSITORY"
            --run-id "$CANDIDATE_RUN_ID"
            --run-attempt "$CANDIDATE_RUN_ATTEMPT"
            --expected-sha "${{ steps.mode.outputs.qualification_sha }}"
            --expected-ref "$GITHUB_REF"
            --profile "$PROFILE"
            --profile-version 1
            --role candidate
            --destination "$PRIVATE_DIR/sealed-candidate"
            --identity-output "$identity_dir/candidate-runtime.json"
            --github-env "$GITHUB_ENV"
          )
          if [ -n "$CANDIDATE_ARTIFACT_ID" ]; then
            candidate_args+=(--artifact-id "$CANDIDATE_ARTIFACT_ID")
          fi
          ./eng/resolve-sealed-runtime.sh "${candidate_args[@]}"

          prior_run_id="$(jq -er '.record.producer.run_id' "$prior_ledger")"
          prior_attempt="$(jq -er '.record.producer.run_attempt' "$prior_ledger")"
          prior_sha="$(jq -er '.record.runtime.source_sha' "$prior_ledger")"
          prior_ref="$(jq -er '.record.attestation.source_ref' "$prior_ledger")"
          prior_artifact_id="$(jq -er '.record.artifact.id' "$prior_ledger")"
          ./eng/resolve-sealed-runtime.sh \
            --repository "$GITHUB_REPOSITORY" \
            --run-id "$prior_run_id" \
            --run-attempt "$prior_attempt" \
            --expected-sha "$prior_sha" \
            --expected-ref "$prior_ref" \
            --profile "$PROFILE" \
            --profile-version 1 \
            --role prior \
            --artifact-id "$prior_artifact_id" \
            --ledger-json "$prior_ledger" \
            --destination "$PRIVATE_DIR/sealed-prior" \
            --identity-output "$identity_dir/prior-runtime.json" \
            --github-env "$GITHUB_ENV"

          candidate_identity="$identity_dir/candidate-runtime.json"
          prior_identity="$identity_dir/prior-runtime.json"
          for field in source.sha runtime.aggregate_digest runtime.executable_digest; do
            candidate_value="$(jq -er ".$field" "$candidate_identity")"
            prior_value="$(jq -er ".$field" "$prior_identity")"
            if [ "$candidate_value" = "$prior_value" ]; then
              echo "::error::Candidate and prior must be distinct at $field."
              exit 1
            fi
          done
          cp "$PRIVATE_DIR/sealed-candidate/bundle/runtime-sha256.txt" \
            "$QUALIFICATION_DIR/runtime-sha256.txt"

      # Candidate identity is reproduced from integration-real-azure. The
      # producer digest separately seals the profile-specific topology and code.
      - name: Seal runtime, candidate config, and producer config
        id: provenance
        env:
          CONFORMANCE_PLAN: artifacts/workload-load/${{ matrix.profile }}/provenance/conformance-plan.json
        run: |
          set -euo pipefail
          runtime_manifest="$QUALIFICATION_DIR/runtime-sha256.txt"
          if [ "${{ steps.mode.outputs.qualifying }}" != true ]; then
            (
              cd src/Aws2Azure.Proxy/bin/Release/net10.0
              find . -maxdepth 1 -type f \
                \( -name '*.dll' -o -name '*.json' -o -name 'Aws2Azure.Proxy' \) \
                -print0 |
                sort -z |
                xargs -0 sha256sum
            ) > "$GITHUB_WORKSPACE/$runtime_manifest"
          fi

          candidate_config_manifest="$QUALIFICATION_DIR/config-manifest.json"
          jq -n \
            --arg schema_version "1" \
            --arg git_sha "$(git rev-parse HEAD)" \
            --arg region "$AZURE_LOCATION" \
            --arg matrix_sha256 "$(sha256sum docs/testing/real-azure-conformance.yaml | cut -d' ' -f1)" \
            --arg bicep_sha256 "$(sha256sum deploy/realazure/main.bicep | cut -d' ' -f1)" \
            --arg workflow_sha256 "$(sha256sum .github/workflows/integration-real-azure.yml | cut -d' ' -f1)" \
            '{
              schema_version: ($schema_version | tonumber),
              git_sha: $git_sha,
              region: $region,
              topology: "ephemeral-per-run",
              inputs: {
                cosmos_database: "dynamodb",
                event_hub: "kinesis-smoke"
              },
              source_digests: {
                conformance_matrix: ("sha256:" + $matrix_sha256),
                bicep: ("sha256:" + $bicep_sha256),
                workflow: ("sha256:" + $workflow_sha256)
              }
            }' > "$candidate_config_manifest"

          if [ "$PROFILE" = secretsmanager-basic-lifecycle ]; then
            topology='{
              "backend": "Key Vault Standard",
              "rbac": true,
              "soft_delete_retention_days": 7,
              "purge_protection": false
            }'
          else
            topology='{
              "backend": "Blob StorageV2",
              "sku": "Standard_LRS",
              "public_blob_access": false,
              "soft_delete": false
            }'
          fi

          producer_config_manifest="$QUALIFICATION_DIR/load-producer-config-manifest.json"
          if [ "${{ steps.mode.outputs.qualifying }}" = true ]; then
            qualification_mode=sealed
            candidate_identity_digest="sha256:$(sha256sum "$QUALIFICATION_DIR/sealed-runtimes/candidate-runtime.json" | cut -d' ' -f1)"
            prior_identity_digest="sha256:$(sha256sum "$QUALIFICATION_DIR/sealed-runtimes/prior-runtime.json" | cut -d' ' -f1)"
          else
            qualification_mode=source_validation
            candidate_identity_digest=
            prior_identity_digest=
          fi
          jq -n \
            --arg schema_version "1" \
            --arg profile "$PROFILE" \
            --arg git_sha "$(git rev-parse HEAD)" \
            --arg region "$AZURE_LOCATION" \
            --arg concurrency "$LOAD_CONCURRENCY" \
            --arg duration_seconds "$LOAD_DURATION_SECONDS" \
            --arg qualification_mode "$qualification_mode" \
            --arg candidate_identity_digest "$candidate_identity_digest" \
            --arg prior_identity_digest "$prior_identity_digest" \
            --arg bicep_sha256 "$(sha256sum "$BICEP_PATH" | cut -d' ' -f1)" \
            --arg workflow_sha256 "$(sha256sum .github/workflows/workload-load-real-azure.yml | cut -d' ' -f1)" \
            --arg runner_sha256 "$(sha256sum "$RUNNER_PATH" | cut -d' ' -f1)" \
            --arg shared_runner_sha256 "$(sha256sum tests/Aws2Azure.IntegrationTests/OperationalQualification/RealAzureWorkloadLoadEvidence.cs | cut -d' ' -f1)" \
            --arg completed_iteration_counter_sha256 "$(sha256sum tests/Aws2Azure.TestSupport/OperationalQualification/CompletedIterationCounter.cs | cut -d' ' -f1)" \
            --arg load_evidence_producer_guard_sha256 "$(sha256sum tests/Aws2Azure.TestSupport/OperationalQualification/LoadEvidenceProducerGuard.cs | cut -d' ' -f1)" \
            --arg failure_qualification_sha256 "$(sha256sum tests/Aws2Azure.IntegrationTests/OperationalQualification/DeterministicFailureQualification.cs | cut -d' ' -f1)" \
            --arg restart_qualification_sha256 "$(sha256sum tests/Aws2Azure.IntegrationTests/OperationalQualification/RealAzureRestartQualification.cs | cut -d' ' -f1)" \
            --arg rollback_qualification_sha256 "$(sha256sum tests/Aws2Azure.IntegrationTests/OperationalQualification/RealAzureRollbackQualification.cs | cut -d' ' -f1)" \
            --arg credential_rotation_qualification_sha256 "$(sha256sum tests/Aws2Azure.IntegrationTests/OperationalQualification/SecretsManagerCredentialRotationQualification.cs | cut -d' ' -f1)" \
            --arg sealed_launcher_sha256 "$(sha256sum tests/Aws2Azure.TestSupport/OperationalQualification/SealedRuntimeLauncher.cs | cut -d' ' -f1)" \
            --arg sealed_resolver_sha256 "$(sha256sum eng/resolve-sealed-runtime.sh | cut -d' ' -f1)" \
            --arg sealed_manifest_sha256 "$(sha256sum eng/sealed-runtime-manifest.sh | cut -d' ' -f1)" \
            --arg approved_runtime_ledger_sha256 "$(sha256sum "docs/workloads/approved-runtimes/$PROFILE.yaml" | cut -d' ' -f1)" \
            --arg secretsmanager_fixture_sha256 "$(sha256sum tests/Aws2Azure.IntegrationTests/Fixtures/SecretsManagerRealAzureProxyFixture.cs | cut -d' ' -f1)" \
            --arg realazure_fixture_sha256 "$(sha256sum tests/Aws2Azure.IntegrationTests/Fixtures/RealAzureProxyFixture.cs | cut -d' ' -f1)" \
            --arg federation_classifier_sha256 "$(sha256sum .github/scripts/classify-entra-federation-response.sh | cut -d' ' -f1)" \
            --arg manifest_sha256 "$(sha256sum "docs/workloads/$PROFILE.yaml" | cut -d' ' -f1)" \
            --arg policy_sha256 "$(sha256sum "docs/workloads/qualification/$PROFILE.yaml" | cut -d' ' -f1)" \
            --argjson topology "$topology" \
            '{
              schema_version: ($schema_version | tonumber),
              profile_id: $profile,
              git_sha: $git_sha,
              region: $region,
              topology: $topology,
              load_shape: {
                concurrency: ($concurrency | tonumber),
                requested_duration_seconds: ($duration_seconds | tonumber)
              },
              qualification_mode: $qualification_mode,
              sealed_runtime_identities: {
                candidate:
                  (if $candidate_identity_digest == "" then null else $candidate_identity_digest end),
                prior:
                  (if $prior_identity_digest == "" then null else $prior_identity_digest end)
              },
              source_digests: {
                bicep: ("sha256:" + $bicep_sha256),
                workflow: ("sha256:" + $workflow_sha256),
                runner: ("sha256:" + $runner_sha256),
                shared_runner: ("sha256:" + $shared_runner_sha256),
                completed_iteration_counter: ("sha256:" + $completed_iteration_counter_sha256),
                load_evidence_producer_guard: ("sha256:" + $load_evidence_producer_guard_sha256),
                deterministic_failure_qualification: ("sha256:" + $failure_qualification_sha256),
                restart_qualification: ("sha256:" + $restart_qualification_sha256),
                rollback_qualification: ("sha256:" + $rollback_qualification_sha256),
                credential_rotation_qualification: ("sha256:" + $credential_rotation_qualification_sha256),
                sealed_runtime_launcher: ("sha256:" + $sealed_launcher_sha256),
                sealed_runtime_resolver: ("sha256:" + $sealed_resolver_sha256),
                sealed_runtime_manifest_validator: ("sha256:" + $sealed_manifest_sha256),
                approved_runtime_ledger: ("sha256:" + $approved_runtime_ledger_sha256),
                secretsmanager_fixture: ("sha256:" + $secretsmanager_fixture_sha256),
                realazure_fixture: ("sha256:" + $realazure_fixture_sha256),
                federation_response_classifier: ("sha256:" + $federation_classifier_sha256),
                workload_manifest: ("sha256:" + $manifest_sha256),
                qualification_policy: ("sha256:" + $policy_sha256)
              }
            }' > "$producer_config_manifest"

          if [ "${{ steps.mode.outputs.qualifying }}" = true ]; then
            git_sha="$(jq -er '.source.sha' "$QUALIFICATION_DIR/sealed-runtimes/candidate-runtime.json")"
            runtime_digest="$(jq -er '.runtime.aggregate_digest' "$QUALIFICATION_DIR/sealed-runtimes/candidate-runtime.json")"
          else
            git_sha="$(git rev-parse HEAD)"
            runtime_digest="sha256:$(sha256sum "$runtime_manifest" | cut -d' ' -f1)"
          fi
          {
            echo "git_sha=$git_sha"
            echo "runtime_digest=$runtime_digest"
            echo "config_digest=sha256:$(sha256sum "$candidate_config_manifest" | cut -d' ' -f1)"
            echo "producer_config_digest=sha256:$(sha256sum "$producer_config_manifest" | cut -d' ' -f1)"
          } >> "$GITHUB_OUTPUT"

      - name: Azure login (OIDC)
        uses: azure/login@a457da9ea143d694b1b9c7c869ebb04ebe844ef5 # v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Provision isolated production-shaped topology
        env:
          AZURE_CLIENT_OBJECT_ID: ${{ secrets.AZURE_CLIENT_OBJECT_ID }}
        run: |
          set -euo pipefail
          az group create -n "$RG_NAME" -l "$AZURE_LOCATION" \
            --tags purpose=aws2azure-workload-load \
                   profile="$PROFILE" \
                   run-id="${{ github.run_id }}" \
                   created="$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            -o none
          args=(
            az deployment group create
            -g "$RG_NAME"
            -n "$DEPLOYMENT_NAME"
            -f "$BICEP_PATH"
          )
          if [ "$PROFILE" = secretsmanager-basic-lifecycle ]; then
            args+=(-p bootstrapPrincipalId="$AZURE_CLIENT_OBJECT_ID")
          fi
          "${args[@]}" -o none

      - name: Export selected backend
        run: |
          set -euo pipefail
          if [ "$PROFILE" = secretsmanager-basic-lifecycle ]; then
            endpoint="$(az deployment group show -g "$RG_NAME" -n "$DEPLOYMENT_NAME" \
              --query properties.outputs.keyVaultUri.value -o tsv)"
            name="$(az deployment group show -g "$RG_NAME" -n "$DEPLOYMENT_NAME" \
              --query properties.outputs.keyVaultName.value -o tsv)"
            vault_id="$(az deployment group show -g "$RG_NAME" -n "$DEPLOYMENT_NAME" \
              --query properties.outputs.keyVaultId.value -o tsv)"
            if [ -z "$endpoint" ] || [ -z "$name" ] || [ -z "$vault_id" ]; then
              echo "::error::The deployment did not produce a Key Vault endpoint."
              exit 1
            fi
            ready=false
            for attempt in $(seq 1 30); do
              if az keyvault secret list --vault-name "$name" --maxresults 1 -o none 2>/dev/null; then
                ready=true
                break
              fi
              sleep 10
            done
            if [ "$ready" != true ]; then
              echo "::error::Key Vault RBAC did not become ready within five minutes."
              exit 1
            fi
            {
              echo "AZURE_KEYVAULT_URL=$endpoint"
              echo "AZURE_KEYVAULT_ID=$vault_id"
            } >> "$GITHUB_ENV"
          else
            account="$(az deployment group show -g "$RG_NAME" -n "$DEPLOYMENT_NAME" \
              --query properties.outputs.storageAccountName.value -o tsv)"
            endpoint="$(az deployment group show -g "$RG_NAME" -n "$DEPLOYMENT_NAME" \
              --query properties.outputs.blobEndpoint.value -o tsv)"
            key="$(az storage account keys list -g "$RG_NAME" -n "$account" \
              --query '[0].value' -o tsv)"
            if [ -z "$account" ] || [ -z "$endpoint" ] || [ -z "$key" ]; then
              echo "::error::The deployment did not produce usable Blob Storage credentials."
              exit 1
            fi
            echo "::add-mask::$key"
            {
              echo "AZURE_BLOB_ACCOUNT=$account"
              echo "AZURE_BLOB_KEY=$key"
              echo "AZURE_BLOB_ENDPOINT=$endpoint"
            } >> "$GITHUB_ENV"
          fi

      - name: Provision blue/green runtime Workload Identities
        if: matrix.profile == 'secretsmanager-basic-lifecycle'
        env:
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
        run: |
          set -euo pipefail
          install -d -m 0700 "$PRIVATE_DIR"
          TOKEN_DIR="$GITHUB_WORKSPACE/$PRIVATE_DIR/tokens"
          install -d -m 0700 "$TOKEN_DIR"
          TOKEN_A="$TOKEN_DIR/runtime-a.jwt"
          TOKEN_B="$TOKEN_DIR/runtime-b.jwt"

          mint_token() {
            local destination="$1"
            ( umask 077
              curl -fsS \
                -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
                "$ACTIONS_ID_TOKEN_REQUEST_URL&audience=api://AzureADTokenExchange" |
                python3 -c \
                  'import json, pathlib, sys; value=json.load(sys.stdin).get("value"); assert value; pathlib.Path(sys.argv[1]).write_text(value)' \
                  "$destination"
            )
            chmod 0600 "$destination"
          }

          mint_token "$TOKEN_A"
          mapfile -t claims < <(
            python3 - "$TOKEN_A" <<'PY'
          import base64
          import json
          import pathlib
          import sys

          token = pathlib.Path(sys.argv[1]).read_text().strip()
          payload = token.split('.')[1]
          payload += '=' * (-len(payload) % 4)
          claims = json.loads(base64.urlsafe_b64decode(payload))
          audience = claims['aud']
          if isinstance(audience, list):
              if len(audience) != 1:
                  raise SystemExit('OIDC assertion must have exactly one audience')
              audience = audience[0]
          print(claims['iss'])
          print(claims['sub'])
          print(audience)
          PY
          )
          if [ "${#claims[@]}" -ne 3 ] ||
             [ -z "${claims[0]}" ] ||
             [ -z "${claims[1]}" ] ||
             [ "${claims[2]}" != "api://AzureADTokenExchange" ]; then
            echo "::error::GitHub OIDC assertion claims are incomplete or unexpected."
            exit 1
          fi
          issuer="${claims[0]}"
          subject="${claims[1]}"
          audience="${claims[2]}"

          client_a="$(az identity create -g "$RG_NAME" -n "$RUNTIME_IDENTITY_A_NAME" \
            --query clientId -o tsv)"
          object_a="$(az identity show -g "$RG_NAME" -n "$RUNTIME_IDENTITY_A_NAME" \
            --query principalId -o tsv)"
          client_b="$(az identity create -g "$RG_NAME" -n "$RUNTIME_IDENTITY_B_NAME" \
            --query clientId -o tsv)"
          object_b="$(az identity show -g "$RG_NAME" -n "$RUNTIME_IDENTITY_B_NAME" \
            --query principalId -o tsv)"
          if [ -z "$client_a" ] || [ -z "$object_a" ] ||
             [ -z "$client_b" ] || [ -z "$object_b" ]; then
            echo "::error::Runtime UAMI provisioning returned incomplete identity."
            exit 1
          fi

          az identity federated-credential create \
            -g "$RG_NAME" --identity-name "$RUNTIME_IDENTITY_A_NAME" \
            -n github-actions-exact \
            --issuer "$issuer" --subject "$subject" --audiences "$audience" -o none
          az identity federated-credential create \
            -g "$RG_NAME" --identity-name "$RUNTIME_IDENTITY_B_NAME" \
            -n github-actions-exact \
            --issuer "$issuer" --subject "$subject" --audiences "$audience" -o none

          role_id='b86a8fe4-44ce-4948-aee5-eccb2c155cd7'
          role_a="$(az role assignment create \
            --assignee-object-id "$object_a" --assignee-principal-type ServicePrincipal \
            --role "$role_id" --scope "$AZURE_KEYVAULT_ID" --query id -o tsv)"
          role_b="$(az role assignment create \
            --assignee-object-id "$object_b" --assignee-principal-type ServicePrincipal \
            --role "$role_id" --scope "$AZURE_KEYVAULT_ID" --query id -o tsv)"
          if [ -z "$role_a" ] || [ -z "$role_b" ]; then
            echo "::error::Runtime Key Vault role assignment provisioning was incomplete."
            exit 1
          fi
          mint_token "$TOKEN_B"
          token_a_digest="$(sha256sum "$TOKEN_A" | cut -d' ' -f1)"
          token_b_digest="$(sha256sum "$TOKEN_B" | cut -d' ' -f1)"
          if [ "$token_a_digest" = "$token_b_digest" ]; then
            echo "::error::Runtime A/B projected OIDC assertions must be distinct."
            exit 1
          fi
          unset token_a_digest token_b_digest

          {
            echo "AZURE_TENANT_ID=$AZURE_TENANT_ID"
            echo "AZURE_CLIENT_ID=$client_a"
            echo "AZURE_FEDERATED_TOKEN_FILE=$TOKEN_A"
            echo "AWS2AZURE_ROTATION_CLIENT_ID_A=$client_a"
            echo "AWS2AZURE_ROTATION_OBJECT_ID_A=$object_a"
            echo "AWS2AZURE_ROTATION_ROLE_ASSIGNMENT_ID_A=$role_a"
            echo "AWS2AZURE_ROTATION_TOKEN_FILE_A=$TOKEN_A"
            echo "AWS2AZURE_ROTATION_CLIENT_ID_B=$client_b"
            echo "AWS2AZURE_ROTATION_OBJECT_ID_B=$object_b"
            echo "AWS2AZURE_ROTATION_ROLE_ASSIGNMENT_ID_B=$role_b"
            echo "AWS2AZURE_ROTATION_TOKEN_FILE_B=$TOKEN_B"
            echo "AWS2AZURE_ROTATION_FEDERATED_ISSUER_DIGEST=sha256:$(printf '%s' "$issuer" | sha256sum | cut -d' ' -f1)"
            echo "AWS2AZURE_ROTATION_FEDERATED_SUBJECT_DIGEST=sha256:$(printf '%s' "$subject" | sha256sum | cut -d' ' -f1)"
            echo "AWS2AZURE_ROTATION_FEDERATED_AUDIENCE_DIGEST=sha256:$(printf '%s' "$audience" | sha256sum | cut -d' ' -f1)"
          } >> "$GITHUB_ENV"

      - name: Verify narrowly classified runtime identity propagation
        if: matrix.profile == 'secretsmanager-basic-lifecycle'
        run: |
          set -euo pipefail
          umask 077
          refresh_assertion() {
            local destination="$1"
            ( umask 077
              curl -fsS \
                -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
                "$ACTIONS_ID_TOKEN_REQUEST_URL&audience=api://AzureADTokenExchange" |
                python3 -c \
                  'import json, pathlib, sys; value=json.load(sys.stdin).get("value"); assert value; pathlib.Path(sys.argv[1]).write_text(value)' \
                  "$destination"
            )
            chmod 0600 "$destination"
          }
          assert_distinct_assertions() {
            local digest_a digest_b
            digest_a="$(sha256sum "$AWS2AZURE_ROTATION_TOKEN_FILE_A" | cut -d' ' -f1)"
            digest_b="$(sha256sum "$AWS2AZURE_ROTATION_TOKEN_FILE_B" | cut -d' ' -f1)"
            if [ "$digest_a" = "$digest_b" ]; then
              echo "::error::Runtime A/B projected OIDC assertions must be distinct."
              return 1
            fi
          }
          verify_identity() {
            local label="$1"
            local client_id="$2"
            local token_file="$3"
            local exchange_file="$PRIVATE_DIR/$label-exchange.json"
            local header_file="$PRIVATE_DIR/$label-authorization.header"
            local vault_file="$PRIVATE_DIR/$label-vault.json"
            local deadline=$(( $(date -u +%s) + 300 ))
            local federation_retries=0
            local rbac_retries=0

            while [ "$(date -u +%s)" -lt "$deadline" ]; do
              exchange_status="$(curl -sS -o "$exchange_file" -w '%{http_code}' \
                -X POST "https://login.microsoftonline.com/$AZURE_TENANT_ID/oauth2/v2.0/token" \
                -H 'Content-Type: application/x-www-form-urlencoded' \
                --data-urlencode 'grant_type=client_credentials' \
                --data-urlencode "client_id=$client_id" \
                --data-urlencode 'scope=https://vault.azure.net/.default' \
                --data-urlencode 'client_assertion_type=urn:ietf:params:oauth:client-assertion-type:jwt-bearer' \
                --data-urlencode "client_assertion@$token_file")"
              chmod 0600 "$exchange_file"

              if [ "$exchange_status" = 200 ]; then
                jq -er '"Authorization: Bearer " + .access_token' \
                  "$exchange_file" > "$header_file"
                chmod 0600 "$header_file"
                vault_status="$(curl -sS -o "$vault_file" -w '%{http_code}' \
                  -H "@$header_file" \
                  "${AZURE_KEYVAULT_URL%/}/secrets?api-version=7.4")"
                chmod 0600 "$vault_file"
                if [ "$vault_status" = 200 ]; then
                  rm -f "$exchange_file" "$header_file" "$vault_file"
                  echo "$label federation retries: $federation_retries; RBAC retries: $rbac_retries"
                  return 0
                fi
                if [ "$vault_status" = 403 ]; then
                  rbac_retries=$((rbac_retries + 1))
                  sleep 5
                  continue
                fi
                echo "::error::$label Key Vault setup probe failed with unexpected HTTP $vault_status."
                return 1
              fi

              classification="$(
                ./.github/scripts/classify-entra-federation-response.sh \
                  "$exchange_status" "$exchange_file"
              )"
              IFS=$'\t' read -r disposition error_name aadsts_code <<< "$classification"
              if [ "$disposition" = retry ]; then
                federation_retries=$((federation_retries + 1))
                sleep 5
                continue
              fi
              echo "::error::$label federation setup probe failed with unexpected HTTP $exchange_status (error=$error_name, aadsts=$aadsts_code)."
              return 1
            done
            echo "::error::$label federation/RBAC propagation exceeded five minutes."
            return 1
          }

          refresh_assertion "$AWS2AZURE_ROTATION_TOKEN_FILE_A"
          verify_identity runtime-a \
            "$AWS2AZURE_ROTATION_CLIENT_ID_A" "$AWS2AZURE_ROTATION_TOKEN_FILE_A"
          refresh_assertion "$AWS2AZURE_ROTATION_TOKEN_FILE_B"
          assert_distinct_assertions
          verify_identity runtime-b \
            "$AWS2AZURE_ROTATION_CLIENT_ID_B" "$AWS2AZURE_ROTATION_TOKEN_FILE_B"

      - name: Run production-shaped workload through the official AWS SDK
        env:
          AWS2AZURE_LOAD_EVIDENCE_PATH: ${{ env.LOAD_EVIDENCE_PATH }}
          AWS2AZURE_LOAD_DURATION_SECONDS: ${{ env.LOAD_DURATION_SECONDS }}
          AWS2AZURE_LOAD_CONCURRENCY: ${{ env.LOAD_CONCURRENCY }}
          AWS2AZURE_LOAD_GIT_SHA: ${{ steps.provenance.outputs.git_sha }}
          AWS2AZURE_LOAD_ARTIFACT_DIGEST: ${{ steps.provenance.outputs.runtime_digest }}
          AWS2AZURE_LOAD_CONFIG_DIGEST: ${{ steps.provenance.outputs.config_digest }}
          AWS2AZURE_LOAD_PRODUCER_CONFIG_DIGEST: ${{ steps.provenance.outputs.producer_config_digest }}
          AWS2AZURE_LOAD_RUN_URL: ${{ env.RUN_URL }}
          AWS2AZURE_LOAD_BACKEND_DESCRIPTION: ${{ env.BACKEND_DESCRIPTION }}
        run: |
          set -euo pipefail
          if [ "$PROFILE" = secretsmanager-basic-lifecycle ]; then
            ( umask 077
              curl -fsS \
                -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
                "$ACTIONS_ID_TOKEN_REQUEST_URL&audience=api://AzureADTokenExchange" |
                python3 -c \
                  'import json, pathlib, sys; value=json.load(sys.stdin).get("value"); assert value; pathlib.Path(sys.argv[1]).write_text(value)' \
                  "$AWS2AZURE_ROTATION_TOKEN_FILE_A"
            )
            chmod 0600 "$AWS2AZURE_ROTATION_TOKEN_FILE_A"
          fi
          dotnet test tests/Aws2Azure.IntegrationTests \
            -c Release --no-build --nologo \
            --filter "$TEST_FILTER" \
            --logger "console;verbosity=normal"

      - name: Summarize immutable load evidence
        if: always()
        run: |
          if [ ! -f "$LOAD_EVIDENCE_PATH" ]; then
            echo "::error::load-evidence.json was not produced."
            exit 1
          fi
          {
            echo "## Production-shaped real-Azure workload load"
            echo
            echo "- Profile: \`$PROFILE\`"
            echo "- Backend: \`$(jq -r '.provenance.backend_description' "$LOAD_EVIDENCE_PATH")\`"
            echo "- Official AWS SDK through proxy: yes"
            echo "- Emulator evidence consumed: no"
            echo "- Qualification mode: \`$(jq -r '.candidate.qualification_mode' "$LOAD_EVIDENCE_PATH")\`"
            echo "- Duration: \`$(jq -r '.load_shape.requested_duration_seconds' "$LOAD_EVIDENCE_PATH")s\`"
            echo "- Concurrency: \`$(jq -r '.load_shape.concurrency' "$LOAD_EVIDENCE_PATH")\`"
            echo "- Completions: \`$(jq '[.operation_mix[].completions] | add' "$LOAD_EVIDENCE_PATH")\`"
            echo "- Failures: \`$(jq '[.operation_mix[].failures] | add' "$LOAD_EVIDENCE_PATH")\`"
            echo "- P95: \`$(jq -r '.signals[] | select(.id == "representative-load-p95") | .measured_value' "$LOAD_EVIDENCE_PATH") ms\`"
            echo "- P99: \`$(jq -r '.signals[] | select(.id == "representative-load-p99") | .measured_value' "$LOAD_EVIDENCE_PATH") ms\`"
            if [ "$PROFILE" = secretsmanager-basic-lifecycle ]; then
              echo "- Backend identity rotation completions: \`$(jq -r '.scenarios[] | select(.id == "credential-rotation") | .completions' "$LOAD_EVIDENCE_PATH")\`"
              echo "- Rotation green reads: \`$(jq -r '.credential_rotation_proofs[0].green_read_completions' "$LOAD_EVIDENCE_PATH")\`"
              echo "- Revoked identity denied: \`$(jq -r '.credential_rotation_proofs[0].old_access_denied_completions == 1' "$LOAD_EVIDENCE_PATH")\`"
            fi
            rollback_completions="$(jq -r '.scenarios[] | select(.id == "rollback") | .completions' "$LOAD_EVIDENCE_PATH")"
            echo "- Exact sealed rollback completions: \`$rollback_completions\`"
            if [ "${{ steps.mode.outputs.qualifying }}" != true ]; then
              echo "- Eligibility: \`ineligible source validation; never consumable by final qualification\`"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload immutable load evidence
        if: always() && steps.mode.outputs.qualifying == 'true'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: real-azure-workload-load-${{ matrix.profile }}
          path: artifacts/workload-load/${{ matrix.profile }}/**
          if-no-files-found: error
          retention-days: 90

      - name: Upload explicitly non-qualifying source validation
        if: always() && steps.mode.outputs.qualifying != 'true'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: source-validation-workload-load-${{ matrix.profile }}
          path: artifacts/workload-load/${{ matrix.profile }}/**
          if-no-files-found: error
          retention-days: 14

      - name: Remove runtime identities, role assignments, and projected tokens
        if: always()
        run: |
          set +e
          if [ "$PROFILE" = secretsmanager-basic-lifecycle ]; then
            if [ -n "${AWS2AZURE_ROTATION_ROLE_ASSIGNMENT_ID_A:-}" ]; then
              az role assignment delete \
                --ids "$AWS2AZURE_ROTATION_ROLE_ASSIGNMENT_ID_A" --only-show-errors
            fi
            if [ -n "${AWS2AZURE_ROTATION_ROLE_ASSIGNMENT_ID_B:-}" ]; then
              az role assignment delete \
                --ids "$AWS2AZURE_ROTATION_ROLE_ASSIGNMENT_ID_B" --only-show-errors
            fi
            az identity delete -g "$RG_NAME" -n "$RUNTIME_IDENTITY_A_NAME" --only-show-errors
            az identity delete -g "$RG_NAME" -n "$RUNTIME_IDENTITY_B_NAME" --only-show-errors
          fi
          rm -rf "$PRIVATE_DIR"

      - name: Deallocate ephemeral Azure resources
        if: always()
        run: bash .github/scripts/cleanup-real-azure-resource-groups.sh "$RG_NAME"
