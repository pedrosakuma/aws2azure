name: footprint

on:
  schedule:
    # Nightly at 06:00 UTC — staggered from integration.yml (04:00) and
    # perf.yml (05:30) so the three jobs don't fight for runner pool slots.
    - cron: '0 6 * * *'
  workflow_dispatch:
  pull_request:
    types: [labeled, synchronize, reopened]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  changes:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    outputs:
      relevant: ${{ steps.filter.outputs.relevant }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - id: filter
        uses: dorny/paths-filter@d1c1ffe0248fe513906c8e24db8ea791d46f8590 # v3
        with:
          filters: |
            relevant:
              - 'src/**'
              - 'tests/Aws2Azure.FootprintTests/**'
              - 'Directory.Build.props'
              - 'global.json'
              - 'Dockerfile'
              - '.dockerignore'
              - '.github/workflows/footprint.yml'

  footprint:
    needs: changes
    # Runs on nightly schedule, manual dispatch, relevant PR changes, or the
    # `run-footprint` / `run-perf` labels as explicit overrides.
    if: >-
      always() &&
      (github.event_name == 'schedule' ||
       github.event_name == 'workflow_dispatch' ||
       (github.event_name == 'pull_request' &&
        (needs.changes.outputs.relevant == 'true' ||
         contains(github.event.pull_request.labels.*.name, 'run-footprint') ||
         contains(github.event.pull_request.labels.*.name, 'run-perf'))))
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      AWS2AZURE_FOOTPRINT: "1"
      # Persist the AOT publish across the test so a re-run in the same job is
      # a cache hit rather than a second multi-minute link.
      AWS2AZURE_FOOTPRINT_PUBLISH_DIR: ${{ github.workspace }}/.footprint-publish
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: ./.github/actions/dotnet-setup

      # Native-AOT toolchain: `dotnet publish` shells out to clang + the
      # platform linker and links against zlib.
      - name: Install AOT toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends clang zlib1g-dev

      # Build the chiseled container image so the footprint harness can record
      # its size via `docker image inspect`. This is the same Dockerfile that
      # ships the sidecar, so the number is the real published image size.
      - name: Build container image (for image-size metric)
        run: docker build -t aws2azure:footprint .

      - name: Build footprint tests
        run: dotnet build tests/Aws2Azure.FootprintTests -c Release --nologo

      - name: Measure footprint + enforce budget
        env:
          AWS2AZURE_FOOTPRINT_IMAGE: aws2azure:footprint
          # Measure per-tier (build-time module selection, #273) footprint only
          # on the nightly run — each tier is a separate multi-minute AOT
          # publish, so PR-label / dispatch runs stay lean (all-modules only).
          AWS2AZURE_FOOTPRINT_TIERS: ${{ github.event_name == 'schedule' && '1' || '0' }}
        run: >-
          dotnet test tests/Aws2Azure.FootprintTests -c Release --no-build --nologo
          --logger "console;verbosity=normal"

      - name: Upload footprint report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: footprint-results
          path: |
            docs/perf/footprint-latest.md
            docs/perf/footprint-history.csv
          if-no-files-found: warn
          retention-days: 90
