name: integration

on:
  push:
    branches: [main]
  pull_request:

jobs:
  integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - name: Verify Docker available
        run: docker info
      - name: Restore + build
        run: dotnet build -c Release --nologo
      - name: Run unit tests
        run: dotnet test tests/Aws2Azure.UnitTests -c Release --no-build --nologo
      - name: Run integration tests (Testcontainers/Azurite)
        run: dotnet test tests/Aws2Azure.IntegrationTests -c Release --no-build --nologo
