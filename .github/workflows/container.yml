# aws2azure container image build and publish
# Triggers on main push and releases. Publishes to GHCR.

name: Container Image

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'Dockerfile'
      - '.github/workflows/container.yml'
  release:
    types: [published]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=,format=long
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push (amd64)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            TARGETARCH=amd64
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ARM64 build (optional, uncomment when needed)
      # - name: Build and push (arm64)
      #   uses: docker/build-push-action@v6
      #   with:
      #     context: .
      #     push: true
      #     tags: ${{ steps.meta.outputs.tags }}-arm64
      #     labels: ${{ steps.meta.outputs.labels }}
      #     build-args: |
      #       TARGETARCH=arm64
      #     platforms: linux/arm64
      #     cache-from: type=gha
      #     cache-to: type=gha,mode=max

      - name: Image digest
        run: echo "Image pushed with digest ${{ steps.meta.outputs.digest }}"

  # Verify the image runs correctly
  smoke-test:
    needs: build-and-push
    runs-on: ubuntu-latest
    permissions:
      packages: read

    steps:
      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull and run smoke test
        run: |
          # Pull the image
          docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          
          # Create minimal config
          cat > /tmp/config.json << 'EOF'
          {
            "services": {
              "s3": { "enabled": true }
            },
            "credentials": [{
              "awsAccessKeyId": "test",
              "awsSecretAccessKey": "test",
              "azure": {
                "blob": {
                  "accountName": "test",
                  "accountKey": "dGVzdA=="
                }
              }
            }]
          }
          EOF
          
          # Run container and check health
          docker run -d --name aws2azure-test \
            -p 8080:8080 \
            -v /tmp/config.json:/app/config.json:ro \
            -e AWS2AZURE_CONFIG_FILE=/app/config.json \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          
          # Wait for startup
          sleep 5
          
          # Check health endpoint
          curl -f http://localhost:8080/_aws2azure/health || exit 1
          
          # Cleanup
          docker stop aws2azure-test
          docker rm aws2azure-test
          
          echo "✅ Smoke test passed"
