# aws2azure container image build and publish.
#
# Pull requests that touch the Dockerfile, sources, or this workflow build the
# image and run a smoke test WITHOUT pushing — so a broken Dockerfile is caught
# before merge. Pushes to main, manual dispatch, and calls from release.yml
# (workflow_call) additionally build and publish a multi-arch (amd64 + arm64)
# image to GHCR.

name: Container Image

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'Dockerfile'
      - '.dockerignore'
      - '.github/workflows/container.yml'
  pull_request:
    paths:
      - 'src/**'
      - 'Dockerfile'
      - '.dockerignore'
      - '.github/workflows/container.yml'
  release:
    types: [published]
  workflow_call:
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ---------------------------------------------------------------------------
  # Build the image (amd64) and smoke-test it locally. Runs on every trigger,
  # including pull requests, and never pushes — this is the pre-merge gate.
  # ---------------------------------------------------------------------------
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (load locally, no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: aws2azure:ci
          build-args: |
            TARGETARCH=amd64
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke test
        run: |
          cat > /tmp/config.json << 'EOF'
          {
            "services": { "s3": { "enabled": true } },
            "bindings": [{
              "aws": { "accessKeyId": "test", "secretAccessKey": "test" },
              "azure": {
                "s3": {
                  "kind": "blob",
                  "target": { "accountName": "test" },
                  "auth": { "mode": "sharedKey", "key": "dGVzdA==" }
                }
              }
            }]
          }
          EOF

          docker run -d --name aws2azure-test \
            -p 8080:8080 \
            -v /tmp/config.json:/app/config.json:ro \
            -e AWS2AZURE_CONFIG_FILE=/app/config.json \
            aws2azure:ci

          # Poll the health endpoint until ready (max ~30s).
          for i in $(seq 1 30); do
            if curl -fsS http://localhost:8080/_aws2azure/health > /dev/null; then
              echo "✅ Smoke test passed"
              docker rm -f aws2azure-test
              exit 0
            fi
            sleep 1
          done

          echo "❌ Health endpoint never became ready"
          docker logs aws2azure-test || true
          docker rm -f aws2azure-test
          exit 1

  # ---------------------------------------------------------------------------
  # Publish to GHCR as a multi-arch image. Each architecture is built natively
  # on its own runner (amd64 on ubuntu-latest, arm64 on ubuntu-24.04-arm — free
  # for public repos) and pushed by digest; the merge job then assembles a
  # manifest list carrying the human-readable tags. Native builds avoid QEMU,
  # which is prohibitively slow for Native-AOT compilation. Skipped on PRs.
  # ---------------------------------------------------------------------------
  publish:
    needs: build
    if: github.event_name != 'pull_request'
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 45
    permissions:
      contents: read
      packages: write
    steps:
      - name: Prepare platform vars
        id: prep
        env:
          PLATFORM: ${{ matrix.platform }}
        run: |
          {
            echo "pair=${PLATFORM//\//-}"
            echo "arch=${PLATFORM##*/}"
          } >> "$GITHUB_OUTPUT"

      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: ${{ matrix.platform }}
          labels: ${{ steps.meta.outputs.labels }}
          # The Dockerfile resolves the .NET RID from TARGETARCH. buildx does not
          # auto-populate it because the Dockerfile gives `ARG TARGETARCH` a
          # default (which short-circuits the predefined platform arg), so pass
          # it explicitly per matrix leg. provenance:false keeps push-by-digest
          # producing a single clean image-manifest digest per arch (no extra
          # attestation entry to pollute the merged manifest list).
          build-args: |
            TARGETARCH=${{ steps.prep.outputs.arch }}
          provenance: false
          outputs: type=image,name=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }},push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=${{ steps.prep.outputs.pair }}
          cache-to: type=gha,mode=max,scope=${{ steps.prep.outputs.pair }}

      - name: Export digest
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          mkdir -p /tmp/digests
          touch "/tmp/digests/${DIGEST#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v4
        with:
          name: digests-${{ steps.prep.outputs.pair }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  # ---------------------------------------------------------------------------
  # Assemble the per-architecture digests into a single multi-arch manifest list
  # and push it under the human-readable tags. Skipped on pull requests.
  # ---------------------------------------------------------------------------
  merge:
    needs: publish
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      packages: write
    steps:
      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: digests-*
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=,format=long
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Create manifest list and push
        working-directory: /tmp/digests
        run: |
          docker buildx imagetools create \
            $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf '${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@sha256:%s ' *)

      - name: Inspect image
        run: |
          docker buildx imagetools inspect \
            "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.version }}"
