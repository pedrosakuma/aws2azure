name: integration-real-azure

# Real-Azure integration coverage for the SQS module.
#
# This workflow targets a live Azure Service Bus namespace whose
# connection string is supplied via the `AZURE_SB_CONNSTR` repository
# secret. It complements the emulator-less in-process REST fakes
# (covered every PR by the unit suite) and Azurite/S3 emulator
# integration (covered by `integration.yml`).
#
# Rationale (see docs/adr/0001-sb-rest-runtime-protocol.md):
# the Microsoft Service Bus emulator does not implement the runtime
# REST API the proxy is built on, so emulator-backed Testcontainers
# cannot exercise the SQS module's hot path. Real Azure is the only
# backend that does — gated and infrequent to keep cost low.
on:
  schedule:
    # Nightly at 05:00 UTC, an hour after the emulator `integration`
    # job so a failure here points at real-Azure-only divergence.
    - cron: '0 5 * * *'
  workflow_dispatch:
  pull_request:
    types: [labeled, synchronize, reopened]

jobs:
  real-azure:
    if: >-
      github.event_name == 'schedule' ||
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'pull_request' &&
       contains(github.event.pull_request.labels.*.name, 'run-real-azure'))
    runs-on: ubuntu-latest
    # Concurrency guard: never run two real-Azure jobs against the
    # same secret in parallel. Cost + test isolation.
    concurrency:
      group: integration-real-azure
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - name: Restore + build
        run: dotnet build -c Release --nologo
      - name: Run real-Azure SQS integration tests
        env:
          # Secret is intentionally unavailable on PRs from forks; the
          # tests guard on this and skip rather than fail in that case,
          # so unprivileged contributors do not see red CI for a check
          # they cannot run.
          AZURE_SB_CONNSTR: ${{ secrets.AZURE_SB_CONNSTR }}
        run: |
          dotnet test tests/Aws2Azure.IntegrationTests \
            -c Release --no-build --nologo \
            --filter "Category=RealAzure"
