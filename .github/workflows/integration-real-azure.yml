name: integration-real-azure

# Real-Azure integration coverage and evidence for the service modules
# (issues #153, #257, #533).
#
# Emulators (Azurite, Service Bus / Event Hubs / Cosmos emulators) are
# necessary but NOT sufficient — they diverge from real Azure on auth,
# default ports, throttling and feature surface. This scheduled job runs
# the bounded six-service conformance matrix through the proxy against LIVE
# Azure, plus credential-independent deterministic failure checks, to catch
# real-Azure-only regressions (e.g. the AMQP port-defaulting bug fixed in
# 1560d11 that emulators never surfaced).
#
# Ephemeral provision -> test -> deallocate (issue #257): the job logs into
# Azure via OIDC (no stored client secret), provisions a per-run, uniquely
# named resource group from deploy/realazure/main.bicep, exports the freshly
# minted connection details into the test environment, runs the real-Azure
# suite, generates TRX-backed evidence, then deletes the resource group in an
# `if: always()` teardown. There are no standing Azure resources and no
# long-lived account-key secrets to manage.
#
# Coverage (each real backend is gated independently; a backend whose env is
# absent skips rather than fails). Deterministic failure-injection tests and
# the focused AMQP mapping tests run without Azure credentials:
#   S3        -> Blob Storage   (lifecycle + list pagination + multi-delete)
#   DynamoDB  -> Cosmos DB      (lifecycle + query/batch + conditional concurrency)
#   SQS       -> Service Bus    (lifecycle + list/batch + FIFO concurrency)
#   Kinesis   -> Event Hubs     (write/read/list/batch + consumer concurrency)
#   SNS       -> Service Bus    (topic/subscription lifecycle + lists + publish batch)
#   Secrets   -> Key Vault      (lifecycle + version write + list pagination against
#                                an ephemeral, per-run
#                                RBAC vault provisioned by the Bicep; the proxy
#                                authenticates via GitHub OIDC workload identity,
#                                so no client secret is stored)
#
# One-time operator setup (OIDC + reaper) is documented in
# docs/testing/real-azure-nightly.md.
on:
  schedule:
    # Nightly at 05:00 UTC, an hour after the emulator `integration`
    # job so a failure here points at real-Azure-only divergence.
    - cron: '0 5 * * *'
  workflow_dispatch:
    inputs:
      service:
        description: Service to run, or all services
        required: false
        default: all
        type: choice
        options:
          - all
          - s3
          - dynamodb
          - sqs
          - kinesis
          - sns
          - secretsmanager
      scenario:
        description: Optional scenario id (use service when the id is ambiguous)
        required: false
        type: string
      require_real_azure:
        description: Fail unless positive live-Azure verification evidence is produced
        required: false
        default: true
        type: boolean
  pull_request:
    types: [labeled, synchronize, reopened]

permissions:
  id-token: write   # required for the azure/login OIDC token exchange
  contents: read

jobs:
  real-azure:
    if: >-
      github.event_name == 'schedule' ||
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'pull_request' &&
       contains(github.event.pull_request.labels.*.name, 'run-real-azure'))
    runs-on: ubuntu-latest
    timeout-minutes: 60
    # Concurrency guard: never run two real-Azure jobs in parallel (cost +
    # the reaper's age heuristic both assume a single active run).
    concurrency:
      group: integration-real-azure
      cancel-in-progress: false
    env:
      AZURE_LOCATION: eastus2
      # Unique per run+attempt so retries never collide and the reaper can
      # always identify orphans by the shared `purpose` tag.
      RG_NAME: aws2azure-it-${{ github.run_id }}-${{ github.run_attempt }}
      DEPLOYMENT_NAME: aws2azure-realazure
      # The DynamoDB module creates containers but not the database, and the
      # Kinesis module does not implement CreateStream — Bicep pre-creates both
      # and the fixture targets these names.
      AZURE_COSMOS_DATABASE: dynamodb
      AZURE_EVENTHUBS_STREAM: kinesis-smoke
      TEST_RESULTS_DIR: TestResults/real-azure
      EVIDENCE_DIR: TestResults/real-azure-conformance
      CONFORMANCE_PLAN: TestResults/real-azure-conformance-plan.json
      RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/dotnet-setup

      # Provisioning needs the OIDC client id. When it is absent (fork PRs, or
      # before an operator has wired up OIDC) we skip provision/login/teardown;
      # live-backend tests then skip while credential-independent checks run.
      - name: Check provisioning credentials
        id: gate
        env:
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_OBJECT_ID: ${{ secrets.AZURE_CLIENT_OBJECT_ID }}
        run: |
          if [ -n "$AZURE_CLIENT_ID" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "::notice::AZURE_CLIENT_ID not set — real-Azure provisioning skipped; RealAzure tests will skip."
          fi
          # The Workload-Identity E2E scenario (#307) requires the SP object id so
          # the Bicep grants data-plane RBAC; without it the WI proxy variant and
          # its tests skip, leaving the shared-key matrix untouched.
          if [ -n "$AZURE_CLIENT_ID" ] && [ -n "$AZURE_CLIENT_OBJECT_ID" ]; then
            echo "wi_enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "wi_enabled=false" >> "$GITHUB_OUTPUT"
            echo "::notice::AZURE_CLIENT_OBJECT_ID not set — WorkloadIdentity E2E scenario skipped."
          fi

      - name: Restore + build
        run: dotnet build -c Release --nologo

      - name: Validate conformance matrix
        run: dotnet run --project tools/Aws2Azure.GapDocs --no-build -c Release -- --validate

      - name: Plan selected conformance scenarios
        id: plan
        env:
          SELECTED_SERVICE: ${{ inputs.service || 'all' }}
          SELECTED_SCENARIO: ${{ inputs.scenario || '' }}
          REQUESTED_REQUIRE_REAL_AZURE: ${{ inputs.require_real_azure || false }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          args=()
          if [ "$SELECTED_SERVICE" != "all" ]; then
            args+=(--service "$SELECTED_SERVICE")
          fi
          if [ -n "$SELECTED_SCENARIO" ]; then
            args+=(--scenario "$SELECTED_SCENARIO")
          fi

          mkdir -p "$(dirname "$CONFORMANCE_PLAN")"
          dotnet run --project tools/Aws2Azure.GapDocs --no-build -c Release -- \
            plan-conformance "${args[@]}" --output "$CONFORMANCE_PLAN"

          requires_real_azure="$(
            jq -r 'any(.scenarios[]; .evidence_source == "real_azure")' "$CONFORMANCE_PLAN"
          )"
          if [ "$EVENT_NAME" = "schedule" ]; then
            require_real_azure=true
          elif [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            require_real_azure="$REQUESTED_REQUIRE_REAL_AZURE"
          else
            require_real_azure=false
          fi
          echo "requires_real_azure=$requires_real_azure" >> "$GITHUB_OUTPUT"
          echo "require_real_azure=$require_real_azure" >> "$GITHUB_OUTPUT"
          {
            echo "## Selected conformance plan"
            echo
            echo "- Service: \`$SELECTED_SERVICE\`"
            echo "- Scenario: \`${SELECTED_SCENARIO:-all}\`"
            echo "- Scenarios: $(jq '.scenarios | length' "$CONFORMANCE_PLAN")"
            echo "- Requires real Azure: \`$requires_real_azure\`"
            echo "- Enforce positive real-Azure evidence: \`$require_real_azure\`"
          } >> "$GITHUB_STEP_SUMMARY"

      # VSTest exits zero when a filter matches no tests. Discover first and
      # require every matrix identity to match exactly (or a theory case with
      # the identity followed by its argument list) before constructing filters.
      - name: Verify planned test discovery
        run: |
          failed=0
          while IFS= read -r project; do
            discovered="$RUNNER_TEMP/$(basename "$project")-discovered.txt"
            dotnet test "$project" -c Release --no-build --nologo --list-tests > "$discovered"

            while IFS= read -r identity; do
              if ! awk -v expected="$identity" '
                {
                  line = $0
                  sub(/^[[:space:]]+/, "", line)
                  sub(/\r$/, "", line)
                  if (line == expected || index(line, expected "(") == 1) found = 1
                }
                END { exit found ? 0 : 1 }
              ' "$discovered"; then
                echo "::error::Planned test was not discovered in $project: $identity"
                failed=1
              fi
            done < <(
              jq -r --arg project "$project" \
                '.test_projects[] | select(.project == $project) | .tests[]' \
                "$CONFORMANCE_PLAN"
            )
          done < <(jq -r '.test_projects[].project' "$CONFORMANCE_PLAN")
          exit "$failed"

      - name: Build planned test filters
        id: filters
        run: |
          filter_for() {
            jq -r --arg project "$1" '
              [.test_projects[]
               | select(.project == $project)
               | .tests[]
               | "FullyQualifiedName=" + .]
              | join("|")
            ' "$CONFORMANCE_PLAN"
          }

          echo "integration=$(filter_for tests/Aws2Azure.IntegrationTests)" >> "$GITHUB_OUTPUT"
          echo "unit=$(filter_for tests/Aws2Azure.UnitTests)" >> "$GITHUB_OUTPUT"

      # The empty TRX is a truthful fallback: if a test host cannot start,
      # evidence generation still records matrix entries as not_run instead of
      # silently omitting the report.
      - name: Initialize deterministic results directory
        run: |
          mkdir -p "$TEST_RESULTS_DIR"
          cat > "$TEST_RESULTS_DIR/evidence-bootstrap.trx" <<'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <TestRun xmlns="http://microsoft.com/schemas/VisualStudio/TeamTest/2010" />
          EOF

      - name: Run planned unit conformance tests
        id: unit_tests
        env:
          FILTER: ${{ steps.filters.outputs.unit }}
        run: |
          status=0
          if [ -n "$FILTER" ]; then
            dotnet test tests/Aws2Azure.UnitTests \
              -c Release --no-build --nologo \
              --filter "$FILTER" \
              --results-directory "$TEST_RESULTS_DIR" \
              --logger "trx;LogFileName=matrix-unit.trx" || status=$?
          else
            echo "::notice::Selected conformance plan contains no unit tests."
          fi
          echo "exit_code=$status" >> "$GITHUB_OUTPUT"

      - name: Azure login (OIDC)
        if: steps.gate.outputs.enabled == 'true' && steps.plan.outputs.requires_real_azure == 'true'
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Provision ephemeral Azure backends
        if: steps.gate.outputs.enabled == 'true' && steps.plan.outputs.requires_real_azure == 'true'
        env:
          # Object id of the OIDC service principal, for the data-plane RBAC role
          # assignments the WorkloadIdentity E2E scenario needs (issue #307). When
          # unset the Bicep skips every role assignment, so the shared-key smoke
          # matrix is unaffected and the job stays green.
          AZURE_CLIENT_OBJECT_ID: ${{ secrets.AZURE_CLIENT_OBJECT_ID }}
        run: |
          set -euo pipefail
          az group create -n "$RG_NAME" -l "$AZURE_LOCATION" \
            --tags purpose=aws2azure-nightly \
                   run-id="${{ github.run_id }}" \
                   created="$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            -o none
          az deployment group create -g "$RG_NAME" -n "$DEPLOYMENT_NAME" \
            -f deploy/realazure/main.bicep \
            -p cosmosDatabaseName="$AZURE_COSMOS_DATABASE" \
               eventHubName="$AZURE_EVENTHUBS_STREAM" \
               principalId="${AZURE_CLIENT_OBJECT_ID:-}" \
            -o none

      - name: Export connection info
        if: steps.gate.outputs.enabled == 'true' && steps.plan.outputs.requires_real_azure == 'true'
        run: |
          set -euo pipefail
          out() {
            az deployment group show -g "$RG_NAME" -n "$DEPLOYMENT_NAME" \
              --query "properties.outputs.$1.value" -o tsv
          }
          STORAGE="$(out storageAccountName)"
          SB_NS="$(out serviceBusNamespaceName)"
          COSMOS="$(out cosmosAccountName)"
          COSMOS_ENDPOINT="$(out cosmosEndpoint)"
          EH_NS="$(out eventHubsNamespaceName)"
          KV_URI="$(out keyVaultUri)"

          BLOB_KEY="$(az storage account keys list -n "$STORAGE" -g "$RG_NAME" --query '[0].value' -o tsv)"
          SB_CONN="$(az servicebus namespace authorization-rule keys list -g "$RG_NAME" \
            --namespace-name "$SB_NS" --name RootManageSharedAccessKey \
            --query primaryConnectionString -o tsv)"
          COSMOS_KEY="$(az cosmosdb keys list -n "$COSMOS" -g "$RG_NAME" --query primaryMasterKey -o tsv)"
          EH_CONN="$(az eventhubs namespace authorization-rule keys list -g "$RG_NAME" \
            --namespace-name "$EH_NS" --name RootManageSharedAccessKey \
            --query primaryConnectionString -o tsv)"

          # Mask every secret before it lands in $GITHUB_ENV / logs.
          for v in "$BLOB_KEY" "$SB_CONN" "$COSMOS_KEY" "$EH_CONN"; do
            echo "::add-mask::$v"
          done

          {
            echo "AZURE_BLOB_ACCOUNT=$STORAGE"
            echo "AZURE_BLOB_KEY=$BLOB_KEY"
            echo "AZURE_COSMOS_ENDPOINT=$COSMOS_ENDPOINT"
            echo "AZURE_COSMOS_KEY=$COSMOS_KEY"
            echo "AZURE_COSMOS_DATABASE=$AZURE_COSMOS_DATABASE"
            echo "AZURE_SB_CONNSTR=$SB_CONN"
            echo "AZURE_EVENTHUBS_CONNSTR=$EH_CONN"
            echo "AZURE_EVENTHUBS_STREAM=$AZURE_EVENTHUBS_STREAM"
            echo "AZURE_KEYVAULT_URL=$KV_URI"
          } >> "$GITHUB_ENV"

      - name: Mint federated token for workload identity scenarios
        if: steps.gate.outputs.wi_enabled == 'true' && steps.plan.outputs.requires_real_azure == 'true'
        env:
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
        run: |
          set -euo pipefail
          # Request a GitHub Actions OIDC token for the Azure AD exchange audience
          # and write it to a file the proxy's WorkloadIdentityTokenSource reads
          # (mirroring the AKS projected service-account token contract). The
          # token's `sub` claim matches the same federated credentials
          # azure/login already uses, so no extra Entra federation is needed. The
          # ACTIONS_ID_TOKEN_REQUEST_* vars are injected because the job has
          # `id-token: write`.
          TOKEN_FILE="$RUNNER_TEMP/azure-federated-token.jwt"
          RESPONSE="$(curl -fsS \
            -H "Authorization: Bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "$ACTIONS_ID_TOKEN_REQUEST_URL&audience=api://AzureADTokenExchange")"
          ASSERTION="$(printf '%s' "$RESPONSE" | python3 -c 'import sys, json; print(json.load(sys.stdin)["value"])')"
          if [ -z "$ASSERTION" ]; then
            echo "::error::Failed to obtain a GitHub OIDC token for the Workload Identity scenario."
            exit 1
          fi
          echo "::add-mask::$ASSERTION"
          ( umask 077; printf '%s' "$ASSERTION" > "$TOKEN_FILE" )
          {
            echo "AZURE_FEDERATED_TOKEN_FILE=$TOKEN_FILE"
            echo "AZURE_TENANT_ID=$AZURE_TENANT_ID"
            echo "AZURE_CLIENT_ID=$AZURE_CLIENT_ID"
          } >> "$GITHUB_ENV"

      - name: Run planned integration conformance tests
        id: integration_tests
        if: always()
        env:
          FILTER: ${{ steps.filters.outputs.integration }}
        run: |
          # AZURE_KEYVAULT_URL is exported from the ephemeral deployment output by
          # the "Export connection info" step (Secrets Manager -> Key Vault). When
          # provisioning is skipped (no OIDC) it stays unset and the SecretsManager
          # smoke skips. Workload-Identity auth uses the OIDC token minted above.
          status=0
          if [ -n "$FILTER" ]; then
            dotnet test tests/Aws2Azure.IntegrationTests \
              -c Release --no-build --nologo \
              --filter "$FILTER" \
              --results-directory "$TEST_RESULTS_DIR" \
              --logger "trx;LogFileName=matrix-integration.trx" || status=$?
          else
            echo "::notice::Selected conformance plan contains no integration tests."
          fi
          echo "exit_code=$status" >> "$GITHUB_OUTPUT"

      # Generate immutable matrix evidence from every available TRX and refresh
      # the Theme C divergence dossier even when tests failed. The test steps
      # preserve their exit codes; a final gate after teardown restores failure.
      - name: Generate conformance evidence and divergence report
        id: reports
        if: always()
        run: |
          status=0
          evidence_args=()
          selected_service="$(jq -r '.selection.service // empty' "$CONFORMANCE_PLAN")"
          selected_scenario="$(jq -r '.selection.scenario // empty' "$CONFORMANCE_PLAN")"
          if [ -n "$selected_service" ]; then
            evidence_args+=(--service "$selected_service")
          fi
          if [ -n "$selected_scenario" ]; then
            evidence_args+=(--scenario "$selected_scenario")
          fi
          if [ "${{ steps.plan.outputs.require_real_azure }}" = "true" ]; then
            evidence_args+=(--require-real-azure)
          fi

          dotnet run --project tools/Aws2Azure.GapDocs --no-build -c Release -- \
            --generate-evidence \
            --trx "$TEST_RESULTS_DIR" \
            --run-id "${{ github.run_id }}" \
            --run-url "$RUN_URL" \
            --evidence-output "$EVIDENCE_DIR" \
            "${evidence_args[@]}" || status=$?
          dotnet run --project tools/Aws2Azure.GapDocs --no-build -c Release || status=$?

          if [ -f "$EVIDENCE_DIR/summary.md" ]; then
            cat "$EVIDENCE_DIR/summary.md" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "::error::Conformance summary was not generated."
            status=1
          fi
          if [ -f docs/site/divergences.md ]; then
            {
              echo
              echo "## Documented divergences"
              echo
              grep -m1 'Operations:' docs/site/divergences.md || true
            } >> "$GITHUB_STEP_SUMMARY"
          else
            echo "::error::Divergence report was not generated."
            status=1
          fi
          echo "exit_code=$status" >> "$GITHUB_OUTPUT"

      - name: Upload conformance evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: real-azure-conformance
          path: |
            TestResults/real-azure-conformance-plan.json
            TestResults/real-azure/*.trx
            TestResults/real-azure-conformance/**
          if-no-files-found: error

      - name: Upload divergence report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: real-azure-divergences
          path: docs/site/divergences.md
          if-no-files-found: warn

      # The deallocate guarantee: delete the ephemeral resource group even when
      # provisioning or the tests failed. --no-wait returns immediately; the
      # reaper workflow is the backstop for force-cancelled runs.
      - name: Deallocate ephemeral Azure backends
        if: >-
          always() &&
          steps.gate.outputs.enabled == 'true' &&
          steps.plan.outputs.requires_real_azure == 'true'
        run: |
          # Key Vault soft-delete is mandatory and cannot be disabled, so deleting
          # the resource group alone leaves the vault name reserved (7-day minimum
          # retention). Discover any vault in the RG independently of the export
          # step (so a mid-export failure can't leak a soft-deleted name), then
          # delete (sync) + purge each to free the unique name immediately. Purge
          # protection is OFF on these vaults; best-effort, and the reaper backstops
          # force-cancelled runs.
          for kv in $(az keyvault list -g "$RG_NAME" --query "[].name" -o tsv 2>/dev/null || true); do
            az keyvault delete -n "$kv" -g "$RG_NAME" || true
            az keyvault purge -n "$kv" --no-wait || true
          done
          az group delete -n "$RG_NAME" --yes --no-wait || true

      - name: Enforce test and report results
        if: always()
        run: |
          failed=0
          check() {
            name="$1"
            value="$2"
            if ! [[ "$value" =~ ^[0-9]+$ ]] || [ "$value" -ne 0 ]; then
              echo "::error::$name failed or did not execute (exit code: ${value:-missing})."
              failed=1
            fi
          }
          check "Planned unit tests" "${{ steps.unit_tests.outputs.exit_code }}"
          check "Planned integration tests" "${{ steps.integration_tests.outputs.exit_code }}"
          check "Evidence/report generation" "${{ steps.reports.outputs.exit_code }}"
          exit "$failed"
