name: perf

on:
  schedule:
    # Nightly at 05:30 UTC — staggered from `integration.yml` (04:00) so both
    # jobs don't fight for runner pool slots.
    - cron: '30 5 * * *'
  workflow_dispatch:
  pull_request:
    types: [labeled, synchronize, reopened]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  perf:
    # Runs on nightly schedule, manual dispatch, or PRs that carry the
    # `run-perf` label. Default PRs do NOT trigger it — apply the label
    # when changing transport hot paths (Kestrel routing, SigV4 hot
    # loop, any module's per-call code) to surface regressions before
    # merge.
    if: >-
      github.event_name == 'schedule' ||
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'pull_request' &&
       contains(github.event.pull_request.labels.*.name, 'run-perf'))
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      AWS2AZURE_PERF: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - name: Verify Docker available
        run: docker info
      - name: Restore + build
        run: dotnet build -c Release --nologo
      - name: Run perf scenarios
        run: dotnet test tests/Aws2Azure.PerfTests -c Release --no-build --nologo --filter "Category!=RelativeGate" --logger "console;verbosity=normal"
      - name: Relative regression gate (proxy vs SDK baseline)
        if: always()
        run: dotnet test tests/Aws2Azure.PerfTests -c Release --no-build --nologo --filter "Category=RelativeGate" --logger "console;verbosity=normal"
      - name: Upload perf baseline + history
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: perf-results
          path: |
            docs/perf/baseline-latest.md
            docs/perf/baseline-latest.json
            docs/perf/history.csv
          if-no-files-found: warn
          retention-days: 90
