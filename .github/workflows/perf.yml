name: perf

on:
  schedule:
    # Nightly at 05:30 UTC — staggered from `integration.yml` (04:00) so both
    # jobs don't fight for runner pool slots.
    - cron: '30 5 * * *'
  workflow_dispatch:
  pull_request:
    types: [labeled, synchronize, reopened]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  changes:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    outputs:
      relevant: ${{ steps.filter.outputs.relevant }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - id: filter
        uses: dorny/paths-filter@d1c1ffe0248fe513906c8e24db8ea791d46f8590 # v3
        with:
          filters: |
            relevant:
              - 'src/**'
              - 'deploy/emulators/**'
              - 'deploy/docker-compose.yml'
              - 'docker-compose.yml'

  perf:
    needs: changes
    # Runs on nightly schedule, manual dispatch, relevant PR changes, or the
    # `run-perf` label as an explicit override.
    if: >-
      always() &&
      (github.event_name == 'schedule' ||
       github.event_name == 'workflow_dispatch' ||
       (github.event_name == 'pull_request' &&
        (needs.changes.outputs.relevant == 'true' ||
         contains(github.event.pull_request.labels.*.name, 'run-perf'))))
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      AWS2AZURE_PERF: "1"
      AWS2AZURE_PERF_UPDATE_DOCS: "1"
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: ./.github/actions/dotnet-setup
      - name: Verify Docker available
        run: docker info
      - name: Restore + build
        run: dotnet build -c Release --nologo
      - name: Run perf scenarios
        run: dotnet test tests/Aws2Azure.PerfTests -c Release --no-build --nologo --filter "Category!=RelativeGate" --logger "console;verbosity=normal"
      - name: Relative regression gate (proxy vs SDK baseline)
        if: always()
        run: dotnet test tests/Aws2Azure.PerfTests -c Release --no-build --nologo --filter "Category=RelativeGate" --logger "console;verbosity=normal"
      - name: Generate emulator qualification artifact
        if: always()
        shell: bash
        run: |
          output="artifacts/perf/emulator-qualification.yaml"
          proxy_output="src/Aws2Azure.Proxy/bin/Release/net10.0"
          candidate_manifest="artifacts/perf/candidate-sha256.txt"
          mkdir -p "$(dirname "$output")"

          (
            cd "$proxy_output"
            find . -maxdepth 1 -type f \
              \( -name '*.dll' -o -name '*.json' -o -name 'Aws2Azure.Proxy' \) \
              -print0 |
              sort -z |
              xargs -0 sha256sum
          ) > "$GITHUB_WORKSPACE/$candidate_manifest"
          artifact_digest="sha256:$(sha256sum "$candidate_manifest" | cut -d' ' -f1)"
          config_digest="sha256:$(sha256sum docs/perf/baseline-reference.json | cut -d' ' -f1)"

          set +e
          dotnet run --project tools/Aws2Azure.GapDocs -c Release --no-build -- \
            generate-emulator-qualification \
            --reference docs/perf/baseline-reference.json \
            --latest docs/perf/baseline-latest.json \
            --output "$output" \
            --run-id "$GITHUB_RUN_ID" \
            --run-url "$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID" \
            --git-sha "$(git rev-parse HEAD)" \
            --artifact-digest "$artifact_digest" \
            --config-digest "$config_digest"
          qualification_status=$?
          set -e

          if [[ -f "$output" ]]; then
            verdict="$(sed -n 's/^verdict: //p' "$output" | head -n 1)"
            {
              echo "### Emulator regression qualification"
              echo
              echo "- Verdict: \`$verdict\`"
              echo "- Evidence class: proxy overhead against local emulators"
              echo "- Azure capacity claim: none"
            } >> "$GITHUB_STEP_SUMMARY"
            if [[ "$qualification_status" -eq 0 && "$verdict" != "passed" ]]; then
              qualification_status=4
            fi
          elif [[ "$qualification_status" -eq 0 ]]; then
            qualification_status=2
          fi

          exit "$qualification_status"
      - name: Upload perf baseline + qualification + history
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: perf-results
          path: |
            artifacts/perf/candidate-sha256.txt
            artifacts/perf/emulator-qualification.yaml
            docs/perf/baseline-latest.md
            docs/perf/baseline-latest.json
            docs/perf/history.csv
          if-no-files-found: warn
          retention-days: 90
