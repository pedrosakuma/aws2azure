name: gap-docs

on:
  push:
    paths:
      - 'docs/gaps/**'
      - 'docs/testing/real-azure-conformance.yaml'
      - 'docs/workloads/**'
      - 'docs/site/**'
      - 'tools/Aws2Azure.GapDocs/**'
      - 'src/Aws2Azure.Core/Generated/**'
      - '.github/workflows/gap-docs.yml'
  pull_request:
    paths:
      - 'docs/gaps/**'
      - 'docs/testing/real-azure-conformance.yaml'
      - 'docs/workloads/**'
      - 'docs/site/**'
      - 'tools/Aws2Azure.GapDocs/**'
      - 'src/Aws2Azure.Core/Generated/**'
      - '.github/workflows/gap-docs.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/dotnet-setup
      - name: Validate YAML schema
        run: dotnet run --project tools/Aws2Azure.GapDocs -- --validate
      - name: Evaluate workload GA profiles
        run: |
          mkdir -p "$RUNNER_TEMP/workload-ga"
          for manifest in docs/workloads/*.yaml; do
            profile="$(basename "$manifest" .yaml)"
            dotnet run --project tools/Aws2Azure.GapDocs -- \
              certify-workload "$manifest" \
              --format json \
              --output "$RUNNER_TEMP/workload-ga/$profile.json"
          done
      - name: Regenerate and ensure no diff
        run: |
          dotnet run --project tools/Aws2Azure.GapDocs
          if [ -n "$(git status --porcelain --untracked-files=all -- docs/site src/Aws2Azure.Core/Generated)" ]; then
            echo "::error::Generated artefacts are out of date. Run 'dotnet run --project tools/Aws2Azure.GapDocs' and commit the result."
            git --no-pager diff -- docs/site src/Aws2Azure.Core/Generated
            git status --short --untracked-files=all -- docs/site src/Aws2Azure.Core/Generated
            exit 1
          fi
